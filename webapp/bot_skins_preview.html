<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Боты — превью 32 вариантов</title>
<style>
  body{margin:0;background:#0a0a12;color:#fff;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;padding:14px 10px 40px;}
  h1{font-size:18px;margin:0 0 4px;text-align:center;letter-spacing:.5px;}
  .sub{text-align:center;color:#8a8aa0;font-size:12px;margin-bottom:14px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;max-width:1500px;margin:0 auto;}
  .card{aspect-ratio:9/14;border-radius:12px;overflow:hidden;position:relative;border:1px solid #1f1f2e;
        box-shadow:0 6px 20px rgba(0,0,0,.55);}
  .bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.8) saturate(1.05);z-index:0;}
  .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,rgba(0,0,0,.08) 50%,rgba(0,0,0,.5) 100%);}
  /* Виньетка — фокус света в центре боя */
  .vignette{position:absolute;inset:0;pointer-events:none;z-index:4;
            box-shadow:inset 0 0 90px 18px rgba(0,0,0,.85), inset 0 0 28px 4px rgba(0,0,0,.7);}
  /* Световой ореол за боссом — окрашивается под стихию */
  .halo{position:absolute;right:6%;bottom:28%;width:55%;height:55%;border-radius:50%;
        background:radial-gradient(circle, var(--boss-color) 0%, transparent 70%);
        filter:blur(38px);opacity:.5;pointer-events:none;z-index:1;}
  .round{position:absolute;top:8px;left:50%;transform:translateX(-50%);text-align:center;z-index:6;}
  .round .lbl{font-size:9px;color:#bdbdd6;letter-spacing:2px;}
  .round .num{font-size:18px;font-weight:800;text-shadow:0 2px 4px rgba(0,0,0,.7);}
  /* VS — дерзкое, цветом босса */
  .vs{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);z-index:5;
      font-size:54px;font-weight:900;letter-spacing:3px;color:#fff;
      text-shadow:0 0 22px var(--boss-color),0 0 8px var(--boss-color),0 3px 6px rgba(0,0,0,.9);}
  /* Посадка на грунт: bottom:0 — низ спрайта касается края карточки */
  .player,.boss{position:absolute;bottom:0;z-index:2;}
  .player{left:2%; width:36%; height:58%;}    /* игрок чуть меньше */
  .boss  {right:-2%;width:60%; height:80%;}   /* босс +30% к игроку */
  .player img,.boss img{width:100%;height:100%;object-fit:contain;object-position:bottom;
    -webkit-mask-image:linear-gradient(to top,transparent 0%,#000 15%);
            mask-image:linear-gradient(to top,transparent 0%,#000 15%);
    -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
    -webkit-mask-size:100% 100%;mask-size:100% 100%;
    transform-origin:50% 100%;}
  /* Глубокая тень под ногами — «приземление» */
  .player img{filter:drop-shadow(0 15px 10px rgba(0,0,0,.8)) drop-shadow(0 0 6px rgba(120,180,255,.2));}
  .boss   img{filter:drop-shadow(0 15px 10px rgba(0,0,0,.8)) drop-shadow(0 0 20px var(--boss-color));}
  /* Динамика: breath — на земле, float — летающие */
  .breath > img{animation:breath 3.4s ease-in-out infinite;}
  .floatA > img{animation:floatA 4s ease-in-out infinite;}
  .tag{position:absolute;left:8px;bottom:8px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
       padding:4px 9px;border-radius:7px;font-size:10px;color:#e8e8ff;border:1px solid rgba(255,255,255,.1);z-index:7;}
  .elem{position:absolute;right:8px;bottom:8px;color:#fff;padding:4px 9px;border-radius:7px;
        font-size:10px;backdrop-filter:blur(6px);z-index:7;
        background:color-mix(in srgb, var(--boss-color) 22%, transparent);
        border:1px solid color-mix(in srgb, var(--boss-color) 45%, transparent);}
  @keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
  @keyframes floatA{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
</style>
</head>
<body>
<h1>Боты — финальный шаблон сцены боя (32 варианта)</h1>
<div class="sub">посадка на грунт · босс +30% · маска ступней 15% · свечение по стихии · виньетка · VS-цвет стихии</div>
<div class="grid" id="grid"></div>
<script>
  // спец-привязки от дизайнера + равномерный пул для остальных
  const SPECIAL = {3:'abyss', 10:'light', 15:'fire', 20:'ice', 30:'poison'};
  const POOL    = ['shadow','ice','abyss','light','poison','fire'];
  const COLOR   = {fire:'#ff6a30', abyss:'#b070ff', ice:'#5fb8ff', poison:'#5fff8a', light:'#ffd35a', shadow:'#7a98ff'};
  const NAME    = {fire:'🔥 Огонь', abyss:'🌌 Бездна', ice:'❄️ Лёд', poison:'☠️ Яд', light:'⚡ Свет', shadow:'🌑 Тень'};
  const FLOATS  = new Set(['ice','light','abyss']); // парящие — float, остальные — breath
  const NAMES   = {fire:'Огненный страж', abyss:'Жнец Бездны', ice:'Ледяной воин', poison:'Ядовитый страж',
                   light:'Светоносный', shadow:'Теневой убийца'};
  const bgExt = id => id <= 25 ? 'png' : 'jpg';
  const bots = [];
  for (let id = 1; id <= 33; id++) {
    if (id === 19) continue; // пропуск в наборе ассетов
    const theme = SPECIAL[id] || POOL[(id - 1) % POOL.length];
    bots.push({ id, theme });
  }
  const grid = document.getElementById('grid');
  grid.innerHTML = bots.map(({ id, theme }, i) => {
    const anim = FLOATS.has(theme) ? 'floatA' : 'breath';
    return `
    <div class="card" style="--boss-color:${COLOR[theme]}">
      <div class="bg" style="background-image:url('bot_skins/bg/${id}.${bgExt(id)}')"></div>
      <div class="halo"></div>
      <div class="round"><div class="lbl">РАУНД</div><div class="num">${i + 1}</div></div>
      <div class="player"><img src="warriors/warrior_crit.png" alt="player"></div>
      <div class="vs">VS</div>
      <div class="boss ${anim}"><img src="bot_skins/${id}.png" alt="bot ${id}"></div>
      <div class="vignette"></div>
      <div class="tag">Бот #${id} · ${NAMES[theme]}</div>
      <div class="elem">${NAME[theme]}</div>
    </div>`;
  }).join('');
</script>
</body>
</html>
