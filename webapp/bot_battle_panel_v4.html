<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Панель боя v4 — безрамочные иконки внизу</title>
<style>
  body{margin:0;background:#0a0a12;color:#fff;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;padding:20px 14px 40px;}
  h1{font-size:18px;margin:0 0 4px;text-align:center;letter-spacing:.5px;}
  .sub{text-align:center;color:#8a8aa0;font-size:12px;margin-bottom:20px;}
  .wrap{max-width:420px;margin:24px auto 0;position:relative;}
  .stage{aspect-ratio:9/19;border-radius:14px;overflow:hidden;position:relative;background:#03050f;box-shadow:0 8px 28px rgba(0,0,0,.55);}
  .bg{position:absolute;inset:0;background:url('bot_skins/bg/33.jpg') center/cover;filter:brightness(.6) saturate(1.05);}
  .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.45),rgba(0,0,0,.05) 40%,rgba(0,0,0,.55));}
  .hp-row{position:absolute;top:8px;left:8px;right:8px;display:grid;grid-template-columns:1fr 1fr;gap:6px;z-index:10;}
  .hp-block{padding:5px 9px;border-radius:7px;background:rgba(8,8,18,.86);border:1px solid rgba(0,216,255,.3);}
  .hp-block.opp{border-color:rgba(255,0,112,.42);}
  .hp-name{font-size:10px;font-weight:800;letter-spacing:.8px;color:#00ffe0;font-family:"Consolas",monospace;}
  .hp-block.opp .hp-name{color:#ff3c80;}
  .hp-bar{height:5px;border-radius:3px;background:rgba(0,0,0,.65);overflow:hidden;margin-top:3px;}
  .hp-fill{height:100%;width:88%;background:linear-gradient(90deg,#00ffe0,#5fb8ff);}
  .hp-block.opp .hp-fill{width:64%;background:linear-gradient(90deg,#ff0070,#ff5fa0);}

  .fighters{position:absolute;left:0;right:0;bottom:32%;height:55%;display:flex;align-items:flex-end;justify-content:space-between;padding:0 4%;pointer-events:none;}
  .fighters img{height:100%;object-fit:contain;}
  .fighters .p1{transform:scaleX(-1);}
  .vs{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);font-family:"Consolas",monospace;font-size:46px;font-weight:900;letter-spacing:5px;color:#fff;
      text-shadow:2px 0 0 #00ffe0,-2px 0 0 #ff0070,0 0 14px #ff0070,0 0 18px #00d8ff;}

  /* === ПАНЕЛЬ СНИЗУ — 2 ряда, безрамочные иконки + кнопка === */
  .panel{position:absolute;left:0;right:0;bottom:0;z-index:9;padding:8px 8px 10px;
         background:linear-gradient(to top,rgba(2,5,20,.95) 0%,rgba(2,5,20,.85) 70%,rgba(2,5,20,.6) 100%);
         border-top:1px solid rgba(0,216,255,.35);
         box-shadow:inset 0 1px 0 rgba(0,216,255,.3),0 -2px 14px rgba(0,216,255,.18);}
  .row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .row-lbl{flex:0 0 56px;font-family:"Consolas",monospace;font-size:9px;font-weight:900;letter-spacing:1.6px;text-transform:uppercase;text-align:center;}
  .atk .row-lbl{color:#ff8ac0;text-shadow:0 0 8px rgba(255,80,160,.65);}
  .def .row-lbl{color:#8acfff;text-shadow:0 0 8px rgba(80,180,255,.65);}
  .ic-grid{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
  .ic-btn{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;user-select:none;position:relative;padding:4px 0;transition:transform .15s;}
  .ic-btn:hover{transform:translateY(-1px);}
  /* БЕЗ РАМОК — чисто PNG + glow */
  .ic-btn img{width:38px;height:38px;object-fit:contain;}
  .ic-btn .nm{font-size:8.5px;font-weight:800;letter-spacing:.5px;font-family:"Consolas",monospace;text-transform:uppercase;}
  .atk .ic-btn img{filter:drop-shadow(0 0 6px rgba(255,80,160,.8)) drop-shadow(0 1px 2px rgba(0,0,0,.7));}
  .def .ic-btn img{filter:drop-shadow(0 0 6px rgba(80,180,255,.8)) drop-shadow(0 1px 2px rgba(0,0,0,.7));}
  .atk .ic-btn .nm{color:#ff8ac0;text-shadow:0 0 6px rgba(255,80,160,.6);}
  .def .ic-btn .nm{color:#8acfff;text-shadow:0 0 6px rgba(80,180,255,.6);}

  /* ОРЕОЛ при выборе */
  .ic-btn .halo{position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:54px;height:54px;border-radius:50%;pointer-events:none;opacity:0;}
  .atk .ic-btn .halo{background:radial-gradient(circle,rgba(255,0,112,.55) 0%,transparent 65%);}
  .def .ic-btn .halo{background:radial-gradient(circle,rgba(0,180,255,.55) 0%,transparent 65%);}
  .ic-btn.sel .halo{opacity:1;animation:haloPulse 1.4s ease-in-out infinite;}
  @keyframes haloPulse{0%,100%{transform:translateX(-50%) scale(1);opacity:.85}50%{transform:translateX(-50%) scale(1.15);opacity:1}}
  .atk .ic-btn.sel img{filter:drop-shadow(0 0 18px #ff5fa0) drop-shadow(0 0 8px #fff) drop-shadow(0 1px 2px rgba(0,0,0,.7));animation:icFlash .4s ease-out;}
  .def .ic-btn.sel img{filter:drop-shadow(0 0 18px #5fb8ff) drop-shadow(0 0 8px #fff) drop-shadow(0 1px 2px rgba(0,0,0,.7));animation:icFlash .4s ease-out;}
  @keyframes icFlash{0%{filter:brightness(2.5)}100%{filter:brightness(1)}}
  .ic-btn.sel .nm{color:#fff;}

  /* === ЦЕНТРАЛЬНАЯ «СОВЕРШИТЬ ХОД» === */
  .confirm{margin-top:5px;padding:9px;text-align:center;border-radius:7px;
           font-family:"Consolas",monospace;font-weight:900;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
           background:linear-gradient(180deg,rgba(80,40,140,.6),rgba(40,15,80,.92));
           color:#fff;text-shadow:0 0 8px #c98aff,0 0 14px #ff5fa0;
           border:1.5px solid rgba(255,255,255,.18);
           box-shadow:0 0 14px rgba(180,80,255,.4),inset 0 1px 0 rgba(255,255,255,.18);
           opacity:.45;cursor:not-allowed;transition:opacity .25s;user-select:none;}
  .confirm.ready{opacity:1;cursor:pointer;border-color:#ff5fa0;
                 box-shadow:0 0 18px rgba(255,90,150,.7),0 0 32px rgba(80,180,255,.3),inset 0 1px 0 rgba(255,255,255,.3);
                 animation:cfPulse 1.6s ease-in-out infinite;}
  @keyframes cfPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.18)}}
</style>
</head>
<body>
<h1>Панель боя v4 — безрамочные иконки в нижней панели</h1>
<div class="sub">панель снизу как раньше · но иконки PNG без рамок · «Совершить ход» вместо «Случайный»</div>
<div class="wrap">
  <div class="stage">
    <div class="bg"></div>
    <div class="hp-row">
      <div class="hp-block"><div class="hp-name">FLYKILLER</div><div class="hp-bar"><div class="hp-fill"></div></div></div>
      <div class="hp-block opp"><div class="hp-name">БЕССМЕРТНЫЙ_ХАНТЕР</div><div class="hp-bar"><div class="hp-fill"></div></div></div>
    </div>
    <div class="fighters"><img class="p1" src="warriors/warrior_crit.png"><img src="bot_skins/33.png"></div>
    <div class="vs">VS</div>
    <div class="panel">
      <div class="row atk">
        <div class="row-lbl">АТАКА</div>
        <div class="ic-grid">
          <div class="ic-btn" data-side="atk" data-key="HEAD"><div class="halo"></div><img src="battle_icons/head.png"><div class="nm">Голова</div></div>
          <div class="ic-btn" data-side="atk" data-key="TORSO"><div class="halo"></div><img src="battle_icons/torso.png"><div class="nm">Тело</div></div>
          <div class="ic-btn" data-side="atk" data-key="LEGS"><div class="halo"></div><img src="battle_icons/legs.png"><div class="nm">Ноги</div></div>
        </div>
      </div>
      <div class="row def">
        <div class="row-lbl">ЗАЩИТА</div>
        <div class="ic-grid">
          <div class="ic-btn" data-side="def" data-key="HEAD"><div class="halo"></div><img src="battle_icons/head.png"><div class="nm">Голова</div></div>
          <div class="ic-btn" data-side="def" data-key="TORSO"><div class="halo"></div><img src="battle_icons/torso.png"><div class="nm">Тело</div></div>
          <div class="ic-btn" data-side="def" data-key="LEGS"><div class="halo"></div><img src="battle_icons/legs.png"><div class="nm">Ноги</div></div>
        </div>
      </div>
      <div class="confirm" id="cfm">⚔ Совершить ход</div>
    </div>
  </div>
</div>
<script>
  let selA = null, selD = null;
  const cfm = document.getElementById('cfm');
  const refresh = () => {
    document.querySelectorAll('.atk .ic-btn').forEach(b => b.classList.toggle('sel', b.dataset.key === selA));
    document.querySelectorAll('.def .ic-btn').forEach(b => b.classList.toggle('sel', b.dataset.key === selD));
    cfm.classList.toggle('ready', !!(selA && selD));
  };
  document.addEventListener('click', e => {
    const btn = e.target.closest('.ic-btn');
    if (btn) { if (btn.dataset.side === 'atk') selA = btn.dataset.key; else selD = btn.dataset.key; refresh(); return; }
    if (e.target.closest('#cfm') && cfm.classList.contains('ready')) {
      alert(`Ход: атака=${selA}, защита=${selD}`); selA = null; selD = null; refresh();
    }
  });
</script>
</body>
</html>
