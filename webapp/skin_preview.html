<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SKINS // DUEL ARENA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Inter:wght@400;700;800;900&display=swap');
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cy: #00f0ff;   /* cyan chrome */
  --mg: #ff00cc;   /* magenta */
  --neon-str: #ff5522;
  --neon-agi: #00ff88;
  --neon-crt: #cc44ff;
}

html, body { height: 100%; background: #020209; font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }

/* ══════════ PHONE ══════════ */
.phone {
  width: 390px; height: 100dvh; max-height: 840px;
  margin: 0 auto;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  background: #040212;
  border-left:  1px solid rgba(0,240,255,.12);
  border-right: 1px solid rgba(0,240,255,.12);
}

/* grid overlay */
.phone::before {
  content: '';
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background-image:
    linear-gradient(rgba(0,240,255,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,240,255,.035) 1px, transparent 1px);
  background-size: 36px 36px;
}

/* scanlines */
.phone::after {
  content: '';
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(0,0,0,.18) 2px, rgba(0,0,0,.18) 4px
  );
}

/* bg blobs */
.bg-blur { position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.bg-blob { position: absolute; border-radius: 50%; filter: blur(70px); transition: background 0.6s ease; }
.bg-blob-1 { width: 300px; height: 300px; top: -60px; left: -60px; opacity: 0.18; }
.bg-blob-2 { width: 260px; height: 260px; bottom: 20px; right: -50px; opacity: 0.15; }

/* corner brackets */
.corner { position: absolute; width: 18px; height: 18px; z-index: 20; }
.corner.tl { top:6px; left:6px; border-top:2px solid var(--cy); border-left:2px solid var(--cy); }
.corner.tr { top:6px; right:6px; border-top:2px solid var(--cy); border-right:2px solid var(--cy); }
.corner.bl { bottom:6px; left:6px; border-bottom:2px solid var(--cy); border-left:2px solid var(--cy); }
.corner.br { bottom:6px; right:6px; border-bottom:2px solid var(--cy); border-right:2px solid var(--cy); }

/* ══════════ HEADER ══════════ */
.header {
  position: relative; z-index: 15;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 8px; flex-shrink: 0;
  border-bottom: 1px solid rgba(0,240,255,.1);
}
.header-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--cy);
  text-shadow: 0 0 12px rgba(0,240,255,.6), 0 0 24px rgba(0,240,255,.3);
}
.header-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: rgba(0,240,255,.4); letter-spacing: 1px;
}
.header-count {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px; font-weight: 700;
  color: rgba(0,240,255,.5); letter-spacing: 1px;
}

/* ══════════ TABS ══════════ */
.tabs {
  position: relative; z-index: 15;
  display: flex; gap: 0;
  padding: 6px 16px 10px; flex-shrink: 0;
  border-bottom: 1px solid rgba(0,240,255,.08);
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 8px 4px 7px;
  border: none; background: none; border-radius: 0;
  cursor: pointer; transition: all 0.25s ease;
  user-select: none; -webkit-tap-highlight-color: transparent;
  position: relative;
}
/* active bottom bar */
.tab-btn::after {
  content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%;
  height: 2px; border-radius: 2px; opacity: 0;
  transition: opacity 0.25s ease;
}
.tab-btn.str::after { background: #ff5522; box-shadow: 0 0 8px rgba(255,70,20,.8); }
.tab-btn.agi::after { background: #00ff88; box-shadow: 0 0 8px rgba(0,220,100,.8); }
.tab-btn.crt::after { background: #cc44ff; box-shadow: 0 0 8px rgba(190,60,255,.8); }
.tab-btn.active::after { opacity: 1; }

/* SVG icon — no border, no bg */
.tab-icon {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; line-height: 1;
  opacity: 0.35; transition: all 0.25s ease;
  background: none; border: none;
}
.tab-btn.active .tab-icon { opacity: 1; }

.tab-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 7.5px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
  color: rgba(255,255,255,.2); transition: color 0.25s ease;
}

.tab-btn.str.active .tab-label { color: #ff7733; text-shadow: 0 0 8px rgba(255,100,40,.7); }
.tab-btn.agi.active .tab-label { color: #00ee77; text-shadow: 0 0 8px rgba(0,220,90,.7); }
.tab-btn.crt.active .tab-label { color: #cc66ff; text-shadow: 0 0 8px rgba(170,70,255,.7); }

/* ══════════ STAGE ══════════ */
.stage {
  position: relative; z-index: 5; flex: 1;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; min-height: 0;
}
.aura {
  position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
  width: 380px; height: 260px; border-radius: 50%;
  pointer-events: none; filter: blur(50px); transition: background 0.5s ease; z-index: 1;
}
.floor-oval {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  width: 150px; height: 14px; border-radius: 50%;
  pointer-events: none; filter: blur(8px); transition: background 0.5s ease; z-index: 2;
}

/* floor line (cyberpunk grid line) */
.floor-line {
  position: absolute; bottom: 18px; left: 10%; right: 10%; height: 1px;
  z-index: 4; pointer-events: none;
  transition: background 0.5s ease;
}

.particles { position: absolute; inset: 0; pointer-events: none; z-index: 3; }
.p { position: absolute; border-radius: 50%; opacity: 0; animation: rise 4s ease-in infinite; }
@keyframes rise {
  0%   { opacity:0;   transform:translateY(0)     scale(1); }
  20%  { opacity:0.8; }
  80%  { opacity:0.2; }
  100% { opacity:0;   transform:translateY(-240px) scale(0.3); }
}

/* ── Carousel ── */
.carousel {
  position: relative; z-index: 10;
  display: flex; align-items: flex-end; justify-content: center;
  width: 100%; height: 100%; padding-bottom: 14px;
}
.skin-card {
  position: absolute;
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer;
  transition: all 0.38s cubic-bezier(.34,1.22,.64,1);
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.skin-card[data-pos="-1"] { transform: translateX(-116px) scale(0.7);  opacity: 0.35; filter: brightness(0.5) saturate(0.4); z-index: 5; }
.skin-card[data-pos="0"]  { transform: translateX(0) scale(1);          opacity: 1;    filter: none;                           z-index: 10; }
.skin-card[data-pos="1"]  { transform: translateX(116px) scale(0.7);   opacity: 0.35; filter: brightness(0.5) saturate(0.4); z-index: 5; }

.skin-img-wrap {
  position: relative; width: 170px; height: 300px;
  display: flex; align-items: flex-end; justify-content: center;
}

/* cyberpunk neon frame for active */
.skin-img-wrap::before {
  content: ''; position: absolute; inset: -3px;
  border-radius: 2px;
  opacity: 0; transition: opacity 0.35s ease, box-shadow 0.35s ease;
  pointer-events: none; z-index: 0;
}
.skin-card[data-pos="0"] .skin-img-wrap::before { opacity: 1; }

body.cls-str .skin-card[data-pos="0"] .skin-img-wrap::before {
  border: 1.5px solid rgba(255,80,20,1);
  box-shadow: 0 0 0 1px rgba(255,80,20,.4), 0 0 20px rgba(255,80,20,.7), 0 0 50px rgba(255,80,20,.3), inset 0 0 20px rgba(255,80,20,.08);
}
body.cls-agi .skin-card[data-pos="0"] .skin-img-wrap::before {
  border: 1.5px solid rgba(0,220,80,1);
  box-shadow: 0 0 0 1px rgba(0,220,80,.4), 0 0 20px rgba(0,220,80,.7), 0 0 50px rgba(0,220,80,.3), inset 0 0 20px rgba(0,220,80,.08);
}
body.cls-crt .skin-card[data-pos="0"] .skin-img-wrap::before {
  border: 1.5px solid rgba(180,70,255,1);
  box-shadow: 0 0 0 1px rgba(180,70,255,.4), 0 0 20px rgba(180,70,255,.7), 0 0 50px rgba(180,70,255,.3), inset 0 0 20px rgba(180,70,255,.08);
}

.skin-img {
  position: relative; z-index: 2;
  width: 100%; height: 100%; object-fit: contain; object-position: bottom center;
  filter: drop-shadow(0 10px 28px rgba(0,0,0,.95));
  animation: float 3.8s ease-in-out infinite;
}
.skin-card[data-pos="0"] .skin-img { filter: drop-shadow(0 14px 30px rgba(0,0,0,.95)) brightness(1.1); }

.skin-glow {
  position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
  width: 130px; height: 22px; border-radius: 50%; filter: blur(14px);
  opacity: 0; transition: opacity 0.35s ease; z-index: 1;
}
.skin-card[data-pos="0"] .skin-glow { opacity: 0.9; }

@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

.skin-emoji-fb {
  display: none; font-size: 96px;
  animation: float 3.8s ease-in-out infinite;
  position: relative; z-index: 2; filter: drop-shadow(0 0 28px rgba(0,0,0,.8));
}

/* ── Skin label ── */
.skin-label { margin-top: 8px; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: opacity 0.35s ease; }
.skin-card[data-pos!="0"] .skin-label { opacity: 0.25; }

.skin-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
  color: #fff; text-shadow: 0 0 10px rgba(255,255,255,.4);
}
.skin-bonus {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; font-weight: 700; letter-spacing: .6px;
  padding: 2px 10px; border-radius: 2px;
  background: rgba(0,240,255,.06); border: 1px solid rgba(0,240,255,.2); color: rgba(0,240,255,.7);
}
body.cls-str .skin-card[data-pos="0"] .skin-bonus { color: #ff8855; border-color: rgba(255,100,40,.5); background: rgba(255,80,20,.1); }
body.cls-agi .skin-card[data-pos="0"] .skin-bonus { color: #00ff88; border-color: rgba(0,220,100,.5);  background: rgba(0,200,70,.09); }
body.cls-crt .skin-card[data-pos="0"] .skin-bonus { color: #dd88ff; border-color: rgba(180,70,255,.5); background: rgba(160,50,255,.1); }

/* arrows */
.arrow-zone { position: absolute; top: 0; bottom: 0; width: 55px; z-index: 20; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.arrow-zone.left  { left: 0; }
.arrow-zone.right { right: 0; }
.arrow-icon {
  font-size: 22px; font-weight: 900;
  color: rgba(0,240,255,.15); transition: all 0.2s ease;
  font-family: 'Share Tech Mono', monospace;
}
.arrow-zone:hover .arrow-icon { color: rgba(0,240,255,.7); text-shadow: 0 0 12px rgba(0,240,255,.6); }

/* ══════════ BOTTOM PANEL ══════════ */
.bottom-panel {
  position: relative; z-index: 15; flex-shrink: 0;
  padding: 10px 18px 26px;
  background: linear-gradient(to top, rgba(4,2,18,1) 65%, transparent);
  backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
  display: flex; flex-direction: column; gap: 9px;
  border-top: 1px solid rgba(0,240,255,.1);
}

/* dots */
.skin-dots { display: flex; justify-content: center; gap: 8px; }
.dot { width: 6px; height: 6px; border-radius: 1px; background: rgba(0,240,255,.18); transition: all 0.3s ease; cursor: pointer; }
.dot.active { width: 20px; border-radius: 2px; background: currentColor; box-shadow: 0 0 8px currentColor; }

/* name */
.active-info { text-align: center; }
.active-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
  line-height: 1; transition: color 0.35s ease, text-shadow 0.35s ease;
  animation: glitch-idle 8s ease-in-out infinite;
}
@keyframes glitch-idle {
  0%,94%,100% { text-shadow: 0 0 20px currentColor, 0 0 40px currentColor; clip-path: none; transform: none; }
  95% { transform: translateX(-2px); clip-path: polygon(0 20%,100% 20%,100% 40%,0 40%); filter: hue-rotate(90deg); }
  96% { transform: translateX(2px);  clip-path: polygon(0 60%,100% 60%,100% 80%,0 80%); }
  97% { transform: none; clip-path: none; filter: none; }
}

.active-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
  margin-top: 4px; transition: color 0.35s ease; opacity: .5;
}

body.cls-str .active-name { color: #ff7733; }
body.cls-str .active-sub  { color: #ff7733; }
body.cls-agi .active-name { color: #00ff88; }
body.cls-agi .active-sub  { color: #00ff88; }
body.cls-crt .active-name { color: #cc66ff; }
body.cls-crt .active-sub  { color: #cc66ff; }

/* stats */
.stats-row { display: flex; gap: 6px; }
.stat-box {
  flex: 1; padding: 8px 4px 7px;
  border-radius: 3px;
  clip-path: polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);
  border: 1px solid rgba(0,240,255,.1); background: rgba(0,240,255,.04);
  text-align: center;
}
.stat-val { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; transition: color 0.35s ease; }
.stat-lbl { font-family: 'Share Tech Mono', monospace; font-size: 7.5px; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,.25); margin-top: 2px; }
body.cls-str .stat-val { color: #ff7733; }
body.cls-agi .stat-val { color: #00ff88; }
body.cls-crt .stat-val { color: #cc66ff; }

/* equip btn */
.equip-btn {
  width: 100%; padding: 13px;
  border-radius: 3px;
  clip-path: polygon(12px 0,100% 0,calc(100% - 12px) 100%,0 100%);
  border: none;
  font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; letter-spacing: 1.5px; text-transform: uppercase;
  transition: all 0.25s ease;
  position: relative; overflow: hidden;
}
.equip-btn::before {
  content: ''; position: absolute; top: 0; left: -80%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  transform: skewX(-15deg); animation: shine 2.4s ease-in-out infinite;
}
@keyframes shine { 0%{left:-80%} 60%,100%{left:140%} }
body.cls-str .equip-btn { background: linear-gradient(90deg, #8b1500, #ff5522, #8b1500); background-size:200%; color:#fff; box-shadow:0 0 20px rgba(255,70,20,.5),0 0 50px rgba(255,70,20,.2); animation:btnFlow 3s linear infinite; }
body.cls-agi .equip-btn { background: linear-gradient(90deg, #005520, #00ff88, #005520); background-size:200%; color:#001a0a; box-shadow:0 0 20px rgba(0,220,80,.5),0 0 50px rgba(0,220,80,.2); animation:btnFlow 3s linear infinite; }
body.cls-crt .equip-btn { background: linear-gradient(90deg, #4a0099, #cc44ff, #4a0099); background-size:200%; color:#fff; box-shadow:0 0 20px rgba(180,50,255,.5),0 0 50px rgba(180,50,255,.2); animation:btnFlow 3s linear infinite; }
@keyframes btnFlow { 0%{background-position:0%} 100%{background-position:200%} }
.equip-btn:hover  { transform: translateY(-2px) scaleX(1.02); filter: brightness(1.1); }
.equip-btn:active { transform: scale(0.97); }
</style>
</head>

<div class="phone">

  <div class="corner tr"></div>

    <div>
      <div class="header-logo">DUEL ARENA</div>

        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">

          <polygon points="13,7 19,13 13,19 7,13" fill="#cc44ff" opacity="0.55"/>
          <circle cx="13" cy="13" r="2" fill="#cc44ff"/>
        </svg>

      <div class="tab-label">Интуиция</div>

  <!-- stage -->

    <div class="stats-row" id="statsRow"></div>
    <button class="equip-btn" id="equipBtn" onclick="onEquip()">▶ ВЫБРАТЬ СКИН</button>
  </div>
</div>

    stats:[['2100','АТК'],['800','ЗАЩ'],['1900','СКР']],
    skins:[
      { img:'skins/agility/1.png', name:'ТЕНЬ',    bonus:'+8% УКЛОН',    emoji:'🌑' },

      { img:'skins/agility/3.png', name:'ВЕТЕР',   bonus:'+8% УКЛОН',    emoji:'💨' },
    ],
  },
  crt: {
    label:'Интуиция', btnTxt:'▶ АКТИВИРОВАТЬ',

    aura:'radial-gradient(ellipse, rgba(160,55,255,.22) 0%, transparent 68%)',

    floorLine:'linear-gradient(90deg,transparent,rgba(170,60,255,.8),transparent)',
    pColor:'rgba(170,80,255,',
    stats:[['3200','АТК'],['600','ЗАЩ'],['1100','СКР']],
    skins:[
      { img:'skins/crit/1.png',    name:'РАЗЛОМ',  bonus:'+15% КРИТ',    emoji:'💜' },
      { img:'skins/crit/2.png',    name:'ЭФИР',    bonus:'+15% КРИТ',    emoji:'🔮' },
      { img:'skins/crit/3.png',    name:'АСТРАЛ',  bonus:'+15% КРИТ',    emoji:'✨' },
    ],
  },
};

let curCls  = 'str';
let curSkin = 0;

function renderCarousel() {
  const cls  = CLASSES[curCls];
  const el   = document.getElementById('carousel');
  el.innerHTML = '';
  const glowMap = { str:'rgba(255,80,20,.8)', agi:'rgba(0,220,80,.75)', crt:'rgba(170,60,255,.75)' };
  const glow = glowMap[curCls];

  cls.skins.forEach((sk, i) => {
    const pos = i - curSkin;
    if (Math.abs(pos) > 1) return;
    const card = document.createElement('div');
    card.className   = 'skin-card';
    card.dataset.pos = pos;
    card.onclick = () => selectSkin(i);
    card.innerHTML = `
      <div class="skin-img-wrap">
        <img class="skin-img" src="${sk.img}" alt="${sk.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <div class="skin-emoji-fb">${sk.emoji}</div>
        <div class="skin-glow" style="background:${glow}"></div>
      </div>
      <div class="skin-label">
        <div class="skin-name">${sk.name}</div>
        <div class="skin-bonus">${sk.bonus}</div>
      </div>`;
    el.appendChild(card);
  });

  updateDots();
  updateInfo();
}

function selectSkin(idx) {
  if (idx === curSkin) return;
  curSkin = idx;
  renderCarousel();
}

function slide(dir) {
  const next = curSkin + dir;
  if (next < 0 || next >= CLASSES[curCls].skins.length) return;
  selectSkin(next);
}

function updateDots() {
  const cls  = CLASSES[curCls];
  const clrMap = { str:'#ff7733', agi:'#00ff88', crt:'#cc66ff' };
  document.getElementById('dots').innerHTML = cls.skins.map((_,i) =>
    `<div class="dot${i===curSkin?' active':''}" style="color:${clrMap[curCls]}" onclick="selectSkin(${i})"></div>`
  ).join('');
}

function updateInfo() {
  const cls = CLASSES[curCls];
  const sk  = cls.skins[curSkin];
  const num = String(curSkin+1).padStart(2,'0');
  document.getElementById('activeName').textContent = sk.name;
  document.getElementById('activeSub').textContent  = `${cls.label.toUpperCase()} · СКИН ${num}`;
  document.getElementById('hdrCount').textContent   = `${num} / 03`;
  document.getElementById('statsRow').innerHTML = cls.stats.map(([v,l]) =>
    `<div class="stat-box"><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`
  ).join('');
  document.getElementById('equipBtn').textContent = `${cls.btnTxt} — ${sk.name}`;
}

function setClass(key) {
  if (key === curCls) return;
  curCls  = key;
  curSkin = 0;
  document.body.className = 'cls-' + key;
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab-btn.' + key).classList.add('active');
  const cls = CLASSES[key];
  document.getElementById('blob1').style.background     = cls.blobA;
  document.getElementById('blob2').style.background     = cls.blobB;
  document.getElementById('aura').style.background      = cls.aura;
  document.getElementById('floorOval').style.background = cls.floor;
  document.getElementById('floorLine').style.background = cls.floorLine;
  buildParticles();
  renderCarousel();
}

function buildParticles() {
  const cont = document.getElementById('particles');
  cont.innerHTML = '';
  const col = CLASSES[curCls].pColor;
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div');
    d.className = 'p';
    const sz = 2 + Math.random() * 5;
    /* some particles are square (cyberpunk) */
    const sq = Math.random() > 0.6;
    d.style.cssText = `width:${sz}px;height:${sq?sz*2:sz}px;border-radius:${sq?'1px':'50%'};background:${col}0.9);box-shadow:0 0 ${sz*3}px ${col}1);left:${10+Math.random()*80}%;bottom:${5+Math.random()*30}%;animation-delay:${(Math.random()*4).toFixed(2)}s;animation-duration:${(2.5+Math.random()*3).toFixed(2)}s;`;
    cont.appendChild(d);
  }
}

function onEquip() {
  const sk  = CLASSES[curCls].skins[curSkin];
  const btn = document.getElementById('equipBtn');
  btn.textContent = '✅ СКИН АКТИВИРОВАН';
  btn.style.filter = 'brightness(1.3)';
  setTimeout(() => {
    btn.textContent = `${CLASSES[curCls].btnTxt} — ${sk.name}`;
    btn.style.filter = '';
  }, 1800);
}

/* touch swipe */
let touchX = 0;
const stageEl = document.getElementById('stage');
stageEl.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive:true });
stageEl.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) slide(dx < 0 ? 1 : -1);
}, { passive:true });

/* init */
(() => {
  const cls = CLASSES[curCls];
  document.getElementById('blob1').style.background     = cls.blobA;
  document.getElementById('blob2').style.background     = cls.blobB;
  document.getElementById('aura').style.background      = cls.aura;
  document.getElementById('floorOval').style.background = cls.floor;
  document.getElementById('floorLine').style.background = cls.floorLine;
  buildParticles();
  renderCarousel();
})();
</script>
</body>
</html>
