<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Выбор воина — превью</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #07040f; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
#mock-bg { width: 390px; height: 100dvh; max-height: 840px; background: #0d0b1a; position: relative; display: flex; align-items: flex-end; justify-content: center; }
.open-btn {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  padding: 14px 32px; border-radius: 4px; border: none;
  font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
  background: linear-gradient(135deg, #3d0080, #cc44ff); color: #fff;
  box-shadow: 0 0 22px rgba(180,50,255,.5);
}
.open-btn:hover { filter: brightness(1.1); transform: translate(-50%,-50%) scale(1.03); }
.hint { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: rgba(255,255,255,.25); letter-spacing: 1px; white-space: nowrap; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="mock-bg">
  <button class="open-btn" onclick="openWS()">⚔ ВЫБРАТЬ ВОИНА</button>
  <div class="hint">// warrior select preview //</div>
</div>

<!-- Подключаем стабы чтобы scene_warrior_select.js не упал -->
<script>
window.State = { player: { warrior_type: 'tank' } };
window.Sound = { click: () => {} };
window.tg = null;
async function post(url, data) { console.log('POST', url, data); return { ok: true }; }

// Заглушка MenuScene
function MenuScene() {}
MenuScene.prototype._panels = {};
MenuScene.prototype._activeTab = 'profile';
MenuScene.prototype._buildProfilePanel = function() { console.log('_buildProfilePanel called'); };
MenuScene.prototype._switchTab = function(tab) { console.log('_switchTab:', tab); };
MenuScene.prototype._toast = function(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1f1830;color:#fff;border:1px solid rgba(200,100,255,.5);padding:10px 20px;border-radius:8px;font-size:13px;z-index:99999;box-shadow:0 0 20px rgba(180,50,255,.3)';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
};

const mockScene = new MenuScene();
</script>

<script src="scene_warrior_select.js"></script>

<script>
function openWS() {
  mockScene._openWarriorSelect();
}
// Открываем сразу при загрузке
window.addEventListener('DOMContentLoaded', () => openWS());
</script>
</body>
</html>
