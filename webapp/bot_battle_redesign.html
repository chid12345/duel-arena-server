<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Бой с ботом — Cyberpunk финал</title>
<style>
  body{margin:0;background:#0a0a12;color:#fff;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;padding:18px 10px 40px;}
  h1{font-size:18px;margin:0 0 4px;text-align:center;letter-spacing:.5px;}
  .sub{text-align:center;color:#8a8aa0;font-size:12px;margin-bottom:18px;}
  .wrap{max-width:420px;margin:24px auto 0;position:relative;}
  .label{position:absolute;top:-22px;left:0;font-size:11px;letter-spacing:2px;color:#aaa;text-transform:uppercase;font-weight:700;}
  .card{aspect-ratio:9/19;border-radius:16px;overflow:hidden;position:relative;background:#03050f;box-shadow:0 10px 35px rgba(0,0,0,.6);}
  .bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.78) saturate(1.05);}
  .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.4) 0%,rgba(0,0,0,.05) 35%,rgba(0,0,0,.05) 70%,rgba(0,0,0,.55) 100%);}
  /* HP-бары: толще в 2 раза + сильное внутреннее свечение */
  .hp-row{position:absolute;top:8px;left:8px;right:8px;display:grid;grid-template-columns:1fr 1fr;gap:6px;z-index:10;}
  .hp-block{padding:5px 9px;border-radius:8px;backdrop-filter:blur(12px);background:rgba(8,8,18,.6);
            border:1px solid rgba(0,216,255,.28);}
  .hp-block.opp{border-color:rgba(255,0,112,.4);}
  .hp-name{font-size:10px;font-weight:800;letter-spacing:.8px;color:#00ffe0;
           text-shadow:0 0 10px rgba(0,216,255,.7);font-family:"Consolas",monospace;}
  .hp-block.opp .hp-name{color:#ff3c80;text-shadow:0 0 10px rgba(255,0,112,.7);}
  .hp-num{font-size:9px;opacity:.75;text-align:right;margin-top:2px;font-family:"Consolas",monospace;}
  .hp-bar{height:8px;border-radius:4px;background:rgba(0,0,0,.7);overflow:hidden;margin-top:4px;
          box-shadow:inset 0 1px 2px rgba(0,0,0,.7);}
  .hp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#00ffe0,#5fb8ff);
           box-shadow:0 0 14px #00d8ff, inset 0 0 8px rgba(255,255,255,.45);
           animation:hpFlash 3.5s ease-out infinite;}
  .hp-block.opp .hp-fill{background:linear-gradient(90deg,#ff0070,#ff5fa0);
           box-shadow:0 0 14px #ff0070, inset 0 0 8px rgba(255,255,255,.45);}
  @keyframes hpFlash{0%,92%,100%{filter:brightness(1)}94%{filter:brightness(2.6) saturate(.4)}96%{filter:brightness(1.3)}}
  /* Бойцы: босс на 60% крупнее игрока, ноги уходят под панель */
  .fighter{position:absolute;bottom:5%;display:flex;align-items:flex-end;justify-content:center;}
  .player{left:-2%;width:38%;height:62%;}
  .boss  {right:-3%;width:62%;height:100%;bottom:0;}
  .fighter img{width:100%;height:100%;object-fit:contain;object-position:bottom;
    -webkit-mask-image:linear-gradient(to top,transparent 0%,#000 20%);
            mask-image:linear-gradient(to top,transparent 0%,#000 20%);
    -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
    -webkit-mask-size:100% 100%;mask-size:100% 100%;
    transform-origin:50% 100%;}
  .player img{transform:scaleX(-1);}
  .shadow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:78%;height:14px;
          background:radial-gradient(ellipse at center,rgba(0,0,0,.78) 0%,transparent 70%);
          filter:blur(3px);pointer-events:none;}
  /* VS: крупно + неоновый розовый+голубой mix */
  .vs{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);z-index:8;
      font-size:74px;font-weight:900;color:#fff;font-family:"Consolas",monospace;letter-spacing:8px;
      text-shadow:
        2px 0 0 #00ffe0, -2px 0 0 #ff0070,
        0 0 14px #ff0070, 0 0 24px rgba(255,0,112,.75),
        0 0 18px #00d8ff, 0 0 32px rgba(0,216,255,.6),
        0 4px 10px rgba(0,0,0,.95);
      animation:vsPulse 1.6s ease-in-out infinite;}
  @keyframes vsPulse{0%,100%{transform:translate(-50%,-50%) scale(1);filter:drop-shadow(0 0 10px rgba(255,0,112,.4))}
                     50%{transform:translate(-50%,-50%) scale(1.12);filter:drop-shadow(0 0 20px rgba(0,216,255,.7))}}
  /* Голограмма-панель: МОНОЛИТНАЯ — единый блок с непрозрачным glass-фоном (без полос) */
  .holo{position:absolute;left:0;right:0;bottom:0;z-index:9;padding:8px 10px 9px;
        backdrop-filter:blur(18px) saturate(1.4);
        background:rgba(2,5,20,.78);
        border-top:1px solid #00d8ff;
        box-shadow:inset 0 1px 0 rgba(0,216,255,.4),0 -3px 18px rgba(0,216,255,.22);
        display:flex;flex-direction:column;gap:5px;}
  .row{display:flex;align-items:center;gap:7px;}
  .row-lbl{flex:0 0 auto;font-size:8px;letter-spacing:1.8px;font-weight:800;text-transform:uppercase;
           width:54px;font-family:"Consolas",monospace;}
  .icon-row{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
  .icon-btn{padding:4px 0;border-radius:6px;display:flex;align-items:center;justify-content:center;
            font-size:16px;cursor:pointer;background:rgba(0,0,0,.42);transition:all .12s;}
  .icon-btn:hover{transform:translateY(-1px);}
  .atk .icon-btn{border:1px solid rgba(255,80,160,.6);box-shadow:inset 0 0 8px rgba(255,80,160,.1);}
  .def .icon-btn{border:1px solid rgba(80,160,255,.6);box-shadow:inset 0 0 8px rgba(80,160,255,.1);}
  .atk .icon-btn.sel{background:rgba(255,80,160,.32);border-color:#ff5fa0;
                     box-shadow:0 0 16px rgba(255,80,160,.75),inset 0 0 12px rgba(255,80,160,.28);}
  .def .icon-btn.sel{background:rgba(80,160,255,.32);border-color:#5fa0ff;
                     box-shadow:0 0 16px rgba(80,160,255,.7),inset 0 0 12px rgba(80,160,255,.28);}
  .atk .row-lbl{color:#ff8ac0;text-shadow:0 0 8px rgba(255,80,160,.6);}
  .def .row-lbl{color:#8ab8ff;text-shadow:0 0 8px rgba(80,160,255,.6);}
  .random-btn{margin-top:2px;padding:5px;text-align:center;font-size:9.5px;font-weight:700;letter-spacing:2.5px;
              border-radius:5px;cursor:pointer;
              background:linear-gradient(180deg,#0a0518,#1a0a3a);
              border:1px solid rgba(255,0,112,.6);color:#ff5fa0;
              text-shadow:0 0 8px #ff0070;font-family:"Consolas",monospace;text-transform:uppercase;
              box-shadow:0 0 12px rgba(255,0,112,.4),inset 0 1px 0 rgba(255,0,112,.3);}

  @keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
  .fighter.boss > img{animation:breath 3.4s ease-in-out infinite;transform-origin:50% 100%;}
</style>
</head>
<body>
<h1>Бой с ботом — Cyberpunk финал</h1>
<div class="sub">босс +60% · монолит-панель · толстые HP с свечением · VS неон розовый+голубой</div>
<div class="wrap">
  <div class="label">Cyberpunk · финальная версия</div>
  <div class="card">
    <div class="bg" style="background-image:url('bot_skins/bg/33.jpg')"></div>
    <div class="hp-row">
      <div class="hp-block">
        <div class="hp-name">FLYKILLER</div>
        <div class="hp-bar"><div class="hp-fill" style="width:88%"></div></div>
        <div class="hp-num">1380 / 1562</div>
      </div>
      <div class="hp-block opp">
        <div class="hp-name">БЕССМЕРТНЫЙ_ХАНТЕР</div>
        <div class="hp-bar"><div class="hp-fill" style="width:64%"></div></div>
        <div class="hp-num">820 / 1290</div>
      </div>
    </div>
    <div class="fighter player"><img src="warriors/warrior_crit.png"><div class="shadow"></div></div>
    <div class="vs">VS</div>
    <div class="fighter boss"><img src="bot_skins/33.png"><div class="shadow"></div></div>
    <div class="holo">
      <div class="row atk">
        <div class="row-lbl">АТАКА</div>
        <div class="icon-row">
          <div class="icon-btn sel"><span>🪖</span></div>
          <div class="icon-btn"><span>🛡</span></div>
          <div class="icon-btn"><span>👢</span></div>
        </div>
      </div>
      <div class="row def">
        <div class="row-lbl">ЗАЩИТА</div>
        <div class="icon-row">
          <div class="icon-btn"><span>🪖</span></div>
          <div class="icon-btn sel"><span>🛡</span></div>
          <div class="icon-btn"><span>👢</span></div>
        </div>
      </div>
      <div class="random-btn">🎲 Случайный ход</div>
    </div>
  </div>
</div>
</body>
</html>
