<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Бой с ботом — 2 варианта редизайна</title>
<style>
  body{margin:0;background:#0a0a12;color:#fff;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;padding:18px 10px 40px;}
  h1{font-size:18px;margin:0 0 4px;text-align:center;letter-spacing:.5px;}
  .sub{text-align:center;color:#8a8aa0;font-size:12px;margin-bottom:18px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:24px;max-width:900px;margin:0 auto;}
  .card{aspect-ratio:9/19;border-radius:16px;overflow:hidden;position:relative;background:#000;box-shadow:0 10px 35px rgba(0,0,0,.6);}
  .label{position:absolute;top:-22px;left:0;font-size:11px;letter-spacing:2px;color:#aaa;text-transform:uppercase;font-weight:700;}
  .bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.78) saturate(1.05);}
  .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.4) 0%,rgba(0,0,0,.05) 35%,rgba(0,0,0,.05) 70%,rgba(0,0,0,.55) 100%);}
  /* HP-плашки сверху — тонкие, неоновые, с глассморфизмом */
  .hp-row{position:absolute;top:8px;left:8px;right:8px;display:grid;grid-template-columns:1fr 1fr;gap:6px;z-index:10;}
  .hp-block{padding:5px 9px;border-radius:7px;backdrop-filter:blur(10px);background:rgba(8,8,18,.55);border:1px solid rgba(255,255,255,.08);}
  .hp-name{font-size:10px;font-weight:800;letter-spacing:.8px;}
  .hp-num{font-size:9px;opacity:.7;text-align:right;margin-top:1px;}
  .hp-bar{height:4px;border-radius:2px;background:rgba(0,0,0,.65);overflow:hidden;margin-top:3px;}
  .hp-fill{height:100%;border-radius:2px;}
  /* Бойцы — крупные, в полный рост, фон занимает 80% */
  .fighter{position:absolute;bottom:20%;display:flex;align-items:flex-end;justify-content:center;}
  .player{left:0;width:46%;height:62%;}
  .boss{right:0;width:54%;height:78%;}
  .fighter img{width:100%;height:100%;object-fit:contain;object-position:bottom;
               filter:drop-shadow(0 10px 12px rgba(0,0,0,.85));}
  .player img{transform:scaleX(-1);}
  .vs{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:8;font-weight:900;}
  .platform{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);width:80%;height:14px;border-radius:50%;
            background:radial-gradient(ellipse at center,rgba(0,0,0,.7) 0%,transparent 70%);filter:blur(2px);z-index:1;}
  /* Голографическая панель — стеклянный эффект, не закрывает фон */
  .holo{position:absolute;left:0;right:0;bottom:0;height:20%;backdrop-filter:blur(16px) saturate(1.3);z-index:9;
        padding:8px 8px 9px;border-top:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;gap:5px;}
  .holo-lbl{font-size:8.5px;letter-spacing:2.5px;font-weight:800;text-align:center;text-transform:uppercase;}
  .icon-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;flex:0 0 auto;}
  .icon-btn{aspect-ratio:1.5;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;
            gap:1px;font-size:18px;cursor:pointer;transition:transform .12s ease;}
  .icon-btn:hover{transform:translateY(-1px);}
  .icon-btn .lbl{font-size:7.5px;font-weight:700;letter-spacing:.5px;opacity:.85;}
  .random-btn{padding:6px;text-align:center;border-radius:8px;font-size:10px;font-weight:800;letter-spacing:1px;cursor:pointer;}

  /* ─── ТЕМА A: FANTASY / DARK SOULS ─── */
  .fantasy{background:#1a0e08;}
  .fantasy .hp-name{color:#ffd370;text-shadow:0 0 8px rgba(255,180,40,.5);}
  .fantasy .hp-fill{background:linear-gradient(90deg,#ffc83c,#ff7030);box-shadow:0 0 6px #ffa030;}
  .fantasy .hp-block.opp .hp-name{color:#ff7060;}
  .fantasy .hp-block.opp .hp-fill{background:linear-gradient(90deg,#dc3c46,#ff5050);box-shadow:0 0 6px #dc3c46;}
  .fantasy .vs{font-size:54px;color:#ffc83c;font-family:Georgia,"Times New Roman",serif;
               text-shadow:0 0 20px #ffa030,0 0 6px #fff,0 4px 8px rgba(0,0,0,.9);font-style:italic;}
  .fantasy .holo{background:rgba(28,16,5,.45);border-top-color:rgba(255,180,80,.35);}
  .fantasy .holo-lbl{color:#ffc83c;}
  .fantasy .icon-btn{background:rgba(40,22,8,.55);border:1px solid rgba(255,180,80,.35);
                     box-shadow:inset 0 1px 0 rgba(255,200,100,.2),inset 0 0 12px rgba(255,140,40,.08);color:#fff;}
  .fantasy .icon-btn .lbl{color:#ffd070;}
  .fantasy .icon-btn.atk-sel{background:rgba(220,60,70,.32);border-color:#ff5060;box-shadow:0 0 14px rgba(255,80,80,.55);}
  .fantasy .icon-btn.def-sel{background:rgba(60,140,220,.28);border-color:#5fa0ff;box-shadow:0 0 14px rgba(100,160,255,.5);}
  .fantasy .random-btn{background:linear-gradient(180deg,#8a4810,#3a1808);border:1px solid #ffa040;color:#ffd070;
                       box-shadow:0 2px 8px rgba(255,140,40,.35),inset 0 1px 0 rgba(255,200,100,.25);}

  /* ─── ТЕМА B: CYBERPUNK ─── */
  .cyber{background:#03050f;}
  .cyber .hp-block{border-color:rgba(0,216,255,.28);}
  .cyber .hp-name{color:#00ffe0;text-shadow:0 0 10px rgba(0,216,255,.7);font-family:"Consolas",monospace;}
  .cyber .hp-fill{background:linear-gradient(90deg,#00ffe0,#5fb8ff);box-shadow:0 0 8px #00d8ff;}
  .cyber .hp-block.opp{border-color:rgba(255,0,112,.4);}
  .cyber .hp-block.opp .hp-name{color:#ff3c80;text-shadow:0 0 10px rgba(255,0,112,.7);}
  .cyber .hp-block.opp .hp-fill{background:linear-gradient(90deg,#ff0070,#ff5fa0);box-shadow:0 0 8px #ff0070;}
  .cyber .vs{font-size:48px;color:#fff;font-family:"Consolas",monospace;letter-spacing:6px;font-weight:900;
             text-shadow:2px 0 0 #00ffe0,-2px 0 0 #ff0070,0 0 18px rgba(0,216,255,.6),0 4px 8px rgba(0,0,0,.9);}
  .cyber .holo{background:rgba(2,5,18,.55);border-top:1px solid #00d8ff;
               box-shadow:inset 0 1px 0 rgba(0,216,255,.35),0 -2px 14px rgba(0,216,255,.18);}
  .cyber .holo-lbl{color:#00d8ff;font-family:"Consolas",monospace;letter-spacing:3.5px;}
  .cyber .icon-btn{background:rgba(8,12,30,.62);border:1px solid #00d8ff;color:#fff;
                   box-shadow:0 0 8px rgba(0,216,255,.35),inset 0 0 10px rgba(0,216,255,.1);}
  .cyber .icon-btn .lbl{color:#00d8ff;font-family:"Consolas",monospace;letter-spacing:1px;}
  .cyber .icon-btn.atk-sel{background:rgba(255,0,112,.22);border-color:#ff0070;box-shadow:0 0 18px rgba(255,0,112,.7),inset 0 0 12px rgba(255,0,112,.25);}
  .cyber .icon-btn.def-sel{background:rgba(0,216,255,.22);border-color:#00ffe0;box-shadow:0 0 18px rgba(0,216,255,.65),inset 0 0 12px rgba(0,216,255,.25);}
  .cyber .random-btn{background:linear-gradient(180deg,#0a0518,#1a0a3a);border:1px solid #ff0070;color:#ff5fa0;
                     text-shadow:0 0 10px #ff0070;font-family:"Consolas",monospace;letter-spacing:3px;text-transform:uppercase;
                     box-shadow:0 0 14px rgba(255,0,112,.5),inset 0 1px 0 rgba(255,0,112,.4);}

  @keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
  .breath > img{animation:breath 3.4s ease-in-out infinite;transform-origin:50% 100%;}
</style>
</head>
<body>
<h1>Бой с ботом — 2 варианта редизайна</h1>
<div class="sub">фон+бойцы 80% высоты · тонкие неон-HP сверху · иконки вместо текста · голограмма-панель</div>
<div class="grid" id="grid"></div>
<script>
  const cards = [
    { theme:'fantasy', label:'Вариант A — Fantasy', botId:15, bgExt:'png' },
    { theme:'cyber',   label:'Вариант B — Cyberpunk', botId:33, bgExt:'jpg' },
  ];
  const grid = document.getElementById('grid');
  grid.innerHTML = cards.map(c => `
    <div style="position:relative;padding-top:24px;">
      <div class="label">${c.label}</div>
      <div class="card ${c.theme}">
        <div class="bg" style="background-image:url('bot_skins/bg/${c.botId}.${c.bgExt}')"></div>
        <div class="hp-row">
          <div class="hp-block">
            <div class="hp-name">FLYKILLER</div>
            <div class="hp-bar"><div class="hp-fill" style="width:88%"></div></div>
            <div class="hp-num">1380 / 1562</div>
          </div>
          <div class="hp-block opp">
            <div class="hp-name">БЕССМЕРТНЫЙ_ХАНТЕР</div>
            <div class="hp-bar"><div class="hp-fill" style="width:64%"></div></div>
            <div class="hp-num">820 / 1290</div>
          </div>
        </div>
        <div class="platform"></div>
        <div class="fighter player"><img src="warriors/warrior_crit.png"></div>
        <div class="vs">VS</div>
        <div class="fighter boss breath"><img src="bot_skins/${c.botId}.png"></div>
        <div class="holo">
          <div class="holo-lbl">⚔ Атака   ·   🛡 Защита</div>
          <div class="icon-row">
            <div class="icon-btn atk-sel"><span>🪖</span><span class="lbl">ГОЛОВА</span></div>
            <div class="icon-btn"><span>🛡</span><span class="lbl">ТЕЛО</span></div>
            <div class="icon-btn def-sel"><span>👢</span><span class="lbl">НОГИ</span></div>
          </div>
          <div class="random-btn">🎲 Случайный ход</div>
        </div>
      </div>
    </div>`).join('');
</script>
</body>
</html>
