<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Бой с ботом — редизайн v2</title>
<style>
  body{margin:0;background:#0a0a12;color:#fff;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;padding:18px 10px 40px;}
  h1{font-size:18px;margin:0 0 4px;text-align:center;letter-spacing:.5px;}
  .sub{text-align:center;color:#8a8aa0;font-size:12px;margin-bottom:18px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:24px;max-width:900px;margin:0 auto;}
  .label{position:absolute;top:-22px;left:0;font-size:11px;letter-spacing:2px;color:#aaa;text-transform:uppercase;font-weight:700;}
  .card{aspect-ratio:9/19;border-radius:16px;overflow:hidden;position:relative;background:#000;box-shadow:0 10px 35px rgba(0,0,0,.6);}
  .bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.78) saturate(1.05);}
  .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.4) 0%,rgba(0,0,0,.05) 35%,rgba(0,0,0,.05) 70%,rgba(0,0,0,.55) 100%);}
  /* Тонкие неон-HP сверху + glassmorphism */
  .hp-row{position:absolute;top:8px;left:8px;right:8px;display:grid;grid-template-columns:1fr 1fr;gap:6px;z-index:10;}
  .hp-block{padding:5px 9px;border-radius:7px;backdrop-filter:blur(10px);background:rgba(8,8,18,.55);border:1px solid rgba(255,255,255,.08);}
  .hp-name{font-size:10px;font-weight:800;letter-spacing:.8px;}
  .hp-num{font-size:9px;opacity:.7;text-align:right;margin-top:1px;}
  .hp-bar{height:4px;border-radius:2px;background:rgba(0,0,0,.65);overflow:hidden;margin-top:3px;position:relative;}
  .hp-fill{height:100%;border-radius:2px;animation:hpFlash 3.5s ease-out infinite;}
  @keyframes hpFlash{0%,92%,100%{filter:brightness(1)}94%{filter:brightness(2.4) saturate(.4)}96%{filter:brightness(1.2)}}
  /* Бойцы — большие, ноги уходят под панель + маска растворения + тень */
  .fighter{position:absolute;bottom:5%;display:flex;align-items:flex-end;justify-content:center;}
  .player{left:-2%;width:42%;height:75%;}
  .boss{right:-2%;width:50%;height:85%;}
  .fighter img{width:100%;height:100%;object-fit:contain;object-position:bottom;
    -webkit-mask-image:linear-gradient(to top,transparent 0%,#000 20%);
            mask-image:linear-gradient(to top,transparent 0%,#000 20%);
    -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
    -webkit-mask-size:100% 100%;mask-size:100% 100%;
    transform-origin:50% 100%;}
  .player img{transform:scaleX(-1);}
  /* Тень-эллипс под каждым бойцом */
  .shadow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:78%;height:14px;
          background:radial-gradient(ellipse at center,rgba(0,0,0,.75) 0%,transparent 70%);
          filter:blur(3px);pointer-events:none;}
  /* VS — крупно + пульс */
  .vs{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);z-index:8;font-weight:900;
      animation:vsPulse 1.6s ease-in-out infinite;}
  @keyframes vsPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.14);opacity:.85}}
  /* Голограмма — стеклянная панель снизу, бойцы заходят под неё */
  .holo{position:absolute;left:0;right:0;bottom:0;backdrop-filter:blur(14px) saturate(1.3);z-index:9;
        padding:7px 10px 7px;border-top:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;gap:4px;}
  .row{display:flex;align-items:center;gap:6px;}
  .row-lbl{flex:0 0 auto;font-size:8px;letter-spacing:1.5px;font-weight:800;text-transform:uppercase;width:54px;}
  .icon-row{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
  .icon-btn{padding:3px 0;border-radius:6px;display:flex;align-items:center;justify-content:center;
            font-size:15px;cursor:pointer;background:rgba(0,0,0,.55);transition:all .12s;}
  .icon-btn:hover{transform:translateY(-1px);}
  /* Атака — розовый контур, защита — синий (универсально для тем) */
  .atk .icon-btn{border:1px solid rgba(255,80,160,.55);box-shadow:inset 0 0 8px rgba(255,80,160,.08);}
  .def .icon-btn{border:1px solid rgba(80,160,255,.55);box-shadow:inset 0 0 8px rgba(80,160,255,.08);}
  .atk .icon-btn.sel{background:rgba(255,80,160,.32);border-color:#ff5fa0;box-shadow:0 0 14px rgba(255,80,160,.7),inset 0 0 12px rgba(255,80,160,.25);}
  .def .icon-btn.sel{background:rgba(80,160,255,.32);border-color:#5fa0ff;box-shadow:0 0 14px rgba(80,160,255,.7),inset 0 0 12px rgba(80,160,255,.25);}
  .atk .row-lbl{color:#ff8ac0;}
  .def .row-lbl{color:#8ab8ff;}
  .random-btn{margin-top:2px;padding:4px;text-align:center;font-size:9.5px;font-weight:700;letter-spacing:1.5px;
              border-radius:5px;cursor:pointer;}

  /* ─── ТЕМА A: FANTASY ─── */
  .fantasy{background:#1a0e08;}
  .fantasy .hp-name{color:#ffd370;text-shadow:0 0 8px rgba(255,180,40,.5);}
  .fantasy .hp-fill{background:linear-gradient(90deg,#ffc83c,#ff7030);box-shadow:0 0 6px #ffa030;}
  .fantasy .hp-block.opp .hp-name{color:#ff7060;}
  .fantasy .hp-block.opp .hp-fill{background:linear-gradient(90deg,#dc3c46,#ff5050);box-shadow:0 0 6px #dc3c46;}
  .fantasy .vs{font-size:64px;color:#ffc83c;font-family:Georgia,serif;font-style:italic;
               text-shadow:0 0 22px #ffa030,0 0 6px #fff,0 4px 8px rgba(0,0,0,.9);}
  .fantasy .holo{background:rgba(28,16,5,.42);}
  .fantasy .random-btn{background:linear-gradient(180deg,#5a2810,#2a1006);border:1px solid rgba(255,160,60,.5);color:#ffd070;}

  /* ─── ТЕМА B: CYBERPUNK ─── */
  .cyber{background:#03050f;}
  .cyber .hp-block{border-color:rgba(0,216,255,.28);}
  .cyber .hp-name{color:#00ffe0;text-shadow:0 0 10px rgba(0,216,255,.7);font-family:"Consolas",monospace;}
  .cyber .hp-fill{background:linear-gradient(90deg,#00ffe0,#5fb8ff);box-shadow:0 0 8px #00d8ff;}
  .cyber .hp-block.opp{border-color:rgba(255,0,112,.4);}
  .cyber .hp-block.opp .hp-name{color:#ff3c80;text-shadow:0 0 10px rgba(255,0,112,.7);}
  .cyber .hp-block.opp .hp-fill{background:linear-gradient(90deg,#ff0070,#ff5fa0);box-shadow:0 0 8px #ff0070;}
  .cyber .vs{font-size:60px;color:#fff;font-family:"Consolas",monospace;letter-spacing:6px;
             text-shadow:2px 0 0 #00ffe0,-2px 0 0 #ff0070,0 0 22px rgba(0,216,255,.65),0 4px 8px rgba(0,0,0,.9);}
  .cyber .holo{background:rgba(2,5,18,.50);border-top:1px solid #00d8ff;
               box-shadow:inset 0 1px 0 rgba(0,216,255,.35),0 -2px 14px rgba(0,216,255,.2);}
  .cyber .random-btn{background:linear-gradient(180deg,#0a0518,#1a0a3a);border:1px solid rgba(255,0,112,.6);color:#ff5fa0;
                     text-shadow:0 0 8px #ff0070;font-family:"Consolas",monospace;letter-spacing:2.5px;text-transform:uppercase;}

  @keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
  .fighter.boss > img{animation:breath 3.4s ease-in-out infinite;transform-origin:50% 100%;}
</style>
</head>
<body>
<h1>Бой с ботом — редизайн v2 (по ТЗ)</h1>
<div class="sub">маска ступней · ноги уходят под стеклянную панель · 2 ряда (атака розовый / защита синий) · VS-пульс · HP-вспышка</div>
<div class="grid" id="grid"></div>
<script>
  const cards = [
    { theme:'fantasy', label:'Вариант A — Fantasy', botId:15, bgExt:'png' },
    { theme:'cyber',   label:'Вариант B — Cyberpunk', botId:33, bgExt:'jpg' },
  ];
  document.getElementById('grid').innerHTML = cards.map(c => `
    <div style="position:relative;padding-top:24px;">
      <div class="label">${c.label}</div>
      <div class="card ${c.theme}">
        <div class="bg" style="background-image:url('bot_skins/bg/${c.botId}.${c.bgExt}')"></div>
        <div class="hp-row">
          <div class="hp-block">
            <div class="hp-name">FLYKILLER</div>
            <div class="hp-bar"><div class="hp-fill" style="width:88%"></div></div>
            <div class="hp-num">1380 / 1562</div>
          </div>
          <div class="hp-block opp">
            <div class="hp-name">БЕССМЕРТНЫЙ_ХАНТЕР</div>
            <div class="hp-bar"><div class="hp-fill" style="width:64%"></div></div>
            <div class="hp-num">820 / 1290</div>
          </div>
        </div>
        <div class="fighter player"><img src="warriors/warrior_crit.png"><div class="shadow"></div></div>
        <div class="vs">VS</div>
        <div class="fighter boss"><img src="bot_skins/${c.botId}.png"><div class="shadow"></div></div>
        <div class="holo">
          <div class="row atk">
            <div class="row-lbl">АТАКА</div>
            <div class="icon-row">
              <div class="icon-btn sel"><span>🪖</span></div>
              <div class="icon-btn"><span>🛡</span></div>
              <div class="icon-btn"><span>👢</span></div>
            </div>
          </div>
          <div class="row def">
            <div class="row-lbl">ЗАЩИТА</div>
            <div class="icon-row">
              <div class="icon-btn"><span>🪖</span></div>
              <div class="icon-btn sel"><span>🛡</span></div>
              <div class="icon-btn"><span>👢</span></div>
            </div>
          </div>
          <div class="random-btn">🎲 Случайный ход</div>
        </div>
      </div>
    </div>`).join('');
</script>
</body>
</html>
