<!DOCTYPE html>
<!-- build:__BUILD_VERSION__ -->
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="build" content="__BUILD_VERSION__">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#12121c">
<title>Duel Arena</title>
<script>
(function(){
  var v='__BUILD_VERSION__',k='_da_bv';
  try{
    if(localStorage.getItem(k)!==v){
      localStorage.setItem(k,v);
      // Сохраняем hash (в нём Telegram Desktop хранит initData)
      var base=location.origin+location.pathname;
      location.replace(base+'?bv='+v+(location.hash||''));
      throw 0;
    }
  }catch(e){if(e!==0)throw e;}
})();
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #12121c;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: none;
  }
  #game-canvas {
    display: block;
    margin: 0 auto;
  }
  #loading-screen {
    position: fixed; inset: 0;
    background: #12121c;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s;
  }
  #loading-screen .logo {
    font-size: 2.2rem; font-weight: 900;
    color: #ffc83c;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-shadow: 0 0 24px #ffc83c88;
  }
  #loading-screen .sub {
    color: #8888aa; font-size: 0.85rem; margin-bottom: 32px;
  }
  #loading-bar-wrap {
    width: 200px; height: 6px;
    background: #2a2840; border-radius: 3px; overflow: hidden;
  }
  #loading-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #5096ff, #ffc83c);
    border-radius: 3px;
    transition: width 0.3s;
  }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="logo">⚔️ DUEL ARENA</div>
  <div class="sub">Подготовка арены...</div>
  <div id="loading-bar-wrap">
    <div id="loading-bar"></div>
  </div>
</div>

<!-- Phaser 3 CDN -->
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<!-- Telegram WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<!-- Звук (до game.js) -->
<script src="sound.js?v=__BUILD_VERSION__"></script>
<!-- Сцены -->
<script src="scene_stats.js?v=__BUILD_VERSION__"></script>
<script src="scene_queue.js?v=__BUILD_VERSION__"></script>
<script src="scene_extras.js?v=__BUILD_VERSION__"></script>
<!-- Основная игра (последним — регистрирует Phaser.Game) -->
<script src="game.js?v=__BUILD_VERSION__"></script>
</body>
</html>
