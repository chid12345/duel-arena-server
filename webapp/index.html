<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="build" content="__BUILD_VERSION__">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#12121c">
<title>Duel Arena</title>
<script>
(function(){
  var v='__BUILD_VERSION__',k='_da_bv';
  try{
    if(localStorage.getItem(k)!==v){
      localStorage.setItem(k,v);
      // Сохраняем hash (в нём Telegram Desktop хранит initData)
      var base=location.origin+location.pathname;
      location.replace(base+'?bv='+v+(location.hash||''));
      throw 0;
    }
  }catch(e){if(e!==0)throw e;}
})();
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #12121c;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: none;
  }
  #game-canvas {
    display: block;
    margin: 0 auto;
  }

  /* ── Battle Log Overlay ─────────────────────────────────────── */
  #battle-log-overlay {
    position: fixed;
    display: none;
    pointer-events: none;
    z-index: 50;
    border-radius: 8px;
    overflow: hidden;
  }
  #battle-log-scroll {
    width: 100%; height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    background: rgba(6, 5, 16, 0.82);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    padding: 4px 8px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  #battle-log-scroll::-webkit-scrollbar { display: none; }

  #battle-log-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 1px;
    justify-content: flex-end;
    min-height: 100%;
  }
  #battle-log-list li {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 11px;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0;
    animation: logFadeIn 0.18s ease forwards;
  }
  @keyframes logFadeIn {
    from { opacity: 0; transform: translateY(2px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* Цветовая кодировка */
  .log-crit   { color: #ff3344; font-weight: 700; text-shadow: 0 0 5px #ff334455; }
  .log-dodge  { color: #28d4f0; }
  .log-block  { color: #6ab0ff; }
  .log-miss   { color: #aaaacc; font-style: italic; }
  .log-heal   { color: #3cd870; }
  .log-system { color: #ffc83c; font-weight: 600; }
  .log-normal { color: #c0b8e0; }
  #loading-screen {
    position: fixed; inset: 0;
    background: #12121c;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s;
  }
  #loading-screen .logo {
    font-size: 2.2rem; font-weight: 900;
    color: #ffc83c;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-shadow: 0 0 24px #ffc83c88;
  }
  #loading-screen .sub {
    color: #ccccee; font-size: 0.85rem; margin-bottom: 32px;
  }
  #loading-bar-wrap {
    width: 200px; height: 6px;
    background: #2a2840; border-radius: 3px; overflow: hidden;
  }
  #loading-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #5096ff, #ffc83c);
    border-radius: 3px;
    transition: width 0.3s;
  }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="logo">⚔️ DUEL ARENA</div>
  <div class="sub" id="loading-sub">Подготовка арены...</div>
  <div id="loading-bar-wrap">
    <div id="loading-bar"></div>
  </div>
</div>
<script>
// Watchdog: если loading screen не убран за 10с — показываем ошибку
setTimeout(function(){
  var ls = document.getElementById('loading-screen');
  var sub = document.getElementById('loading-sub');
  if (ls && ls.parentNode && sub) {
    sub.textContent = '❌ Не удалось загрузить. Закройте и откройте заново.';
    sub.style.color = '#dc3c46';
  }
}, 10000);
</script>
