<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BOSS RAID — preview v11 (кастомный кубик)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#0a0a0f;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;color:#fff;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
  #wrap{display:flex;justify-content:center;align-items:center;width:100%;height:100%;padding:10px}

  /* Каркас «телефона» — спокойная рамка, лёгкие сканлайны */
  #app{position:relative;width:390px;height:780px;background:#02000a url('bosses/bg/lava.png') center/cover no-repeat;overflow:hidden;display:flex;flex-direction:column;border-radius:6px;box-shadow:0 0 40px rgba(255,90,40,.2),0 0 80px rgba(180,80,255,.08)}
  /* Сканлайны для CRT-эффекта */
  #app::after{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.15) 2px 3px);z-index:50;opacity:.4}

  /* ────────── ШАПКА (наверху, sticky-стиль) ────────── */
  .hdr{position:relative;z-index:10;flex-shrink:0;padding:8px 12px 4px;background:linear-gradient(180deg,rgba(0,0,0,.78),rgba(0,0,0,.38));border-bottom:1px solid rgba(255,0,85,.25)}
  .hdr-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
  .hdr-back{font-size:24px;color:#00f5ff;cursor:pointer;text-shadow:0 0 8px rgba(0,245,255,.6);line-height:1;display:flex;flex-direction:column;align-items:center}
  .hdr-back::after{content:'НАЗАД';font-size:6px;font-weight:700;letter-spacing:1.2px;color:rgba(0,245,255,.6);margin-top:-2px}
  .hdr-title{font-size:14px;font-weight:900;letter-spacing:3px;flex:1;text-align:center;background:linear-gradient(90deg,#ff0099,#bf00ff,#00f5ff,#ff0099);background-size:200% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:shine 3s linear infinite;filter:drop-shadow(0 0 8px rgba(255,0,153,.7))}
  @keyframes shine{to{background-position:200% 0}}
  .hdr-r{display:flex;align-items:center;gap:6px}
  .phase{font-size:9px;font-weight:800;letter-spacing:1.5px;padding:3px 7px;border-radius:5px;background:rgba(255,0,85,.18);border:1px solid rgba(255,0,85,.45);color:#ff5588}
  .timer{display:flex;align-items:center;gap:5px;background:rgba(0,255,159,.08);border:1px solid rgba(0,255,159,.3);border-radius:6px;padding:3px 8px;font-family:'Courier New',monospace;font-size:13px;font-weight:700;color:#00FF9F;text-shadow:0 0 8px #00FF9F}
  .timer::before{content:'';width:5px;height:5px;border-radius:50%;background:#00FF9F;box-shadow:0 0 5px #00FF9F;animation:tdot 1s infinite}
  @keyframes tdot{0%,100%{opacity:1}50%{opacity:.2}}
  .hp-row{display:flex;align-items:center;gap:8px;padding-top:3px}
  .hp-lbl{font-size:10px;font-weight:900;letter-spacing:1.5px;color:#ff3377;text-shadow:0 0 6px #ff0099,0 0 12px rgba(255,0,153,.5);font-family:'Courier New',monospace}
  .hp-track{flex:1;height:12px;border-radius:6px;background:rgba(0,0,0,.65);border:1.5px solid rgba(255,0,153,.6);overflow:hidden;position:relative;box-shadow:inset 0 0 8px rgba(0,0,0,.8),0 0 8px rgba(255,0,153,.3)}
  .hp-fill{height:100%;width:54%;background:linear-gradient(90deg,#ff0099,#ff5588,#ffb700,#ff5588,#ff0099);background-size:200% 100%;box-shadow:0 0 18px rgba(255,0,153,1),inset 0 0 8px rgba(255,255,255,.4);transition:width .4s;animation:flow 1.6s linear infinite;position:relative}
  @keyframes flow{to{background-position:200% 0}}
  .hp-fill::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 8px,rgba(255,255,255,.22) 8px 9px);animation:stripe 1s linear infinite}
  @keyframes stripe{to{background-position:9px 0}}
  /* Стеклянная подсветка сверху бара */
  .hp-track::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,255,255,.25),transparent);pointer-events:none;z-index:2;border-radius:5px 5px 0 0}
  .hp-num{font-family:'Courier New',monospace;font-size:11px;color:#fff;font-weight:900;white-space:nowrap;text-shadow:0 0 6px #ff0099,0 0 14px rgba(255,0,153,.7);letter-spacing:.5px}
  .hp-num b{color:#ffd700;text-shadow:0 0 6px #ff8c00,0 0 12px rgba(255,140,0,.6)}
  .hist{display:flex;align-items:center;gap:6px;padding:5px 0 1px;font-family:Consolas,monospace;font-size:8.5px;color:rgba(220,220,235,.85);letter-spacing:.6px}
  .hist-lbl{text-transform:uppercase;font-weight:800;color:#ff8aa8;text-shadow:0 0 6px rgba(255,80,160,.55);white-space:nowrap}
  .hist-row{display:flex;gap:4px}
  .hist-cell{width:20px;height:20px;border-radius:5px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;background:rgba(8,5,18,.6)}
  .hist-cell.ok{border-color:#00ff88;box-shadow:0 0 10px rgba(0,255,136,.7),inset 0 0 4px rgba(0,255,136,.25);background:rgba(0,80,40,.4)}
  .hist-cell.bad{border-color:#ff3344;box-shadow:0 0 10px rgba(255,51,68,.7),inset 0 0 4px rgba(255,51,68,.25);background:rgba(80,0,15,.4)}
  .hist-cell img{width:13px;height:13px;object-fit:contain}
  .ticker{padding:3px 0;background:rgba(0,0,0,.4);overflow:hidden;white-space:nowrap;font-size:9px;color:rgba(224,224,224,.55)}
  .ticker-in{display:inline-block;padding-left:14px;animation:scroll 18s linear infinite}
  @keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  .ticker .nm{color:#00BFFF}
  .ticker .dm{color:#00FF9F;font-family:monospace;font-weight:700}

  /* ────────── БОССОВАЯ ЗОНА (середина) ────────── */
  .arena{position:relative;flex:1 1 auto;min-height:0;overflow:hidden}
  /* Энергетический круг под боссом — пульсирует */
  .boss-aura{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:90%;height:90%;border-radius:50%;background:radial-gradient(circle,rgba(255,80,40,.25) 0%,rgba(191,0,255,.15) 40%,transparent 70%);pointer-events:none;animation:aura 3s ease-in-out infinite}
  @keyframes aura{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.85}50%{transform:translate(-50%,-50%) scale(1.08);opacity:1}}
  .boss-img{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:78%;height:78%;object-fit:contain;filter:drop-shadow(0 0 30px rgba(255,80,40,.7)) drop-shadow(0 0 60px rgba(191,0,255,.4));pointer-events:none;animation:breath 3.4s ease-in-out infinite;z-index:2}
  @keyframes breath{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.025)}}
  .boss-shadow{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);width:50%;height:18px;background:radial-gradient(ellipse,rgba(255,80,40,.5) 0%,rgba(191,0,255,.25) 40%,transparent 70%);pointer-events:none;z-index:1}

  /* AUTO — компактно, верхний правый угол арены, неоновый */
  .auto-btn{position:absolute;top:8px;right:8px;z-index:14;width:46px;padding:5px 0;border-radius:9px;background:linear-gradient(135deg,rgba(15,5,30,.92),rgba(40,5,60,.92));border:1.5px solid rgba(180,80,255,.6);font-family:Consolas,monospace;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .2s;box-shadow:0 0 10px rgba(180,80,255,.4)}
  .auto-btn .ic{font-size:18px;line-height:1;filter:drop-shadow(0 0 4px rgba(180,80,255,.8))}
  .auto-btn .lb{font-size:7px;font-weight:900;letter-spacing:.6px;color:#cc99ff;text-transform:uppercase;text-shadow:0 0 4px rgba(180,80,255,.7)}
  .auto-btn.on{border-color:#00ff88;background:linear-gradient(135deg,rgba(0,80,40,.85),rgba(0,40,20,.95));box-shadow:0 0 22px rgba(0,255,136,.7),inset 0 0 8px rgba(0,255,136,.2);animation:autoOn 1.6s ease-in-out infinite}
  @keyframes autoOn{0%,100%{box-shadow:0 0 22px rgba(0,255,136,.7)}50%{box-shadow:0 0 34px rgba(0,255,136,1),0 0 50px rgba(0,255,136,.4)}}
  .auto-btn.on .lb{color:#00ff88;text-shadow:0 0 6px #00ff88}
  .auto-btn.on .ic{filter:drop-shadow(0 0 8px #00ff88)}

  /* Колонки АТАКА слева / ЗАЩИТА справа — внизу боссовой зоны, на уровне 🎲 */
  .col{position:absolute;display:flex;flex-direction:column;gap:6px;z-index:12;bottom:14px;align-items:center}
  .col-atk{left:6px}
  .col-def{right:6px}
  .col-lbl{font-size:9px;font-weight:900;letter-spacing:1.4px;text-align:center;font-family:Consolas,monospace;text-transform:uppercase;margin-bottom:0}
  .col-atk .col-lbl{color:#ff8ac0;text-shadow:0 0 6px rgba(255,80,160,.65)}
  .col-def .col-lbl{color:#8acfff;text-shadow:0 0 6px rgba(80,180,255,.65)}
  /* Зоны атаки/защиты — голые skin-style: только иконка + надпись + парение
     Без рамки, без фона, без box-shadow на самой кнопке. */
  .ic-btn{width:54px;display:flex;flex-direction:column;align-items:center;cursor:pointer;background:transparent;border:none;padding:0;user-select:none;animation:float 2.6s ease-in-out infinite}
  .ic-btn:nth-child(2){animation-delay:.4s}
  .ic-btn:nth-child(3){animation-delay:.8s}
  .ic-btn img{width:32px;height:32px;object-fit:contain;transition:filter .2s,transform .2s}
  .ic-btn .nm{font-size:8px;font-weight:800;letter-spacing:.5px;font-family:Consolas,monospace;text-transform:uppercase;margin-top:3px;text-shadow:0 1px 3px rgba(0,0,0,.95)}
  .col-atk .ic-btn img{filter:drop-shadow(0 0 6px rgba(255,80,160,.8)) drop-shadow(0 1px 2px rgba(0,0,0,.85))}
  .col-def .ic-btn img{filter:drop-shadow(0 0 6px rgba(80,180,255,.8)) drop-shadow(0 1px 2px rgba(0,0,0,.85))}
  .col-atk .ic-btn .nm{color:#ff8ac0;text-shadow:0 0 6px rgba(255,80,160,.7),0 1px 3px rgba(0,0,0,.95)}
  .col-def .ic-btn .nm{color:#8acfff;text-shadow:0 0 6px rgba(80,180,255,.7),0 1px 3px rgba(0,0,0,.95)}
  /* Выбранная зона — БЕЗ рамки, только усиленное свечение иконки */
  .col-atk .ic-btn.sel img{filter:drop-shadow(0 0 18px #ff5fa0) drop-shadow(0 0 10px #fff);transform:scale(1.18)}
  .col-def .ic-btn.sel img{filter:drop-shadow(0 0 18px #5fb8ff) drop-shadow(0 0 10px #fff);transform:scale(1.18)}
  .ic-btn.sel{animation:floatStrong 2s ease-in-out infinite}
  @keyframes floatStrong{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .ic-btn.sel .nm{color:#fff;font-weight:900;text-shadow:0 0 8px #fff,0 1px 3px rgba(0,0,0,.95)}

  /* 🎲 + Совершить ход — по центру внизу, между колонок атака/защита */
  .actions{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);display:flex;gap:10px;align-items:center;z-index:13}
  /* Кубик — кастомная картинка (skin-style, без рамки), парит */
  .auto-roll{display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;border:none;padding:0;user-select:none;animation:float 2.4s ease-in-out infinite}
  .auto-roll img{width:42px;height:42px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(255,200,60,.55)) drop-shadow(0 2px 4px rgba(0,0,0,.85))}
  .auto-roll:hover{animation:none;transform:scale(1.15)}
  .auto-roll:active{transform:scale(.92)}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .apply{min-width:170px;padding:11px 18px;text-align:center;border-radius:8px;font-family:Consolas,monospace;font-weight:900;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#fff;text-shadow:0 0 6px rgba(201,138,255,.6);background:linear-gradient(180deg,rgba(80,40,140,.85),rgba(40,15,80,.95));border:1.5px solid rgba(180,80,255,.35);box-shadow:0 0 10px rgba(180,80,255,.25);opacity:.45;cursor:not-allowed;transition:opacity .25s}
  .apply.ready{opacity:1;cursor:pointer;border-color:rgba(255,95,160,.6);animation:rdy 2.2s ease-in-out infinite}
  @keyframes rdy{0%,100%{box-shadow:0 0 12px rgba(180,80,255,.4)}50%{box-shadow:0 0 20px rgba(255,95,160,.55)}}

  /* ────────── HP ИГРОКА (низ) ────────── */
  .me-hp{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:6px 14px 7px;background:linear-gradient(0deg,rgba(0,0,0,.85),rgba(0,0,0,.25));border-top:1px solid rgba(0,255,224,.4);box-shadow:0 -4px 12px rgba(0,191,255,.15)}
  .me-hp-ico{font-size:15px;color:#ff3377;text-shadow:0 0 8px #ff3377;animation:heartBeat 1.2s ease-in-out infinite}
  @keyframes heartBeat{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
  .me-hp-track{flex:1;height:9px;border-radius:5px;background:rgba(0,0,0,.6);border:1px solid rgba(0,255,224,.5);overflow:hidden;position:relative;box-shadow:inset 0 0 6px rgba(0,0,0,.7)}
  .me-hp-fill{height:100%;width:80%;background:linear-gradient(90deg,#00ffe0,#5fb8ff,#bf00ff,#5fb8ff,#00ffe0);background-size:200% 100%;box-shadow:0 0 14px #00d8ff,inset 0 0 6px rgba(255,255,255,.4);animation:flow 2s linear infinite;position:relative}
  .me-hp-fill::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 8px,rgba(255,255,255,.2) 8px 9px);animation:stripe 1s linear infinite}
  .me-hp-num{font-family:'Courier New',monospace;font-size:11px;color:#7ffce7;font-weight:700;white-space:nowrap;text-shadow:0 0 6px rgba(0,255,224,.6)}
</style>
</head>
<body>
<div id="wrap"><div id="app">

  <!-- ШАПКА -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-back">‹</div>
      <div class="hdr-title">⚡ BOSS RAID</div>
      <div class="hdr-r">
        <div class="phase">ФАЗА 1</div>
        <div class="timer">7:30</div>
      </div>
    </div>
    <div class="hp-row">
      <div class="hp-lbl">HP</div>
      <div class="hp-track"><div class="hp-fill"></div></div>
      <div class="hp-num">5 395 / 10 000 · <b>54%</b></div>
    </div>
    <div class="hist">
      <div class="hist-lbl">⚡ Босс целил:</div>
      <div class="hist-row">
        <div class="hist-cell ok"><img src="battle_icons/head.png"></div>
        <div class="hist-cell bad"><img src="battle_icons/torso.png"></div>
        <div class="hist-cell bad"><img src="battle_icons/legs.png"></div>
        <div class="hist-cell ok"><img src="battle_icons/head.png"></div>
        <div class="hist-cell bad"><img src="battle_icons/torso.png"></div>
      </div>
    </div>
  </div>
  <div class="ticker">
    <div class="ticker-in">
      <span>⚔ <span class="nm">flykiller</span> нанёс <span class="dm">4 615</span></span>
      &nbsp;&nbsp;◆&nbsp;&nbsp;
      <span>⚔ <span class="nm">huihhj</span> нанёс <span class="dm">2 062</span></span>
      &nbsp;&nbsp;◆&nbsp;&nbsp;
      <span>⚔ <span class="nm">tester</span> нанёс <span class="dm">817</span></span>
      &nbsp;&nbsp;◆&nbsp;&nbsp;
      <span>⚔ <span class="nm">flykiller</span> нанёс <span class="dm">4 615</span></span>
      &nbsp;&nbsp;◆&nbsp;&nbsp;
      <span>⚔ <span class="nm">huihhj</span> нанёс <span class="dm">2 062</span></span>
    </div>
  </div>

  <!-- БОССОВАЯ ЗОНА -->
  <div class="arena">
    <div class="boss-aura"></div>
    <img class="boss-img" src="bosses/boss_lava.png" alt="boss">
    <div class="boss-shadow"></div>

    <!-- AUTO в углу -->
    <div class="auto-btn" id="auto"><div class="ic">🤖</div><div class="lb">АВТО</div></div>

    <!-- АТАКА — колонка слева внизу, на уровне 🎲 -->
    <div class="col col-atk">
      <div class="col-lbl">⚔ Атака</div>
      <div class="ic-btn" data-side="atk" data-key="HEAD"><img src="battle_icons/head.png"><div class="nm">Голова</div></div>
      <div class="ic-btn" data-side="atk" data-key="TORSO"><img src="battle_icons/torso.png"><div class="nm">Тело</div></div>
      <div class="ic-btn" data-side="atk" data-key="LEGS"><img src="battle_icons/legs.png"><div class="nm">Ноги</div></div>
    </div>

    <!-- ЗАЩИТА — колонка справа внизу, на уровне 🎲 -->
    <div class="col col-def">
      <div class="col-lbl">🛡 Защита</div>
      <div class="ic-btn" data-side="def" data-key="HEAD"><img src="battle_icons/head.png"><div class="nm">Голова</div></div>
      <div class="ic-btn" data-side="def" data-key="TORSO"><img src="battle_icons/torso.png"><div class="nm">Тело</div></div>
      <div class="ic-btn" data-side="def" data-key="LEGS"><img src="battle_icons/legs.png"><div class="nm">Ноги</div></div>
    </div>

    <!-- 🎲 + Совершить ход — по центру внизу, между колонок -->
    <div class="actions">
      <div class="auto-roll" id="roll" title="Случайный ход"><img src="dice.png" alt="dice"></div>
      <div class="apply" id="apply">⚔ Совершить ход</div>
    </div>
  </div>

  <!-- HP ИГРОКА (низ) -->
  <div class="me-hp">
    <div class="me-hp-ico">❤</div>
    <div class="me-hp-track"><div class="me-hp-fill"></div></div>
    <div class="me-hp-num">1 364 / 1 705</div>
  </div>

</div></div>
<script>
  let selA=null, selD=null;
  function _refresh(){
    document.querySelectorAll('.col-atk .ic-btn').forEach(x=>x.classList.toggle('sel',x.dataset.key===selA));
    document.querySelectorAll('.col-def .ic-btn').forEach(x=>x.classList.toggle('sel',x.dataset.key===selD));
    document.getElementById('apply').classList.toggle('ready', !!(selA&&selD));
  }
  document.querySelectorAll('.ic-btn').forEach(b=>{
    b.onclick=()=>{
      if(b.dataset.side==='atk') selA=b.dataset.key; else selD=b.dataset.key;
      _refresh();
    };
  });
  document.getElementById('roll').onclick=()=>{
    const k=['HEAD','TORSO','LEGS'];
    selA=k[Math.floor(Math.random()*3)]; selD=k[Math.floor(Math.random()*3)];
    _refresh();
  };
  document.getElementById('auto').onclick=()=>{
    document.getElementById('auto').classList.toggle('on');
  };
  document.getElementById('apply').onclick=()=>{
    if(!selA||!selD) return;
    alert('⚔ '+selA+' / 🛡 '+selD+'\n(превью — в игре сервер посчитает урон)');
  };
</script>
</body>
</html>
