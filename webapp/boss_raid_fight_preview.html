<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BOSS RAID — Бой preview (финал v2)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#0a0a0f;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;color:#fff;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
  #wrap{display:flex;justify-content:center;align-items:center;width:100%;height:100%;padding:10px}

  /* Каркас «телефона» */
  #app{position:relative;width:390px;height:780px;background:#02000a url('bosses/bg/lava.png') center/cover no-repeat;overflow:hidden;box-shadow:0 0 60px rgba(255,90,40,.25),0 0 120px rgba(0,191,255,.08);display:flex;flex-direction:column}

  /* ────────── ШАПКА (наверху, sticky-стиль) ────────── */
  .hdr{position:relative;z-index:10;flex-shrink:0;padding:8px 12px 4px;background:linear-gradient(180deg,rgba(0,0,0,.78),rgba(0,0,0,.38));border-bottom:1px solid rgba(255,0,85,.25)}
  .hdr-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
  .hdr-back{font-size:24px;color:#00f5ff;cursor:pointer;text-shadow:0 0 8px rgba(0,245,255,.6);line-height:1;display:flex;flex-direction:column;align-items:center}
  .hdr-back::after{content:'НАЗАД';font-size:6px;font-weight:700;letter-spacing:1.2px;color:rgba(0,245,255,.6);margin-top:-2px}
  .hdr-title{font-size:13px;font-weight:900;letter-spacing:3px;color:#FF0055;text-shadow:0 0 10px #FF0055,0 0 20px #FF0055;flex:1;text-align:center}
  .hdr-r{display:flex;align-items:center;gap:6px}
  .phase{font-size:9px;font-weight:800;letter-spacing:1.5px;padding:3px 7px;border-radius:5px;background:rgba(255,0,85,.18);border:1px solid rgba(255,0,85,.45);color:#ff5588}
  .timer{display:flex;align-items:center;gap:5px;background:rgba(0,255,159,.08);border:1px solid rgba(0,255,159,.3);border-radius:6px;padding:3px 8px;font-family:'Courier New',monospace;font-size:13px;font-weight:700;color:#00FF9F;text-shadow:0 0 8px #00FF9F}
  .timer::before{content:'';width:5px;height:5px;border-radius:50%;background:#00FF9F;box-shadow:0 0 5px #00FF9F;animation:tdot 1s infinite}
  @keyframes tdot{0%,100%{opacity:1}50%{opacity:.2}}
  .hp-row{display:flex;align-items:center;gap:7px;padding-top:2px}
  .hp-lbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px}
  .hp-track{flex:1;height:9px;border-radius:4px;background:rgba(0,0,0,.5);border:1px solid rgba(255,0,85,.35);overflow:hidden;position:relative}
  .hp-fill{height:100%;width:54%;background:linear-gradient(90deg,#88002b,#cc0055,#ff3377);box-shadow:0 0 10px rgba(255,0,85,.5);transition:width .4s}
  .hp-num{font-family:'Courier New',monospace;font-size:10px;color:#ff5588;font-weight:700;white-space:nowrap}
  .hist{display:flex;align-items:center;gap:6px;padding:5px 0 1px;font-family:Consolas,monospace;font-size:8.5px;color:rgba(220,220,235,.85);letter-spacing:.6px}
  .hist-lbl{text-transform:uppercase;font-weight:800;color:#ff8aa8;text-shadow:0 0 6px rgba(255,80,160,.55);white-space:nowrap}
  .hist-row{display:flex;gap:4px}
  .hist-cell{width:20px;height:20px;border-radius:5px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;background:rgba(8,5,18,.6)}
  .hist-cell.ok{border-color:rgba(0,255,136,.6);box-shadow:0 0 6px rgba(0,255,136,.4)}
  .hist-cell.bad{border-color:rgba(255,51,68,.6);box-shadow:0 0 6px rgba(255,51,68,.45)}
  .hist-cell img{width:13px;height:13px;object-fit:contain}
  .ticker{padding:3px 0;background:rgba(0,0,0,.4);overflow:hidden;white-space:nowrap;font-size:9px;color:rgba(224,224,224,.55)}
  .ticker-in{display:inline-block;padding-left:14px;animation:scroll 18s linear infinite}
  @keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  .ticker .nm{color:#00BFFF}
  .ticker .dm{color:#00FF9F;font-family:monospace;font-weight:700}

  /* ────────── БОССОВАЯ ЗОНА (середина) ────────── */
  .arena{position:relative;flex:1 1 auto;min-height:0;overflow:hidden}
  .boss-img{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:78%;height:78%;object-fit:contain;filter:drop-shadow(0 0 30px rgba(255,80,40,.55));pointer-events:none;animation:breath 3.4s ease-in-out infinite}
  @keyframes breath{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.025)}}
  .boss-shadow{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);width:40%;height:14px;background:radial-gradient(ellipse,rgba(0,0,0,.65) 0%,transparent 70%);pointer-events:none}

  /* AUTO — компактно, верхний правый угол арены, НЕ налезает на ЗАЩИТА */
  .auto-btn{position:absolute;top:8px;right:8px;z-index:14;width:42px;padding:5px 0;border-radius:8px;background:linear-gradient(135deg,rgba(15,5,30,.88),rgba(8,5,18,.92));border:1.5px solid rgba(160,150,200,.4);font-family:Consolas,monospace;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .2s}
  .auto-btn .ic{font-size:16px;line-height:1}
  .auto-btn .lb{font-size:7px;font-weight:900;letter-spacing:.6px;color:#aaa;text-transform:uppercase}
  .auto-btn.on{border-color:#00ff88;background:linear-gradient(135deg,rgba(0,80,40,.7),rgba(0,40,20,.9));box-shadow:0 0 16px rgba(0,255,136,.55)}
  .auto-btn.on .lb{color:#00ff88}

  /* Колонки атаки/защиты — лежат ПОВЕРХ боссовой зоны по бокам, ниже AUTO */
  .col{position:absolute;display:flex;flex-direction:column;gap:7px;z-index:12;top:62px}
  .col-atk{left:6px}
  .col-def{right:6px}
  .col-lbl{font-size:9px;font-weight:900;letter-spacing:1.6px;text-align:center;font-family:Consolas,monospace;text-transform:uppercase;margin-bottom:1px}
  .col-atk .col-lbl{color:#ff8ac0;text-shadow:0 0 6px rgba(255,80,160,.65)}
  .col-def .col-lbl{color:#8acfff;text-shadow:0 0 6px rgba(80,180,255,.65)}
  .ic-btn{width:54px;display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:3px 0;border-radius:8px;background:rgba(8,5,18,.55)}
  .ic-btn img{width:30px;height:30px;object-fit:contain}
  .ic-btn .nm{font-size:7.5px;font-weight:800;letter-spacing:.4px;font-family:Consolas,monospace;text-transform:uppercase;margin-top:1px}
  .col-atk .ic-btn img{filter:drop-shadow(0 0 5px rgba(255,80,160,.85))}
  .col-def .ic-btn img{filter:drop-shadow(0 0 5px rgba(80,180,255,.85))}
  .col-atk .ic-btn .nm{color:#ff8ac0}
  .col-def .ic-btn .nm{color:#8acfff}
  .col-atk .ic-btn.sel{box-shadow:0 0 0 2px rgba(255,80,160,.7),0 0 14px rgba(255,80,160,.5);background:radial-gradient(circle at 50% 35%,rgba(255,80,160,.32),rgba(8,5,18,.55) 70%)}
  .col-def .ic-btn.sel{box-shadow:0 0 0 2px rgba(80,180,255,.7),0 0 14px rgba(80,180,255,.5);background:radial-gradient(circle at 50% 35%,rgba(80,180,255,.32),rgba(8,5,18,.55) 70%)}
  .col-atk .ic-btn.sel img{filter:drop-shadow(0 0 16px #ff5fa0) drop-shadow(0 0 8px #fff);animation:pulse 1s ease-in-out infinite}
  .col-def .ic-btn.sel img{filter:drop-shadow(0 0 16px #5fb8ff) drop-shadow(0 0 8px #fff);animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  .ic-btn.sel .nm{color:#fff;font-weight:900}

  /* Кнопка действия (🎲 + Совершить ход) — низ боссовой зоны, по центру */
  .actions{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);display:flex;gap:10px;align-items:center;z-index:13}
  .auto-roll{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;background:linear-gradient(135deg,#3a2a08,#1a1004);border:1.5px solid rgba(255,200,80,.6);color:#ffd370;text-shadow:0 0 8px #ffa030;box-shadow:0 0 12px rgba(255,180,40,.45)}
  .apply{min-width:170px;padding:11px 18px;text-align:center;border-radius:8px;font-family:Consolas,monospace;font-weight:900;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#fff;text-shadow:0 0 8px #c98aff,0 0 14px #ff5fa0;background:linear-gradient(180deg,rgba(80,40,140,.7),rgba(40,15,80,.92));border:1.5px solid rgba(255,255,255,.18);box-shadow:0 0 14px rgba(180,80,255,.4);opacity:.5;cursor:not-allowed;transition:opacity .25s}
  .apply.ready{opacity:1;cursor:pointer;border-color:#ff5fa0;animation:rdy 1.6s ease-in-out infinite}
  @keyframes rdy{0%,100%{transform:scale(1);box-shadow:0 0 18px rgba(255,90,150,.7)}50%{transform:scale(1.04);box-shadow:0 0 28px rgba(255,90,150,.95)}}

  /* ────────── HP ИГРОКА (низ) ────────── */
  .me-hp{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:6px 14px 7px;background:linear-gradient(0deg,rgba(0,0,0,.78),rgba(0,0,0,.25));border-top:1px solid rgba(0,191,255,.15)}
  .me-hp-ico{font-size:14px;color:#ff3377}
  .me-hp-track{flex:1;height:8px;border-radius:4px;background:rgba(0,0,0,.5);border:1px solid rgba(0,191,255,.25);overflow:hidden}
  .me-hp-fill{height:100%;width:80%;background:linear-gradient(90deg,#00ffe0,#5fb8ff);box-shadow:0 0 10px #00d8ff}
  .me-hp-num{font-family:'Courier New',monospace;font-size:10px;color:#7ffce7;font-weight:700;white-space:nowrap}
</style>
</head>
<body>
<div id="wrap"><div id="app">

  <!-- ШАПКА -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-back">‹</div>
      <div class="hdr-title">⚡ BOSS RAID</div>
      <div class="hdr-r">
        <div class="phase">ФАЗА 1</div>
        <div class="timer">7:30</div>
      </div>
    </div>
    <div class="hp-row">
      <div class="hp-lbl">HP</div>
      <div class="hp-track"><div class="hp-fill"></div></div>
      <div class="hp-num">5 395 / 10 000 · 54%</div>
    </div>
    <div class="hist">
      <div class="hist-lbl">⚡ Босс целил:</div>
      <div class="hist-row">
        <div class="hist-cell ok"><img src="battle_icons/head.png"></div>
        <div class="hist-cell bad"><img src="battle_icons/torso.png"></div>
        <div class="hist-cell bad"><img src="battle_icons/legs.png"></div>
        <div class="hist-cell ok"><img src="battle_icons/head.png"></div>
        <div class="hist-cell bad"><img src="battle_icons/torso.png"></div>
      </div>
    </div>
  </div>
  <div class="ticker">
    <div class="ticker-in">
      <span>⚔ <span class="nm">flykiller</span> нанёс <span class="dm">4 615</span></span>
      &nbsp;&nbsp;◆&nbsp;&nbsp;
      <span>⚔ <span class="nm">huihhj</span> нанёс <span class="dm">2 062</span></span>
      &nbsp;&nbsp;◆&nbsp;&nbsp;
      <span>⚔ <span class="nm">tester</span> нанёс <span class="dm">817</span></span>
      &nbsp;&nbsp;◆&nbsp;&nbsp;
      <span>⚔ <span class="nm">flykiller</span> нанёс <span class="dm">4 615</span></span>
      &nbsp;&nbsp;◆&nbsp;&nbsp;
      <span>⚔ <span class="nm">huihhj</span> нанёс <span class="dm">2 062</span></span>
    </div>
  </div>

  <!-- БОССОВАЯ ЗОНА -->
  <div class="arena">
    <img class="boss-img" src="bosses/boss_lava.png" alt="boss">
    <div class="boss-shadow"></div>

    <!-- AUTO в углу -->
    <div class="auto-btn" id="auto"><div class="ic">🤖</div><div class="lb">АВТО</div></div>

    <!-- АТАКА -->
    <div class="col col-atk">
      <div class="col-lbl">⚔ Атака</div>
      <div class="ic-btn" data-side="atk" data-key="HEAD"><img src="battle_icons/head.png"><div class="nm">Голова</div></div>
      <div class="ic-btn" data-side="atk" data-key="TORSO"><img src="battle_icons/torso.png"><div class="nm">Тело</div></div>
      <div class="ic-btn" data-side="atk" data-key="LEGS"><img src="battle_icons/legs.png"><div class="nm">Ноги</div></div>
    </div>

    <!-- ЗАЩИТА -->
    <div class="col col-def">
      <div class="col-lbl">🛡 Защита</div>
      <div class="ic-btn" data-side="def" data-key="HEAD"><img src="battle_icons/head.png"><div class="nm">Голова</div></div>
      <div class="ic-btn" data-side="def" data-key="TORSO"><img src="battle_icons/torso.png"><div class="nm">Тело</div></div>
      <div class="ic-btn" data-side="def" data-key="LEGS"><img src="battle_icons/legs.png"><div class="nm">Ноги</div></div>
    </div>

    <!-- 🎲 + Совершить ход -->
    <div class="actions">
      <div class="auto-roll" id="roll" title="Случайный ход">🎲</div>
      <div class="apply" id="apply">⚔ Совершить ход</div>
    </div>
  </div>

  <!-- HP ИГРОКА (низ) -->
  <div class="me-hp">
    <div class="me-hp-ico">❤</div>
    <div class="me-hp-track"><div class="me-hp-fill"></div></div>
    <div class="me-hp-num">1 364 / 1 705</div>
  </div>

</div></div>
<script>
  let selA=null, selD=null;
  document.querySelectorAll('.ic-btn').forEach(b=>{
    b.onclick=()=>{
      const side=b.dataset.side, key=b.dataset.key;
      if(side==='atk') selA=key; else selD=key;
      document.querySelectorAll('.col-atk .ic-btn').forEach(x=>x.classList.toggle('sel',x.dataset.key===selA));
      document.querySelectorAll('.col-def .ic-btn').forEach(x=>x.classList.toggle('sel',x.dataset.key===selD));
      document.getElementById('apply').classList.toggle('ready', !!(selA&&selD));
    };
  });
  document.getElementById('roll').onclick=()=>{
    const k=['HEAD','TORSO','LEGS'];
    selA=k[Math.floor(Math.random()*3)]; selD=k[Math.floor(Math.random()*3)];
    document.querySelectorAll('.col-atk .ic-btn').forEach(x=>x.classList.toggle('sel',x.dataset.key===selA));
    document.querySelectorAll('.col-def .ic-btn').forEach(x=>x.classList.toggle('sel',x.dataset.key===selD));
    document.getElementById('apply').classList.add('ready');
  };
  document.getElementById('auto').onclick=()=>{
    document.getElementById('auto').classList.toggle('on');
  };
  document.getElementById('apply').onclick=()=>{
    if(!selA||!selD) return;
    alert('⚔ '+selA+' / 🛡 '+selD+'\n(превью — в игре сервер посчитает урон)');
  };
</script>
</body>
</html>
