<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BOSS RAID — Бой preview</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#0a0a0f;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;color:#fff;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
  #wrap{display:flex;justify-content:center;align-items:center;width:100%;height:100%}
  #app{position:relative;width:390px;height:780px;background:#03050f;overflow:hidden;box-shadow:0 0 60px rgba(255,0,85,.15),0 0 120px rgba(0,191,255,.08)}
  /* фон арены босса */
  .bg{position:absolute;inset:0;background:url('bosses/bg/spider.png') center/cover no-repeat;filter:brightness(.55) saturate(1.1)}
  .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.55) 0%,rgba(0,0,0,.1) 30%,rgba(0,0,0,.15) 60%,rgba(0,0,0,.85) 100%)}
  /* шапка */
  .top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;z-index:10}
  .back{font-size:11px;color:#aaccff;letter-spacing:1px;cursor:pointer;font-family:Consolas,monospace}
  .title{font-size:11px;font-weight:900;letter-spacing:2px;color:#ff3c80;text-shadow:0 0 10px rgba(255,0,112,.7)}
  /* общий HP босса */
  .boss-hp{position:absolute;top:30px;left:10px;right:10px;z-index:9}
  .boss-hp-lbl{display:flex;justify-content:space-between;font-size:9px;color:#ff8aa8;letter-spacing:1px;font-family:Consolas,monospace;margin-bottom:3px}
  .bar{height:10px;border-radius:5px;background:rgba(0,0,0,.7);overflow:hidden;border:1px solid rgba(255,0,112,.35);box-shadow:inset 0 1px 2px rgba(0,0,0,.7)}
  .fill-boss{height:100%;width:72%;background:linear-gradient(90deg,#ff0070,#ff5fa0);box-shadow:0 0 12px #ff0070,inset 0 0 6px rgba(255,255,255,.4);transition:width .5s}
  /* босс — большой по центру сверху */
  .boss{position:absolute;top:60px;left:50%;transform:translateX(-50%);width:60%;height:38%;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;z-index:5}
  .boss img{width:100%;height:100%;object-fit:contain;object-position:bottom;filter:drop-shadow(0 0 24px rgba(255,0,112,.4));-webkit-mask-image:linear-gradient(to top,transparent 0%,#000 8%);mask-image:linear-gradient(to top,transparent 0%,#000 8%);animation:breath 3.6s ease-in-out infinite;transform-origin:50% 100%}
  @keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
  .boss-shadow{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);width:40%;height:14px;background:radial-gradient(ellipse,rgba(0,0,0,.7) 0%,transparent 70%)}
  /* колонки атаки/защиты — опущены вниз до уровня авто-кнопки */
  .col{position:absolute;display:flex;flex-direction:column;gap:8px;z-index:9;bottom:3%}
  .col-atk{left:6px}
  .col-def{right:6px}
  .col-lbl{font-size:9px;font-weight:900;letter-spacing:1.6px;text-align:center;font-family:Consolas,monospace;text-transform:uppercase;margin-bottom:1px}
  .col-atk .col-lbl{color:#ff8ac0;text-shadow:0 0 6px rgba(255,80,160,.65)}
  .col-def .col-lbl{color:#8acfff;text-shadow:0 0 6px rgba(80,180,255,.65)}
  .ic-btn{width:54px;display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;padding:2px 0}
  .ic-btn img{width:32px;height:32px;object-fit:contain}
  .ic-btn .nm{font-size:7.5px;font-weight:800;letter-spacing:.4px;font-family:Consolas,monospace;text-transform:uppercase;margin-top:2px}
  .col-atk .ic-btn img{filter:drop-shadow(0 0 5px rgba(255,80,160,.85)) drop-shadow(0 1px 2px rgba(0,0,0,.8))}
  .col-def .ic-btn img{filter:drop-shadow(0 0 5px rgba(80,180,255,.85)) drop-shadow(0 1px 2px rgba(0,0,0,.8))}
  .col-atk .ic-btn .nm{color:#ff8ac0;text-shadow:0 0 5px rgba(255,80,160,.7)}
  .col-def .ic-btn .nm{color:#8acfff;text-shadow:0 0 5px rgba(80,180,255,.7)}
  .ic-btn.sel{border-radius:10px;padding:3px 0}
  .col-atk .ic-btn.sel{background:radial-gradient(circle at 50% 35%,rgba(255,80,160,.28) 0%,transparent 70%);box-shadow:0 0 0 2px rgba(255,80,160,.65),0 0 14px rgba(255,80,160,.5)}
  .col-def .ic-btn.sel{background:radial-gradient(circle at 50% 35%,rgba(80,180,255,.28) 0%,transparent 70%);box-shadow:0 0 0 2px rgba(80,180,255,.65),0 0 14px rgba(80,180,255,.5)}
  .col-atk .ic-btn.sel img{filter:drop-shadow(0 0 16px #ff5fa0) drop-shadow(0 0 8px #fff);animation:pulse 1s ease-in-out infinite}
  .col-def .ic-btn.sel img{filter:drop-shadow(0 0 16px #5fb8ff) drop-shadow(0 0 8px #fff);animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  .ic-btn.sel .nm{color:#fff;font-weight:900}
  /* воин снизу — маленький */
  .me{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);width:14%;height:17%;display:flex;align-items:flex-end;justify-content:center;z-index:6}
  .me img{width:100%;height:100%;object-fit:contain;object-position:bottom;animation:breath2 3.4s ease-in-out infinite;transform-origin:50% 100%;filter:drop-shadow(0 0 10px rgba(0,216,255,.4))}
  @keyframes breath2{0%,100%{transform:scaleX(-1) scale(1)}50%{transform:scaleX(-1) scale(1.025)}}
  .me-shadow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:55%;height:8px;background:radial-gradient(ellipse,rgba(0,0,0,.65) 0%,transparent 70%)}
  /* HP игрока */
  .me-hp{position:absolute;bottom:14%;left:50%;transform:translateX(-50%);width:40%;z-index:7}
  .me-hp-lbl{display:flex;justify-content:center;font-size:9px;color:#7ffce7;font-family:Consolas,monospace;margin-bottom:2px;letter-spacing:.5px}
  .fill-me{height:6px;border-radius:3px;background:rgba(0,0,0,.7);overflow:hidden;border:1px solid rgba(0,216,255,.35);box-shadow:inset 0 1px 2px rgba(0,0,0,.7)}
  .fill-me-i{height:100%;width:80%;background:linear-gradient(90deg,#00ffe0,#5fb8ff);box-shadow:0 0 10px #00d8ff,inset 0 0 6px rgba(255,255,255,.4)}
  /* кнопки действия снизу */
  .actions{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center;z-index:9}
  .auto{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;background:linear-gradient(135deg,#3a2a08,#1a1004);border:1.5px solid rgba(255,200,80,.6);color:#ffd370;text-shadow:0 0 8px #ffa030;box-shadow:0 0 12px rgba(255,180,40,.45);animation:autoGlow 2.4s ease-in-out infinite}
  @keyframes autoGlow{0%,100%{box-shadow:0 0 12px rgba(255,180,40,.45)}50%{box-shadow:0 0 22px rgba(255,200,60,.8),0 0 30px rgba(255,140,40,.4)}}
  .apply{min-width:170px;padding:11px 18px;text-align:center;border-radius:8px;font-family:Consolas,monospace;font-weight:900;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#fff;text-shadow:0 0 8px #c98aff,0 0 14px #ff5fa0;background:linear-gradient(180deg,rgba(80,40,140,.55),rgba(40,15,80,.85));border:1.5px solid rgba(255,255,255,.18);box-shadow:0 0 14px rgba(180,80,255,.4);opacity:.45;cursor:not-allowed;transition:opacity .25s}
  .apply.ready{opacity:1;cursor:pointer;border-color:#ff5fa0;animation:cfP 1.6s ease-in-out infinite}
  @keyframes cfP{0%,100%{transform:scale(1);box-shadow:0 0 18px rgba(255,90,150,.7),0 0 32px rgba(80,180,255,.3);filter:brightness(1)}50%{transform:scale(1.04);box-shadow:0 0 28px rgba(255,90,150,.95),0 0 50px rgba(80,180,255,.55);filter:brightness(1.18)}}
  /* инфа справа сверху */
  .raid-info{position:absolute;top:50px;right:10px;display:flex;flex-direction:column;gap:3px;font-size:9px;font-family:Consolas,monospace;color:#aaccff;z-index:8;text-align:right}
  .raid-info b{color:#ffc83c}
</style>
</head>
<body>
<div id="wrap"><div id="app">
  <div class="bg"></div>
  <div class="top">
    <div class="back">← Назад</div>
    <div class="title">🕷 ПАУЧИХА БЕЗДНЫ</div>
    <div style="width:40px"></div>
  </div>
  <div class="boss-hp">
    <div class="boss-hp-lbl"><span>HP БОССА (общее)</span><span><b>7 200</b> / 10 000</span></div>
    <div class="bar"><div class="fill-boss"></div></div>
  </div>
  <div class="boss"><img src="bosses/boss_spider.png" alt="boss"></div>
  <div class="boss-shadow"></div>
  <div class="col col-atk">
    <div class="col-lbl">⚔ Атака</div>
    <div class="ic-btn" data-side="atk" data-key="HEAD"><img src="battle_icons/head.png"><div class="nm">Голова</div></div>
    <div class="ic-btn" data-side="atk" data-key="TORSO"><img src="battle_icons/torso.png"><div class="nm">Тело</div></div>
    <div class="ic-btn" data-side="atk" data-key="LEGS"><img src="battle_icons/legs.png"><div class="nm">Ноги</div></div>
  </div>
  <div class="col col-def">
    <div class="col-lbl">🛡 Защита</div>
    <div class="ic-btn" data-side="def" data-key="HEAD"><img src="battle_icons/head.png"><div class="nm">Голова</div></div>
    <div class="ic-btn" data-side="def" data-key="TORSO"><img src="battle_icons/torso.png"><div class="nm">Тело</div></div>
    <div class="ic-btn" data-side="def" data-key="LEGS"><img src="battle_icons/legs.png"><div class="nm">Ноги</div></div>
  </div>
  <div class="raid-info">
    <span>👥 в рейде: <b>23</b></span>
    <span>🗡 твой урон: <b>4 500</b></span>
    <span>🏆 место: <b>4</b></span>
  </div>
  <div class="me-hp">
    <div class="me-hp-lbl">❤ 400 / 500</div>
    <div class="fill-me"><div class="fill-me-i"></div></div>
  </div>
  <div class="me"><img src="skins/sila/1.png" alt="warrior"></div>
  <div class="me-shadow"></div>
  <div class="actions">
    <div class="auto" id="auto" title="Случайный ход">🎲</div>
    <div class="apply" id="apply">⚔ Совершить ход</div>
  </div>
</div></div>
<script>
  let selA=null, selD=null;
  document.querySelectorAll('.ic-btn').forEach(b=>{
    b.onclick=()=>{
      const side=b.dataset.side, key=b.dataset.key;
      if(side==='atk') selA=key; else selD=key;
      document.querySelectorAll('.col-atk .ic-btn').forEach(x=>x.classList.toggle('sel',x.dataset.key===selA));
      document.querySelectorAll('.col-def .ic-btn').forEach(x=>x.classList.toggle('sel',x.dataset.key===selD));
      document.getElementById('apply').classList.toggle('ready', !!(selA&&selD));
    };
  });
  document.getElementById('auto').onclick=()=>{
    const k=['HEAD','TORSO','LEGS'];
    selA=k[Math.floor(Math.random()*3)]; selD=k[Math.floor(Math.random()*3)];
    document.querySelectorAll('.col-atk .ic-btn').forEach(x=>x.classList.toggle('sel',x.dataset.key===selA));
    document.querySelectorAll('.col-def .ic-btn').forEach(x=>x.classList.toggle('sel',x.dataset.key===selD));
    document.getElementById('apply').classList.add('ready');
  };
  document.getElementById('apply').onclick=()=>{
    if(!selA||!selD) return;
    alert('Удар! Атака: '+selA+', Защита: '+selD+'\\n(Это preview — в реальной игре сервер посчитает урон по боссу и от босса)');
  };
</script>
</body>
</html>
