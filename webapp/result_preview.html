function makePanel(scene, x, y, w, h, r=14, alpha=0.92) {
  const g = scene.add.graphics();
  g.fillStyle(0x12101e, alpha); g.fillRoundedRect(x, y, w, h, r);
  g.lineStyle(1, 0x333355, 0.5); g.strokeRoundedRect(x, y, w, h, r);
  return g;
}

function txt(scene, x, y, str, size=14, color='#f0f0fa', bold=false, stroke=null) {
  const style = {
    fontFamily: bold ? 'Arial Black, Arial' : 'Arial',
    fontSize: size+'px',
    color,
  };
  if (stroke) { style.stroke = stroke[0]; style.strokeThickness = stroke[1]; }
  return scene.add.text(x, y, str, style);
}

// ── Mock data sets ─────────────────────────────────────────────
