<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Эффекты боя — превью 8 движений</title>
<style>
  body{margin:0;background:#0a0a12;color:#fff;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;padding:18px 14px 40px;}
  h1{font-size:18px;margin:0 0 4px;text-align:center;letter-spacing:.5px;}
  .sub{text-align:center;color:#8a8aa0;font-size:12px;margin-bottom:16px;}
  .layout{display:flex;gap:18px;max-width:1100px;margin:0 auto;align-items:flex-start;flex-wrap:wrap;justify-content:center;}
  .stage-wrap{flex:0 0 auto;width:340px;position:sticky;top:14px;align-self:flex-start;}
  @media (max-width:780px){.stage-wrap{position:static;width:100%;max-width:340px;}}
  .panel-wrap{flex:1;min-width:280px;max-width:480px;}

  .stage{aspect-ratio:9/16;border-radius:14px;overflow:hidden;position:relative;background:#03050f;box-shadow:0 8px 28px rgba(0,0,0,.55);transition:transform .25s;}
  .bg{position:absolute;inset:0;background:url('bot_skins/bg/33.jpg') center/cover;filter:brightness(.55) saturate(1.05);}
  .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.45),rgba(0,0,0,.05) 40%,rgba(0,0,0,.55));}
  .floor{position:absolute;left:50%;bottom:18%;transform:translateX(-50%);width:75%;height:14px;background:radial-gradient(ellipse,rgba(0,0,0,.7),transparent 75%);filter:blur(3px);}
  .vs{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-family:Consolas,monospace;font-size:50px;font-weight:900;letter-spacing:6px;color:#fff;
      text-shadow:2px 0 0 #00ffe0,-2px 0 0 #ff0070,0 0 14px #ff0070,0 0 18px #00d8ff;pointer-events:none;}
  .fighter{position:absolute;bottom:18%;height:60%;display:flex;align-items:flex-end;}
  .fighter img{height:100%;object-fit:contain;transition:transform .15s;will-change:transform,filter;}
  .p1{left:4%;}
  .p1 img{transform:scaleX(-1);}
  .p2{right:4%;height:75%;}

  /* ─── ЭФФЕКТЫ (классы) ─── */
  /* 1. LUNGE — атакующий делает выпад вперёд */
  @keyframes lungeR{0%{transform:translateX(0)}40%{transform:translateX(80px) scale(1.06)}100%{transform:translateX(0)}}
  @keyframes lungeL{0%{transform:translateX(0)}40%{transform:translateX(-80px) scale(1.06)}100%{transform:translateX(0)}}
  .p1.lunge{animation:lungeR .42s ease-out;}
  .p2.lunge{animation:lungeL .42s ease-out;}

  /* 2. KNOCKBACK — цель отлетает назад с поворотом */
  @keyframes knockL{0%{transform:translateX(0) rotate(0)}40%{transform:translateX(-22px) rotate(-7deg)}100%{transform:translateX(0) rotate(0)}}
  @keyframes knockR{0%{transform:translateX(0) rotate(0)}40%{transform:translateX(22px) rotate(7deg)}100%{transform:translateX(0) rotate(0)}}
  .p1.knock{animation:knockL .5s ease-out;}
  .p2.knock{animation:knockR .5s ease-out;}

  /* 3. SCREEN PUNCH — весь стейдж сжимается и распирает */
  @keyframes punchZoom{0%,100%{transform:scale(1)}25%{transform:scale(1.05) rotate(.5deg)}50%{transform:scale(.99) rotate(-.3deg)}}
  .stage.punch{animation:punchZoom .35s ease-out;}

  /* 4. SHOCK WAVE — кольцо у цели */
  @keyframes wave{0%{transform:translate(-50%,-50%) scale(.2);opacity:1;border-width:6px}100%{transform:translate(-50%,-50%) scale(2.2);opacity:0;border-width:1px}}
  .shockwave{position:absolute;width:60px;height:60px;border-radius:50%;border:5px solid #ffd35a;pointer-events:none;
             box-shadow:0 0 18px #ff8a00,inset 0 0 10px #ffd35a;animation:wave .55s ease-out forwards;}

  /* 5. SPARKS — частицы разлетаются */
  @keyframes sparkFly{0%{opacity:1;transform:translate(-50%,-50%) translate(0,0) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) translate(var(--dx),var(--dy)) scale(.3)}}
  .spark{position:absolute;width:8px;height:8px;border-radius:50%;background:#ffd35a;pointer-events:none;
         box-shadow:0 0 8px #ff8a00,0 0 14px #ff4500;animation:sparkFly .55s ease-out forwards;}

  /* 6. SLOW MOTION — затемнение и blur всей сцены */
  @keyframes slomo{0%{filter:none}30%{filter:saturate(2) contrast(1.3) blur(.5px)}100%{filter:none}}
  .stage.slomo{animation:slomo .8s ease-in-out;}

  /* 7. SPEED LINES — линии скорости проносятся */
  @keyframes speedLines{0%{opacity:0;transform:translateX(-100%)}30%{opacity:1}100%{opacity:0;transform:translateX(100%)}}
  .speed-lines{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(90deg,transparent 0 24px,rgba(255,255,255,.6) 24px 26px,transparent 26px 70px);
               mix-blend-mode:screen;animation:speedLines .35s ease-out;}

  /* 8. STAGGER — цель шатается на месте */
  @keyframes stagger{0%,100%{transform:rotate(0)}20%{transform:rotate(-4deg) translateX(-3px)}40%{transform:rotate(3deg) translateX(2px)}60%{transform:rotate(-2deg) translateX(-2px)}80%{transform:rotate(1deg)}}
  .p2.stagger{animation:stagger .55s ease-out;}

  /* Hit flash */
  @keyframes hitF{0%{filter:brightness(2.8) saturate(1.6)}100%{filter:brightness(1)}}
  .hit-flash > img{animation:hitF .4s ease-out;}

  /* Кнопки тестирования */
  .panel-wrap h2{font-size:13px;color:#aaa;letter-spacing:1.5px;margin:0 0 10px;text-transform:uppercase;font-weight:800;}
  .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .tbtn{background:linear-gradient(180deg,rgba(50,30,90,.6),rgba(20,10,50,.85));border:1.5px solid rgba(180,100,255,.55);border-radius:7px;color:#e0c0ff;padding:9px 8px;font-family:Consolas,monospace;font-size:11px;font-weight:700;text-align:left;cursor:pointer;letter-spacing:.5px;transition:all .15s;text-transform:uppercase;}
  .tbtn:hover{transform:translateY(-1px);box-shadow:0 0 14px rgba(180,100,255,.4);background:linear-gradient(180deg,rgba(70,40,130,.7),rgba(30,15,70,.9));}
  .tbtn .num{color:#ff8ac0;font-weight:900;margin-right:6px;}
  .tbtn .desc{display:block;font-size:9px;color:#8aa;margin-top:2px;font-weight:400;letter-spacing:0;text-transform:none;}
  .tbtn.combo{grid-column:span 2;background:linear-gradient(180deg,rgba(140,40,30,.65),rgba(70,15,10,.85));border-color:#ff5fa0;color:#ffd0e0;}
</style>
</head>
<body>
<h1>Эффекты боя — что добавить в HTML-overlay</h1>
<div class="sub">тыкай кнопки — посмотри какой эффект тебе нужен. После выбора скажу «внедряй № 1, 4, 6» (или какие)</div>

<div class="layout">
  <div class="stage-wrap">
    <div class="stage" id="stage">
      <div class="bg"></div>
      <div class="floor"></div>
      <div class="vs">VS</div>
      <div class="fighter p1" id="p1"><img src="warriors/warrior_crit.png"></div>
      <div class="fighter p2" id="p2"><img src="bot_skins/33.png"></div>
    </div>
  </div>

  <div class="panel-wrap">
    <h2>тестируй эффекты</h2>
    <div class="btns">
      <button class="tbtn" data-fx="lunge"><span class="num">1.</span>ВЫПАД (LUNGE)<span class="desc">атакующий шаг вперёд</span></button>
      <button class="tbtn" data-fx="knock"><span class="num">2.</span>ОТЛЁТ (KNOCKBACK)<span class="desc">цель отлетает с поворотом</span></button>
      <button class="tbtn" data-fx="punch"><span class="num">3.</span>ZOOM-УДАР<span class="desc">экран сжимается на крите</span></button>
      <button class="tbtn" data-fx="wave"><span class="num">4.</span>УДАРНАЯ ВОЛНА<span class="desc">кольцо от точки попадания</span></button>
      <button class="tbtn" data-fx="sparks"><span class="num">5.</span>ИСКРЫ<span class="desc">6 частиц разлетаются</span></button>
      <button class="tbtn" data-fx="slomo"><span class="num">6.</span>SLOWMO<span class="desc">замедление + насыщение</span></button>
      <button class="tbtn" data-fx="speed"><span class="num">7.</span>SPEED LINES<span class="desc">линии скорости</span></button>
      <button class="tbtn" data-fx="stagger"><span class="num">8.</span>ШАТАНИЕ<span class="desc">цель качается после удара</span></button>
      <button class="tbtn combo" data-fx="combo">★ ВЕСЬ ПАКЕТ КРИТА (1+2+3+4+5)</button>
    </div>
  </div>
</div>

<script>
  const stage = document.getElementById('stage'), p1 = document.getElementById('p1'), p2 = document.getElementById('p2');
  function reset(el, ...cls) { cls.forEach(c => el.classList.remove(c)); void el.offsetWidth; }
  function play(name) {
    if (name === 'lunge')   { reset(p1, 'lunge'); reset(p2, 'hit-flash'); p1.classList.add('lunge'); setTimeout(() => p2.classList.add('hit-flash'), 160); }
    if (name === 'knock')   { reset(p2, 'knock', 'hit-flash'); p2.classList.add('knock', 'hit-flash'); }
    if (name === 'punch')   { reset(stage, 'punch'); stage.classList.add('punch'); }
    if (name === 'wave')    { spawnWave(); }
    if (name === 'sparks')  { spawnSparks(); }
    if (name === 'slomo')   { reset(stage, 'slomo'); stage.classList.add('slomo'); }
    if (name === 'speed')   { spawnSpeedLines(); }
    if (name === 'stagger') { reset(p2, 'stagger', 'hit-flash'); p2.classList.add('stagger', 'hit-flash'); }
    if (name === 'combo')   {
      reset(p1, 'lunge'); reset(p2, 'knock', 'hit-flash'); reset(stage, 'punch');
      p1.classList.add('lunge');
      setTimeout(() => { p2.classList.add('knock', 'hit-flash'); stage.classList.add('punch'); spawnWave(); spawnSparks(); }, 180);
    }
  }
  function spawnWave() {
    const w = document.createElement('div'); w.className = 'shockwave';
    const r = p2.getBoundingClientRect(), s = stage.getBoundingClientRect();
    w.style.left = (r.left - s.left + r.width/2) + 'px';
    w.style.top  = (r.top  - s.top  + r.height/2) + 'px';
    stage.appendChild(w); setTimeout(() => w.remove(), 600);
  }
  function spawnSparks() {
    const r = p2.getBoundingClientRect(), s = stage.getBoundingClientRect();
    const cx = r.left - s.left + r.width/2, cy = r.top - s.top + r.height/2;
    for (let i = 0; i < 8; i++) {
      const sp = document.createElement('div'); sp.className = 'spark';
      const ang = Math.random() * Math.PI * 2, dist = 50 + Math.random() * 60;
      sp.style.setProperty('--dx', (Math.cos(ang) * dist) + 'px');
      sp.style.setProperty('--dy', (Math.sin(ang) * dist) + 'px');
      sp.style.left = cx + 'px'; sp.style.top = cy + 'px';
      stage.appendChild(sp); setTimeout(() => sp.remove(), 600);
    }
  }
  function spawnSpeedLines() {
    const sl = document.createElement('div'); sl.className = 'speed-lines';
    stage.appendChild(sl); setTimeout(() => sl.remove(), 380);
  }
  document.querySelectorAll('.tbtn').forEach(b => b.addEventListener('click', () => play(b.dataset.fx)));
</script>
</body>
</html>
