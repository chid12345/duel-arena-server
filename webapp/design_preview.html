<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Duel Arena — Final Profile UI</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #07050f;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* ── Phone Frame ── */
.phone {
  width: 390px;
  height: 700px;
  background: #0d0b1a;
  border-radius: 32px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border: 1.5px solid rgba(109, 40, 217, 0.35);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.5),
    0 0 50px rgba(109,40,217,0.18),
    0 24px 64px rgba(0,0,0,0.9);
}

/* ── Title Bar ── */
.titlebar {
  display: flex;
  align-items: center;
  padding: 14px 14px 8px;
  flex-shrink: 0;
}
.titlebar-name {
  flex: 1;
  font-size: 18px;
  font-weight: 700;
  color: #f0eeff;
}
.titlebar-btn {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  margin-left: 6px;
}

/* ── Main layout ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 0 10px;
  gap: 8px;
  justify-content: space-between;
  /* fills full height — no gaps at bottom */
}

/* ── Card base ── */
.card {
  background: rgba(15, 12, 26, 0.98);
  border: 1.5px solid rgba(91, 33, 182, 0.85);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
}
/* top accent stripe */
.card::after {
  content: '';
  position: absolute;
  top: 0; left: 14px; right: 14px;
  height: 1.5px;
  background: rgba(139, 92, 246, 0.45);
  border-radius: 0 0 2px 2px;
}

/* ── Profile Card ── */
.profile-card {
  flex-shrink: 0;
  padding: 12px 14px 10px;
}
.profile-top {
  display: flex;
  align-items: center;
  gap: 11px;
  margin-bottom: 10px;
}
.avatar {
  width: 54px; height: 54px;
  border-radius: 50%;
  flex-shrink: 0;
  background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 2.5px rgba(167,139,250,0.85), 0 0 14px rgba(124,58,237,0.4);
  overflow: hidden;
}
.avatar svg { width: 34px; height: 34px; }
.pinfo { flex: 1; min-width: 0; }
.pname {
  display: flex; align-items: center; gap: 6px;
  font-size: 17px; font-weight: 700; color: #ffffff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.badge-crown { color: #fde68a; font-style: normal; }
.badge-premium {
  background: linear-gradient(90deg, #78350f 0%, #92400e 100%);
  border: 1px solid rgba(251,191,36,0.35);
  border-radius: 6px; padding: 2px 7px;
  font-size: 9px; font-weight: 700; color: #fde68a; white-space: nowrap;
  display: flex; align-items: center; gap: 3px;
}
.pline2 {
  display: flex; align-items: center; gap: 6px; margin-top: 4px;
}
.res-chip {
  display: inline-flex; align-items: center; gap: 3px;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 7px; padding: 3px 7px;
  font-size: 10px; font-weight: 700;
}
.lvl-badge {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  border-radius: 10px; padding: 5px 11px;
  font-size: 14px; font-weight: 700; color: #fff;
  white-space: nowrap; flex-shrink: 0; align-self: flex-start;
}

/* Battle stats inside profile card */
.stats-row {
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 8px;
}
.sc { flex: 1; text-align: center; position: relative; }
.sc + .sc::before {
  content: '';
  position: absolute; left: 0; top: 3px; bottom: 3px;
  width: 1px; background: rgba(255,255,255,0.07);
}
.sc-v { font-size: 15px; font-weight: 700; line-height: 1; }
.sc-l {
  font-size: 8px; color: rgba(255,255,255,0.32);
  margin-top: 4px; text-transform: uppercase; letter-spacing: .5px;
}

/* ── Equipment Card ── */
.eq-card {
  flex: 1;           /* fills all remaining vertical space */
  display: flex;
  flex-direction: column;
  min-height: 0;     /* allow flex shrink */
}
.eq-title {
  text-align: center;
  font-size: 9px; font-weight: 700; letter-spacing: 2px;
  color: rgba(167,139,250,0.75);
  text-transform: uppercase;
  padding: 10px 0 6px;
  flex-shrink: 0;
}
/* 3-column grid: slots | character | slots */
.eq-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 62px 1fr 62px;
  gap: 0;
  padding: 0 4px;
  align-items: center;
  min-height: 0;
}
.eq-col {
  display: flex; flex-direction: column;
  gap: 10px; align-items: center;
}
/* Equipment slot */
.slot {
  width: 54px; height: 58px;
  background: rgba(10,8,22,0.96);
  border: 1.5px solid rgba(80,30,160,0.65);
  border-radius: 15px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; cursor: pointer;
  position: relative;
  transition: border-color .2s, box-shadow .2s;
}
.slot:hover {
  border-color: rgba(139,92,246,0.9);
  box-shadow: 0 0 10px rgba(124,58,237,0.25);
}
.slot svg { width: 22px; height: 22px; }
.slot-lbl {
  font-size: 8px; color: rgba(255,255,255,0.38);
  letter-spacing: .3px;
}
/* equipped dot */
.dot {
  position: absolute; bottom: 4px; right: 5px;
  width: 5px; height: 5px; border-radius: 50%;
  background: #7c3aed;
}
/* empty dot */
.dot-empty {
  position: absolute; bottom: 4px; right: 5px;
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
}

/* Character center area */
.eq-center {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px; position: relative;
  height: 100%;
}
.char-aura {
  position: absolute;
  width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,0.14) 0%, transparent 70%);
  pointer-events: none;
}
.char-aura2 {
  position: absolute;
  width: 100px; height: 100px; border-radius: 50%;
  background: radial-gradient(circle, rgba(236,72,153,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.char-img {
  position: relative; z-index: 1;
  width: 120px; height: 120px;
  display: flex; align-items: center; justify-content: center;
  animation: float 2.2s ease-in-out infinite;
}
.char-img svg { width: 100%; height: 100%; filter: drop-shadow(0 0 18px rgba(124,58,237,0.5)); }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
.char-floor {
  position: absolute;
  bottom: 10px; left: 50%; transform: translateX(-50%);
  width: 100px; height: 10px;
  background: rgba(124,58,237,0.28);
  border-radius: 50%; filter: blur(5px);
  pointer-events: none;
}
.change-btn {
  position: relative; z-index: 1;
  font-size: 8px; color: rgba(255,255,255,0.22);
  letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; margin-top: 2px;
  display: flex; align-items: center; gap: 4px;
}

/* HP / XP bars inside eq card */
.hp-xp {
  padding: 8px 14px 12px;
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex; flex-direction: column; gap: 5px;
  flex-shrink: 0;
}
.bar-row {
  display: flex; align-items: center; gap: 7px;
}
.bar-ico { font-size: 10px; width: 16px; text-align: center; flex-shrink: 0; }
.bar-lbl {
  font-size: 9px; color: rgba(255,255,255,0.48);
  width: 18px; flex-shrink: 0;
}
.bar-track {
  flex: 1; height: 5px;
  background: rgba(13,10,30,1);
  border-radius: 3px; overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 3px; }
.bar-hp { background: linear-gradient(90deg,#15803d,#4ade80); }
.bar-xp { background: linear-gradient(90deg,#6d28d9,#a855f7); }
.bar-val {
  font-size: 9px; color: rgba(255,255,255,0.38);
  width: 64px; text-align: right; flex-shrink: 0;
}

/* ── Action buttons ── */
.actions { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.btn-fight {
  width: 100%; height: 54px; border-radius: 16px; border: none;
  background: linear-gradient(135deg, #a855f7 0%, #8b5cf6 40%, #7c3aed 70%, #6d28d9 100%);
  color: #fff; font-size: 20px; font-weight: 700; letter-spacing: 1px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  cursor: pointer; position: relative; overflow: hidden;
  box-shadow: 0 0 0 3px rgba(124,58,237,0.22), 0 8px 28px rgba(124,58,237,0.38);
}
.btn-fight::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 50%;
  background: rgba(255,255,255,0.1);
  border-radius: 14px 14px 50% 50%;
}
.btn-fight svg { width: 22px; height: 22px; position: relative; }
.btn-row { display: flex; gap: 8px; }
.btn-sec {
  flex: 1; height: 44px; border-radius: 13px;
  background: rgba(24,20,44,1); cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-size: 13px; font-weight: 600; border: 1.5px solid rgba(91,33,182,0.55);
  color: rgba(196,181,253,0.85);
}
.btn-tasks {
  border-color: rgba(59,130,246,0.5);
  color: rgba(147,197,253,0.85);
}

/* ── Tab Bar ── */
.tabbar {
  height: 62px; background: #07060f;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-shrink: 0;
}
.tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; position: relative;
}
.tab svg { width: 21px; height: 21px; opacity: .38; transition: opacity .15s; }
.tab-lbl { font-size: 9px; color: rgba(255,255,255,0.22); }
.tab.act svg { opacity: 1; }
.tab.act .tab-lbl { color: #a78bfa; }
.tab.act::before {
  content: ''; position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 28px; height: 2px;
  background: #a78bfa; border-radius: 0 0 2px 2px;
}
</style>
</head>
