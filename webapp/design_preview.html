<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Duel Arena — Final Profile UI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #07050f;
  font-family: 'Inter', system-ui, sans-serif;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* ── Phone shell ── */
.phone {
  width: 390px;
  height: 700px;
  background: #0d0b1a;
  border-radius: 32px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border: 1.5px solid rgba(109, 40, 217, 0.4);
  box-shadow: 0 0 60px rgba(109,40,217,.22), 0 24px 64px rgba(0,0,0,.9);
}

/* ── Title bar ── */
.titlebar {
  display: flex;
  align-items: center;
  padding: 14px 15px 8px;
  flex-shrink: 0;
}
.titlebar-name {
  flex: 1;
  font-size: 18px;
  font-weight: 800;
  color: #f0eeff;
  letter-spacing: -.3px;
}
.titlebar-btn {
  width: 32px; height: 32px;
  border-radius: 10px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; margin-left: 6px;
}

/* ── Scroll area ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ── Card base ── */
.card {
  background: rgba(15, 12, 26, .98);
  border: 1.5px solid rgba(91, 33, 182, .85);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
}
.card::after {
  content: '';
  position: absolute;
  top: 0; left: 14px; right: 14px; height: 1.5px;
  background: rgba(139,92,246,.5);
}

/* ══════════════════════════════════
   PROFILE CARD
══════════════════════════════════ */
.profile-card { padding: 12px 14px 10px; }

.profile-top {
  display: flex;
  align-items: center;
  gap: 11px;
  margin-bottom: 10px;
}
.avatar {
  width: 54px; height: 54px;
  border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg,#7c3aed,#4f46e5);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 2.5px rgba(167,139,250,.85), 0 0 16px rgba(124,58,237,.45);
}
.pinfo { flex: 1; min-width: 0; }
.pname {
  display: flex; align-items: center; gap: 5px;
  font-size: 17px; font-weight: 700; color: #fff;
}
.badge-premium {
  background: linear-gradient(90deg,#78350f,#92400e);
  border: 1px solid rgba(251,191,36,.35);
  border-radius: 6px; padding: 2px 7px;
  font-size: 9px; font-weight: 700; color: #fde68a;
  display: flex; align-items: center; gap: 3px; white-space: nowrap;
}
.pline2 { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(0,0,0,.45);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 7px; padding: 3px 8px;
  font-size: 10px; font-weight: 700;
}
.lvl-badge {
  background: linear-gradient(135deg,#7c3aed,#4f46e5);
  border-radius: 10px; padding: 5px 11px;
  font-size: 14px; font-weight: 700; color: #fff;
  flex-shrink: 0; align-self: flex-start;
}
.stats-row {
  display: flex;
  border-top: 1px solid rgba(255,255,255,.06);
  padding-top: 8px;
}
.sc { flex: 1; text-align: center; position: relative; }
.sc + .sc::before {
  content: ''; position: absolute;
  left: 0; top: 4px; bottom: 4px;
  width: 1px; background: rgba(255,255,255,.07);
}
.sc-v { font-size: 15px; font-weight: 700; }
.sc-l { font-size: 8px; color: rgba(255,255,255,.32); margin-top: 3px; text-transform: uppercase; letter-spacing: .5px; }

/* ══════════════════════════════════
   EQUIPMENT CARD
══════════════════════════════════ */
.eq-card { padding: 0; }

.eq-label {
  text-align: center;
  font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
  color: rgba(167,139,250,.75); text-transform: uppercase;
  padding: 10px 0 8px;
}

/* 3-column grid: slots | character | slots */
.eq-grid {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  padding: 0 12px;
  min-height: 220px;
}

/* Left / Right slot columns */
.eq-col {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 4px 0;
  gap: 0;
}
.eq-col-right { align-items: flex-end; }

/* Individual slot */
.slot {
  width: 60px; height: 60px;
  background: linear-gradient(145deg, #1a1a2e, #16213e);
  border: 1px solid rgba(72,52,212,.55);
  box-shadow: inset 0 0 10px rgba(72,52,212,.3), 0 0 8px rgba(72,52,212,.12);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  position: relative;
  transition: border-color .25s, box-shadow .25s, transform .15s;
  flex-shrink: 0;
}
.slot:hover {
  border-color: rgba(139,92,246,1);
  box-shadow: inset 0 0 14px rgba(109,40,217,.5), 0 0 16px rgba(124,58,237,.4);
  transform: scale(1.05);
}
.slot-ico { width: 34px; height: 34px; filter: drop-shadow(0 0 5px rgba(139,92,246,.55)); }
.slot-lbl {
  font-size: 7px; color: rgba(255,255,255,.38);
  font-weight: 500; letter-spacing: .2px;
  white-space: nowrap; overflow: hidden;
  max-width: 56px; text-align: center;
}
.slot-dot {
  position: absolute; bottom: 4px; right: 4px;
  width: 5px; height: 5px; border-radius: 50%;
}
.dot-on  { background: #7c3aed; }
.dot-off { background: rgba(255,255,255,.15); }

/* Center: character column */
.eq-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  position: relative;
  padding: 8px 4px;
}
.char-aura {
  position: absolute;
  width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,.15) 0%, transparent 70%);
  pointer-events: none;
}
.char-img {
  position: relative; z-index: 1;
  width: 130px; height: 130px;
  animation: float 2.4s ease-in-out infinite;
}
.char-img svg { width: 100%; height: 100%; filter: drop-shadow(0 0 20px rgba(124,58,237,.55)); }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.char-floor {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  width: 90px; height: 8px;
  background: rgba(124,58,237,.28); border-radius: 50%; filter: blur(5px);
}
.change-btn {
  position: relative; z-index: 1;
  font-size: 8px; color: rgba(255,255,255,.22);
  letter-spacing: .8px; text-transform: uppercase;
  cursor: pointer; display: flex; align-items: center; gap: 4px;
}

/* HP / XP bars — ПОД grid, на всю ширину карточки */
.hp-xp {
  padding: 10px 14px 12px;
  border-top: 1px solid rgba(255,255,255,.05);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-ico { width: 14px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.bar-lbl { font-size: 9px; font-weight: 600; width: 18px; flex-shrink: 0; }
.bar-track {
  flex: 1; height: 5px;
  background: rgba(13,10,30,1);
  border-radius: 3px; overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 3px; }
.bar-hp   { background: linear-gradient(90deg,#15803d,#4ade80); }
.bar-xp   { background: linear-gradient(90deg,#6d28d9,#a855f7); }
.bar-val  { font-size: 9px; color: rgba(255,255,255,.38); width: 64px; text-align: right; flex-shrink: 0; }

/* ══════════════════════════════════
   ACTION BUTTONS
══════════════════════════════════ */
.actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 0 0 4px;
  flex-shrink: 0;
}
.btn-fight {
  width: 100%; height: 52px; border: none;
  background: linear-gradient(90deg, #6c5ce7, #a29bfe);
  border-radius: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 19px; font-weight: 800; color: #fff; letter-spacing: 1px;
  text-shadow: 0 0 20px rgba(255,255,255,.5);
  position: relative; overflow: hidden;
  box-shadow: 0 0 20px rgba(108,92,231,.6), 0 4px 20px rgba(108,92,231,.45), inset 0 1px 0 rgba(255,255,255,.18);
}
.btn-fight::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 48%;
  background: rgba(255,255,255,.07);
  border-radius: 12px 12px 50% 50%;
}
.btn-row { display: flex; gap: 10px; }
.btn-sec {
  flex: 1; padding: 15px 0;
  border-radius: 12px;
  background: rgba(12,9,26,1);
  border: 1.5px solid rgba(72,52,212,.45);
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 600;
  color: rgba(196,181,253,.9); cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: all .3s;
}
.btn-sec:hover {
  background: rgba(30,22,60,1);
  border-color: rgba(139,92,246,.8);
  box-shadow: 0 0 14px rgba(109,40,217,.3);
  color: #fff;
}
.btn-sec svg { width: 15px; height: 15px; flex-shrink: 0; filter: drop-shadow(0 0 4px currentColor); }
.btn-tasks { border-color: rgba(59,130,246,.45); color: rgba(147,197,253,.9); }
.btn-tasks:hover { border-color: rgba(96,165,250,.8); box-shadow: 0 0 14px rgba(59,130,246,.3); }

/* ── Tab Bar ── */
.tabbar {
  height: 60px; background: #07060f;
  border-top: 1px solid rgba(255,255,255,.06);
  display: flex; flex-shrink: 0;
}
.tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; position: relative;
}
.tab svg { width: 22px; height: 22px; opacity: .35; transition: opacity .15s; }
.tab-lbl { font-size: 9px; color: rgba(255,255,255,.22); font-weight: 500; }
.tab.act svg { opacity: 1; }
.tab.act .tab-lbl { color: #a78bfa; }
.tab.act::before {
  content: ''; position: absolute; top: 0;
  left: 50%; transform: translateX(-50%);
  width: 28px; height: 2px;
  background: #a78bfa; border-radius: 0 0 2px 2px;
}
</style>
</head>

<div class="phone">

          <div class="slot">
            <svg class="slot-ico" viewBox="0 0 32 32" fill="none">
              <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1e3a8a"/></linearGradient></defs>
              <path d="M16 2L4 7v9c0 7 5.5 12 12 14 6.5-2 12-7 12-14V7L16 2Z" fill="url(#sg)"/>
              <path d="M16 2L4 7v9c0 7 5.5 12 12 14 6.5-2 12-7 12-14V7L16 2Z" stroke="#93c5fd" stroke-width="1.2" fill="none"/>
              <circle cx="16" cy="15" r="5.5" fill="#7c3aed" opacity=".85"/>
              <circle cx="16" cy="15" r="3.5" fill="#a855f7"/>
              <circle cx="15" cy="14" r="1.4" fill="rgba(255,255,255,.42)"/>
            </svg>
            <span class="slot-lbl">Щит</span>
            <span class="slot-dot dot-on"></span>
          </div>

          <div class="slot">
            <svg class="slot-ico" viewBox="0 0 32 32" fill="none">
              <defs>
                <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d1d5db"/><stop offset="100%" stop-color="#4b5563"/></linearGradient>
                <linearGradient id="ag2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6b7280"/><stop offset="50%" stop-color="#e5e7eb"/><stop offset="100%" stop-color="#6b7280"/></linearGradient>
              </defs>
              <path d="M6 10C6 7 9 4 16 4s10 3 10 6v14c0 1.5-1 3-3 3.5H9C7 27 6 25.5 6 24V10Z" fill="url(#ag)"/>
              <rect x="15" y="4" width="2" height="23" fill="url(#ag2)" opacity=".6"/>
              <path d="M6 10C4 9 2 10 2 12s2 3 4 3M26 10c2-1 4 0 4 2s-2 3-4 3" fill="#9ca3af"/>
              <ellipse cx="16" cy="13" rx="4" ry="3.5" fill="#7c3aed" opacity=".9"/>
              <ellipse cx="15.5" cy="12.5" rx="1.8" ry="1.4" fill="#c4b5fd" opacity=".55"/>
              <path d="M8 20h16M9 23h14" stroke="rgba(0,0,0,.18)" stroke-width="1"/>
            </svg>
            <span class="slot-lbl">Броня</span>
            <span class="slot-dot dot-on"></span>
          </div>

          <div class="slot">
            <svg class="slot-ico" viewBox="0 0 32 32" fill="none">
              <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fde68a"/><stop offset="50%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#b45309"/></linearGradient></defs>
              <path d="M9 21C9 25 12 28 16 28s7-3 7-7" stroke="url(#rg)" stroke-width="4" fill="none" stroke-linecap="round"/>
              <path d="M9 21C9 17 12 14 16 14s7 3 7 7" stroke="#f59e0b" stroke-width="4" fill="none" stroke-linecap="round"/>
              <path d="M13 14L11 8h10l-2 6" fill="#d97706"/>
              <path d="M13 14h6l-3-6-3 6Z" fill="#7c3aed"/>
              <circle cx="15.2" cy="10" r="1.2" fill="rgba(255,255,255,.55)"/>
            </svg>
            <span class="slot-lbl">Кольцо</span>
            <span class="slot-dot dot-off"></span>
          </div>

        </div>
      </div><!-- .eq-grid -->

      <!-- HP / XP — BELOW the grid, full width -->
      <div class="hp-xp">
        <div class="bar-row">
          <div class="bar-ico">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
              <path d="M8 14C8 14 2 10 2 5.5A3.5 3.5 0 018 3.8a3.5 3.5 0 016 1.7C14 10 8 14 8 14Z" fill="#4ade80"/>
            </svg>
          </div>
          <span class="bar-lbl" style="color:#4ade80">HP</span>
          <div class="bar-track"><div class="bar-fill bar-hp" style="width:100%"></div></div>
          <span class="bar-val">804 / 804</span>
        </div>
        <div class="bar-row">
          <div class="bar-ico">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
              <path d="M7 1l1.6 4.4H13l-3.9 2.8 1.5 4.5L7 9.9l-3.6 2.8 1.5-4.5L1 5.4h4.4L7 1Z" fill="#a855f7"/>
            </svg>
          </div>
          <span class="bar-lbl" style="color:#a78bfa">XP</span>
          <div class="bar-track"><div class="bar-fill bar-xp" style="width:65%"></div></div>
          <span class="bar-val">947 / 1450</span>
        </div>
      </div>
    </div><!-- .eq-card -->

    <!-- Action buttons — margin-top для отступа от прогресс-баров -->
    <div class="actions" style="margin-top:4px">
      <button class="btn-fight">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M16 2.5l5.5 5.5L10.5 19.5H5v-5.5L16 2.5Z" fill="rgba(255,255,255,.2)" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/>
          <rect x="1.5" y="17.5" width="7" height="2.5" rx="1.2" fill="#fff" opacity=".9" transform="rotate(-45 5 19)"/>
          <circle cx="2.5" cy="21.5" r="1.8" fill="#fff" opacity=".9"/>
        </svg>
        В БОЙ
      </button>
      <div class="btn-row">
        <button class="btn-sec">
          <svg viewBox="0 0 20 20" fill="none">
            <path d="M6 5.5A4 4 0 0114 5.5" stroke="rgba(196,181,253,.8)" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M3 6h14l-1.5 9.5a1 1 0 01-1 .5H5.5a1 1 0 01-1-.5L3 6Z" fill="rgba(124,58,237,.2)" stroke="rgba(196,181,253,.8)" stroke-width="1.3"/>
            <circle cx="8"  cy="9.5" r="1" fill="rgba(196,181,253,.8)"/>
            <circle cx="12" cy="9.5" r="1" fill="rgba(196,181,253,.8)"/>
          </svg>
          Магазин
        </button>
        <button class="btn-sec btn-tasks">
          <svg viewBox="0 0 20 20" fill="none">
            <path d="M5 3a2 2 0 012-2h8l4 4v12a2 2 0 01-2 2H7a2 2 0 01-2-2V3Z" fill="rgba(59,130,246,.18)" stroke="rgba(147,197,253,.8)" stroke-width="1.3"/>
            <path d="M13 1v4h4" stroke="rgba(147,197,253,.8)" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M8 10h6M8 13.5h4" stroke="rgba(147,197,253,.8)" stroke-width="1.3" stroke-linecap="round"/>
            <circle cx="7" cy="10"   r=".8" fill="rgba(147,197,253,.8)"/>
            <circle cx="7" cy="13.5" r=".8" fill="rgba(147,197,253,.8)"/>
          </svg>
          Задания
        </button>
      </div>
    </div>

  </div><!-- .scroll-area -->

  <!-- Tab bar -->
  <div class="tabbar">
    <div class="tab act">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 10.4L12 3l9 7.4V21a1 1 0 01-1 1H4a1 1 0 01-1-1V10.4Z" fill="rgba(124,58,237,.2)" stroke="#a78bfa" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M9 22V14h6v8" stroke="#a78bfa" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <span class="tab-lbl">Профиль</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 4l5 5M20 4l-5 5" stroke="rgba(255,255,255,.5)" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M4 4l3 3-1.5 1.5-3-3M20 4l-3 3 1.5 1.5 3-3" fill="rgba(255,255,255,.5)"/>
        <path d="M9 9l6 6M4 20l5-5M20 20l-5-5" stroke="rgba(255,255,255,.5)" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M4 20l3-3-1.5-1.5-3 3M20 20l-3-3 1.5-1.5 3 3" fill="rgba(255,255,255,.5)"/>
      </svg>
      <span class="tab-lbl">Бой</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="7" r="3.5" stroke="rgba(255,255,255,.5)" stroke-width="1.5" fill="rgba(255,255,255,.06)"/>
        <path d="M5 21c0-3.9 3.1-7 7-7s7 3.1 7 7" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="tab-lbl">Герой</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M6 3a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V8l-5-5H6Z" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M13 3v5h5" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M8.5 13h7M8.5 16.5h5" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="tab-lbl">Задания</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M8 4h8v8a4 4 0 01-8 0V4Z" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M8 6H4a2 2 0 000 4h4M16 6h4a2 2 0 010 4h-4M12 16v3M8 21h8" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="tab-lbl">Рейтинг</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 6h16M4 12h16M4 18h10" stroke="rgba(255,255,255,.5)" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span class="tab-lbl">Меню</span>
    </div>
  </div>

</div>
</body>
</html>
