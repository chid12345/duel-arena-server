<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Duel Arena — Final Profile UI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #07050f;
  font-family: 'Inter', system-ui, sans-serif;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* ── Phone shell ── */
.phone {
  width: 390px;
  height: 700px;
  background: #0d0b1a;
  border-radius: 32px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border: 1.5px solid rgba(109, 40, 217, 0.4);
  box-shadow: 0 0 60px rgba(109,40,217,.22), 0 24px 64px rgba(0,0,0,.9);
}

/* ── Title bar ── */
.titlebar {
  display: flex;
  align-items: center;
  padding: 14px 15px 8px;
  flex-shrink: 0;
}
.titlebar-name {
  flex: 1;
  font-size: 18px;
  font-weight: 800;
  color: #f0eeff;
  letter-spacing: -.3px;
}
.titlebar-btn {
  width: 32px; height: 32px;
  border-radius: 10px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; margin-left: 6px;
}

/* ── Scroll area ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ── Card base ── */
.card {
  background: rgba(15, 12, 26, .98);
  border: 1.5px solid rgba(91, 33, 182, .85);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
}
.card::after {
  content: '';
  position: absolute;
  top: 0; left: 14px; right: 14px; height: 1.5px;
  background: rgba(139,92,246,.5);
}

/* ══════════════════════════════════
   PROFILE CARD
══════════════════════════════════ */
.profile-card { padding: 12px 14px 10px; }

.profile-top {
  display: flex;
  align-items: center;
  gap: 11px;
  margin-bottom: 10px;
}
.avatar {
  width: 54px; height: 54px;
  border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg,#7c3aed,#4f46e5);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 2.5px rgba(167,139,250,.85), 0 0 16px rgba(124,58,237,.45);
}
.pinfo { flex: 1; min-width: 0; }
.pname {
  display: flex; align-items: center; gap: 5px;
  font-size: 17px; font-weight: 700; color: #fff;
}
.badge-premium {
  background: linear-gradient(90deg,#b45309,#d97706);
  border: 1px solid rgba(251,191,36,.6);
  border-radius: 6px; padding: 2px 8px;
  font-size: 9px; font-weight: 800; color: #fff8e7;
  display: flex; align-items: center; gap: 3px; white-space: nowrap;
  box-shadow: 0 0 8px rgba(251,191,36,.25);
  letter-spacing: .3px;
}
.pline2 { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(0,0,0,.45);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 7px; padding: 3px 8px;
  font-size: 10px; font-weight: 700;
}
.lvl-badge {
  background: linear-gradient(135deg,#7c3aed,#4f46e5);
  border-radius: 10px; padding: 5px 11px;
  font-size: 14px; font-weight: 700; color: #fff;
  flex-shrink: 0; align-self: flex-start;
}
.stats-row {
  display: flex;
  border-top: 1px solid rgba(255,255,255,.06);
  padding-top: 8px;
}
.sc { flex: 1; text-align: center; position: relative; }
.sc + .sc::before {
  content: ''; position: absolute;
  left: 0; top: 4px; bottom: 4px;
  width: 1px; background: rgba(255,255,255,.07);
}
.sc-v { font-size: 15px; font-weight: 700; }
.sc-l { font-size: 8px; color: rgba(255,255,255,.32); margin-top: 3px; text-transform: uppercase; letter-spacing: .5px; }

/* ══════════════════════════════════
   EQUIPMENT CARD
══════════════════════════════════ */
.eq-card {
  padding: 0;
  background: radial-gradient(ellipse at 50% 40%, #130f22 0%, #07060f 100%);
}

.eq-label {
  text-align: center;
  font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
  color: rgba(167,139,250,.75); text-transform: uppercase;
  padding: 10px 0 8px;
}

/* 3-column grid: slots | character | slots */
.eq-grid {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  padding: 0 12px;
  min-height: 220px;
}

/* Left / Right slot columns */
.eq-col {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 4px 0;
  gap: 0;
}
.eq-col-right { align-items: flex-end; }

/* Individual slot */
.slot {
  width: 60px; height: 60px;
  background: #1c1c2e;
  border: 1px solid rgba(255,255,255,.1);
  box-shadow: 0 2px 8px rgba(0,0,0,.5);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  position: relative;
  transition: all .25s;
  flex-shrink: 0;
}
.slot:hover { transform: scale(1.06); border-color: rgba(255,255,255,.25); }

/* Per-slot inset glow — color of the icon */
.eq-col:first-child .slot:nth-child(1) { box-shadow: inset 0 0 12px rgba(245,158,11,.28), 0 2px 8px rgba(0,0,0,.5); border-color: rgba(245,158,11,.3); }
.eq-col:first-child .slot:nth-child(2) { box-shadow: inset 0 0 10px rgba(217,119,6,.22), 0 2px 8px rgba(0,0,0,.5); }
.eq-col:first-child .slot:nth-child(3) { box-shadow: inset 0 0 10px rgba(146,64,14,.2),  0 2px 8px rgba(0,0,0,.5); }
.eq-col:last-child  .slot:nth-child(1) { box-shadow: inset 0 0 12px rgba(59,130,246,.3),  0 2px 8px rgba(0,0,0,.5); border-color: rgba(59,130,246,.3); }
.eq-col:last-child  .slot:nth-child(2) { box-shadow: inset 0 0 10px rgba(156,163,175,.2), 0 2px 8px rgba(0,0,0,.5); }
.eq-col:last-child  .slot:nth-child(3) { box-shadow: inset 0 0 12px rgba(245,158,11,.25), 0 2px 8px rgba(0,0,0,.5); border-color: rgba(245,158,11,.25); }

.slot-ico { width: 38px; height: 38px; filter: drop-shadow(0 0 5px rgba(255,255,255,.33)); }
.slot-lbl {
  font-size: 7px; color: rgba(255,255,255,.38);
  font-weight: 500; letter-spacing: .2px;
  white-space: nowrap; overflow: hidden;
  max-width: 56px; text-align: center;
}
.slot-dot {
  position: absolute; bottom: 4px; right: 4px;
  width: 5px; height: 5px; border-radius: 50%;
}
.dot-on  { background: #7c3aed; }
.dot-off { background: rgba(255,255,255,.15); }

/* Center: character column */
.eq-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  position: relative;
  padding: 8px 4px;
}
.char-aura {
  position: absolute;
  width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,.15) 0%, transparent 70%);
  pointer-events: none;
}
.char-img {
  position: relative; z-index: 1;
  width: 130px; height: 130px;
  animation: float 2.4s ease-in-out infinite;
}
.char-img svg { width: 100%; height: 100%; filter: drop-shadow(0 0 20px rgba(124,58,237,.55)); }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.char-floor {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  width: 90px; height: 8px;
  background: rgba(124,58,237,.28); border-radius: 50%; filter: blur(5px);
}
.change-btn {
  position: relative; z-index: 1;
  font-size: 8px; color: rgba(255,255,255,.22);
  letter-spacing: .8px; text-transform: uppercase;
  cursor: pointer; display: flex; align-items: center; gap: 4px;
}

/* HP / XP bars — ПОД grid, на всю ширину карточки */
.hp-xp {
  padding: 10px 14px 12px;
  border-top: 1px solid rgba(255,255,255,.05);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-ico { width: 14px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.bar-lbl { font-size: 9px; font-weight: 600; width: 18px; flex-shrink: 0; }
.bar-track {
  flex: 1; height: 7px;
  background: rgba(7,5,15,1);
  border-radius: 10px; overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 10px; }
.bar-hp   { background: linear-gradient(90deg, #166534, #86efac); }
.bar-xp   { background: linear-gradient(90deg, #1d4ed8, #38bdf8); }
.bar-val  { font-size: 9px; color: rgba(255,255,255,.38); width: 64px; text-align: right; flex-shrink: 0; }

/* ══════════════════════════════════
   ACTION BUTTONS
══════════════════════════════════ */
.actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 0 0 4px;
  flex-shrink: 0;
}
.btn-fight {
  width: 100%; height: 52px; border: none;
  background: linear-gradient(135deg, #a29bfe, #6c5ce7);
  border-radius: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 19px; font-weight: 800; color: #fff; letter-spacing: 1px;
  text-shadow: 0 1px 8px rgba(108,92,231,.7);
  position: relative; overflow: hidden;
  box-shadow: 0 0 20px rgba(108,92,231,.5), 0 4px 24px rgba(108,92,231,.4), inset 0 1px 0 rgba(255,255,255,.2);
}
.btn-fight::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 48%;
  background: rgba(255,255,255,.07);
  border-radius: 12px 12px 50% 50%;
}
.btn-row { display: flex; gap: 10px; }
.btn-sec {
  flex: 1; padding: 15px 0;
  border-radius: 12px;
  background: rgba(12,9,26,1);
  border: 1.5px solid rgba(72,52,212,.45);
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 600;
  color: rgba(196,181,253,.9); cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: all .3s;
}
.btn-sec:hover {
  background: rgba(30,22,60,1);
  border-color: rgba(139,92,246,.8);
  box-shadow: 0 0 14px rgba(109,40,217,.3);
  color: #fff;
}
.btn-sec svg { width: 15px; height: 15px; flex-shrink: 0; filter: drop-shadow(0 0 4px currentColor); }
.btn-tasks { border-color: rgba(59,130,246,.45); color: rgba(147,197,253,.9); }
.btn-tasks:hover { border-color: rgba(96,165,250,.8); box-shadow: 0 0 14px rgba(59,130,246,.3); }

/* ── Tab Bar ── */
.tabbar {
  height: 60px; background: #07060f;
  border-top: 1px solid rgba(255,255,255,.06);
  display: flex; flex-shrink: 0;
}
.tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; position: relative;
}
.tab svg { width: 22px; height: 22px; opacity: .35; transition: opacity .15s; }
.tab-lbl { font-size: 9px; color: rgba(255,255,255,.22); font-weight: 500; }
.tab.act svg { opacity: 1; }
.tab.act .tab-lbl { color: #a78bfa; }
.tab.act::before {
  content: ''; position: absolute; top: 0;
  left: 50%; transform: translateX(-50%);
  width: 28px; height: 2px;
  background: #a78bfa; border-radius: 0 0 2px 2px;
}
</style>
</head>

    <div class="titlebar-btn">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="4"  r="1.6" fill="rgba(255,255,255,.6)"/>
        <circle cx="10" cy="10" r="1.6" fill="rgba(255,255,255,.6)"/>

            <svg class="slot-ico" viewBox="0 0 32 32" fill="none">
              <defs>
                <linearGradient id="boot-l" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c2d12"/><stop offset="100%" stop-color="#3b0f05"/></linearGradient>
                <linearGradient id="boot-hi" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="rgba(255,255,255,.18)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></linearGradient>
              </defs>
              <!-- Shaft of boot -->
              <path d="M10 4 Q9 4 9 6 L9 20 Q9 21 10 21 L19 21 Q20 21 20 20 L20 6 Q20 4 19 4 Z" fill="url(#boot-l)"/>
              <!-- Shaft highlight -->
              <path d="M10 5 Q10 5 10 19 L12 19 L12 5 Z" fill="url(#boot-hi)"/>
              <!-- Toe box -->
              <path d="M9 20 Q8 21 7 23 Q6 25 8 26 L22 26 Q24 25 23 23 Q22 21 20 20 Z" fill="#6b1a07"/>
              <!-- Sole -->
              <rect x="7" y="25.5" width="16" height="2.5" rx="1.2" fill="#1c0a03"/>
              <rect x="7" y="25.5" width="16" height="1" rx=".5" fill="rgba(255,255,255,.06)"/>
              <!-- Buckle straps -->
              <rect x="9" y="10" width="11" height="2" rx="1" fill="#d97706"/>
              <rect x="9" y="15" width="11" height="2" rx="1" fill="#b45309"/>
              <!-- Buckle clasp -->
              <rect x="14.5" y="9.5" width="3" height="3" rx=".7" fill="#fde68a"/>
              <rect x="15" y="10" width="2" height="2" rx=".4" fill="#92400e"/>
            </svg>
            <span class="slot-lbl">Сапоги</span>
            <span class="slot-dot dot-off"></span>
          </div>

        </div>

        <!-- CENTER column: character -->
        <div class="eq-center">
          <div class="char-aura"></div>
          <div class="char-img">
            <svg viewBox="0 0 120 120" fill="none">
              <path d="M60 8L36 54h48L60 8Z" fill="#7c3aed" stroke="#a78bfa" stroke-width="1.5"/>
              <ellipse cx="60" cy="55" rx="26" ry="7" fill="#5b21b6"/>
              <circle cx="60" cy="70" r="18" fill="#fde68a"/>
              <circle cx="53" cy="68" r="2.5" fill="#1e1b4b"/>
              <circle cx="67" cy="68" r="2.5" fill="#1e1b4b"/>
              <circle cx="54" cy="67" r="1" fill="#fff"/>
              <circle cx="68" cy="67" r="1" fill="#fff"/>
              <path d="M54 75 Q60 80 66 75" stroke="#92400e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
              <path d="M34 110 Q38 88 60 86 Q82 88 86 110Z" fill="#6d28d9"/>
              <path d="M60 90 Q40 92 32 100" stroke="#5b21b6" stroke-width="10" stroke-linecap="round"/>
              <path d="M60 90 Q80 92 90 98" stroke="#5b21b6" stroke-width="10" stroke-linecap="round"/>
              <path d="M88 96 L100 70" stroke="#92400e" stroke-width="4" stroke-linecap="round"/>
              <circle cx="100" cy="67" r="7" fill="#a855f7" opacity=".9"/>
              <circle cx="102" cy="65" r="2.5" fill="#e9d5ff" opacity=".6"/>
              <circle cx="30" cy="65" r="2" fill="#fde68a" opacity=".6"/>
              <circle cx="25" cy="78" r="1.5" fill="#c4b5fd" opacity=".5"/>
            </svg>
          </div>
          <div class="char-floor"></div>
          <div class="change-btn">
            <svg width="10" height="10" viewBox="0 0 14 14" fill="none">
              <path d="M10 2L12 4 5 11H3V9L10 2Z" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.35)" stroke-width="1" stroke-linejoin="round"/>
            </svg>
            Сменить воина
          </div>
        </div>

        <!-- RIGHT column: Shield / Armor / Ring -->
        <div class="eq-col eq-col-right">

          <div class="slot">
            <svg class="slot-ico" viewBox="0 0 32 32" fill="none">
              <defs>
                <linearGradient id="sh-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e40af"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
                <linearGradient id="sh-ri" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#60a5fa"/><stop offset="50%" stop-color="#bfdbfe"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
                <linearGradient id="sh-gem" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#6d28d9"/></linearGradient>
              </defs>
              <!-- Shield body -->
              <path d="M16 2 L5 7 L5 17 Q5 26 16 30 Q27 26 27 17 L27 7 Z" fill="url(#sh-bg)"/>
              <!-- Shield rim -->
              <path d="M16 2 L5 7 L5 17 Q5 26 16 30 Q27 26 27 17 L27 7 Z" stroke="url(#sh-ri)" stroke-width="1.5" fill="none"/>
              <!-- Center boss ring -->
              <circle cx="16" cy="16" r="7" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity=".6"/>
              <!-- Gem boss -->
              <circle cx="16" cy="16" r="5" fill="url(#sh-gem)"/>
              <circle cx="16" cy="16" r="5" stroke="#c4b5fd" stroke-width=".7" fill="none" opacity=".5"/>
              <!-- Gem highlight -->
              <ellipse cx="14.5" cy="14.2" rx="1.8" ry="1.2" fill="rgba(255,255,255,.38)" transform="rotate(-20 14.5 14.2)"/>
              <!-- Cross dividers on shield face -->
              <line x1="16" y1="4" x2="16" y2="14" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
              <line x1="7" y1="11" x2="13" y2="11" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
              <line x1="19" y1="11" x2="25" y2="11" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
              <!-- Top shine -->
              <path d="M10 7 Q16 5 22 7" stroke="rgba(255,255,255,.18)" stroke-width="1" fill="none"/>
            </svg>
            <span class="slot-lbl">Щит</span>
            <span class="slot-dot dot-on"></span>
          </div>

          <div class="slot">
            <svg class="slot-ico" viewBox="0 0 32 32" fill="none">
              <defs>
                <linearGradient id="ar-main" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#9ca3af"/><stop offset="40%" stop-color="#e5e7eb"/><stop offset="100%" stop-color="#374151"/></linearGradient>
                <linearGradient id="ar-mid" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4b5563"/><stop offset="50%" stop-color="#f3f4f6"/><stop offset="100%" stop-color="#4b5563"/></linearGradient>
                <linearGradient id="ar-gem" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#6d28d9"/></linearGradient>
              </defs>
              <!-- Pauldrons (shoulders) -->
              <ellipse cx="7" cy="11" rx="4.5" ry="3.5" fill="url(#ar-main)" transform="rotate(-10 7 11)"/>
              <ellipse cx="25" cy="11" rx="4.5" ry="3.5" fill="url(#ar-main)" transform="rotate(10 25 11)"/>
              <!-- Shoulder highlights -->
              <path d="M4 9 Q7 7.5 10 9" stroke="rgba(255,255,255,.35)" stroke-width=".8" fill="none"/>
              <path d="M22 9 Q25 7.5 28 9" stroke="rgba(255,255,255,.35)" stroke-width=".8" fill="none"/>
              <!-- Chest plate body -->
              <path d="M9 10 Q8 10 8 12 L8 24 Q8 26 10 27 L22 27 Q24 26 24 24 L24 12 Q24 10 23 10 Z" fill="url(#ar-main)"/>
              <!-- Center ridge -->
              <rect x="15" y="10" width="2" height="17" fill="url(#ar-mid)" opacity=".55"/>
              <!-- Pectoral curve lines -->
              <path d="M9 14 Q12 12 15 13" stroke="rgba(255,255,255,.18)" stroke-width=".9" fill="none"/>
              <path d="M23 14 Q20 12 17 13" stroke="rgba(255,255,255,.18)" stroke-width=".9" fill="none"/>
              <!-- Abdomen plates -->
              <path d="M9 20 Q16 18 23 20" stroke="rgba(0,0,0,.25)" stroke-width="1.2"/>
              <path d="M9 23 Q16 21.5 23 23" stroke="rgba(0,0,0,.2)" stroke-width="1"/>
              <!-- Gem on chest -->
              <ellipse cx="16" cy="15" rx="3" ry="2.5" fill="url(#ar-gem)"/>
              <ellipse cx="15" cy="14" rx="1.2" ry=".9" fill="rgba(255,255,255,.45)"/>
              <!-- Neck collar -->
              <path d="M12 10 Q16 8 20 10" stroke="#9ca3af" stroke-width="2" fill="none" stroke-linecap="round"/>
              <path d="M13 10 Q16 8.5 19 10" stroke="rgba(255,255,255,.25)" stroke-width=".8" fill="none"/>
            </svg>
            <span class="slot-lbl">Броня</span>
            <span class="slot-dot dot-on"></span>
          </div>

          <div class="slot">
            <svg class="slot-ico" viewBox="0 0 32 32" fill="none">
              <defs>
                <linearGradient id="rng-band" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fde68a"/><stop offset="35%" stop-color="#fbbf24"/><stop offset="65%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#b45309"/></linearGradient>
                <linearGradient id="rng-gem" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f87171"/><stop offset="100%" stop-color="#991b1b"/></linearGradient>
                <radialGradient id="rng-glow" cx="45%" cy="35%"><stop offset="0%" stop-color="rgba(255,100,100,.55)"/><stop offset="100%" stop-color="rgba(153,27,27,0)"/></radialGradient>
              </defs>
              <!-- Ring band bottom arc -->
              <path d="M9 22 Q9 29 16 29 Q23 29 23 22" stroke="url(#rng-band)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
              <!-- Ring band top arc -->
              <path d="M9 22 Q9 15 16 15 Q23 15 23 22" stroke="#d97706" stroke-width="3" fill="none" stroke-linecap="round"/>
              <!-- Band inner shadow -->
              <path d="M10.5 22 Q10.5 27.5 16 27.5 Q21.5 27.5 21.5 22" stroke="rgba(0,0,0,.3)" stroke-width="1" fill="none"/>
              <!-- Band shine -->
              <path d="M10 20 Q13 17 16 16.5" stroke="rgba(255,255,255,.35)" stroke-width=".9" fill="none"/>
              <!-- Gem setting (prongs base) -->
              <path d="M12 14 L14 8 L18 8 L20 14 L16 12 Z" fill="#b45309"/>
              <path d="M13 14 L14.5 9 L17.5 9 L19 14 L16 12.5 Z" fill="#d97706"/>
              <!-- Gem -->
              <path d="M13.5 13 L16 7 L18.5 13 L16 11.5 Z" fill="url(#rng-gem)"/>
              <!-- Gem glow -->
              <ellipse cx="16" cy="10" rx="3.5" ry="3.5" fill="url(#rng-glow)"/>
              <!-- Gem facets -->
              <path d="M16 7 L13.5 13 L16 11.5 L18.5 13 Z" stroke="rgba(255,100,100,.4)" stroke-width=".5" fill="none"/>
              <line x1="16" y1="7" x2="16" y2="11.5" stroke="rgba(255,180,180,.5)" stroke-width=".6"/>
              <!-- Gem highlight -->
              <ellipse cx="15" cy="8.5" rx="1.1" ry=".8" fill="rgba(255,255,255,.55)" transform="rotate(-20 15 8.5)"/>
            </svg>
            <span class="slot-lbl">Кольцо</span>
            <span class="slot-dot dot-off"></span>
          </div>

        </div>
      </div><!-- .eq-grid -->

      <!-- HP / XP — BELOW the grid, full width -->
      <div class="hp-xp">
        <div class="bar-row">
          <div class="bar-ico">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
              <path d="M8 14C8 14 2 10 2 5.5A3.5 3.5 0 018 3.8a3.5 3.5 0 016 1.7C14 10 8 14 8 14Z" fill="#4ade80"/>
            </svg>
          </div>
          <span class="bar-lbl" style="color:#4ade80">HP</span>
          <div class="bar-track"><div class="bar-fill bar-hp" style="width:100%"></div></div>
          <span class="bar-val">804 / 804</span>
        </div>
        <div class="bar-row">
          <div class="bar-ico">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
              <path d="M7 1l1.6 4.4H13l-3.9 2.8 1.5 4.5L7 9.9l-3.6 2.8 1.5-4.5L1 5.4h4.4L7 1Z" fill="#a855f7"/>
            </svg>
          </div>
          <span class="bar-lbl" style="color:#a78bfa">XP</span>
          <div class="bar-track"><div class="bar-fill bar-xp" style="width:65%"></div></div>
          <span class="bar-val">947 / 1450</span>
        </div>
      </div>
    </div><!-- .eq-card -->

    <!-- Action buttons — margin-top для отступа от прогресс-баров -->
    <div class="actions" style="margin-top:4px">
      <button class="btn-fight">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M16 2.5l5.5 5.5L10.5 19.5H5v-5.5L16 2.5Z" fill="rgba(255,255,255,.2)" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/>
          <rect x="1.5" y="17.5" width="7" height="2.5" rx="1.2" fill="#fff" opacity=".9" transform="rotate(-45 5 19)"/>
          <circle cx="2.5" cy="21.5" r="1.8" fill="#fff" opacity=".9"/>
        </svg>
        В БОЙ
      </button>
      <div class="btn-row">
        <button class="btn-sec">
          <svg viewBox="0 0 20 20" fill="none">
            <path d="M6 5.5A4 4 0 0114 5.5" stroke="rgba(196,181,253,.8)" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M3 6h14l-1.5 9.5a1 1 0 01-1 .5H5.5a1 1 0 01-1-.5L3 6Z" fill="rgba(124,58,237,.2)" stroke="rgba(196,181,253,.8)" stroke-width="1.3"/>
            <circle cx="8"  cy="9.5" r="1" fill="rgba(196,181,253,.8)"/>
            <circle cx="12" cy="9.5" r="1" fill="rgba(196,181,253,.8)"/>
          </svg>
          Магазин
        </button>
        <button class="btn-sec btn-tasks">
          <svg viewBox="0 0 20 20" fill="none">
            <path d="M5 3a2 2 0 012-2h8l4 4v12a2 2 0 01-2 2H7a2 2 0 01-2-2V3Z" fill="rgba(59,130,246,.18)" stroke="rgba(147,197,253,.8)" stroke-width="1.3"/>
            <path d="M13 1v4h4" stroke="rgba(147,197,253,.8)" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M8 10h6M8 13.5h4" stroke="rgba(147,197,253,.8)" stroke-width="1.3" stroke-linecap="round"/>
            <circle cx="7" cy="10"   r=".8" fill="rgba(147,197,253,.8)"/>
            <circle cx="7" cy="13.5" r=".8" fill="rgba(147,197,253,.8)"/>
          </svg>
          Задания
        </button>
      </div>
    </div>

  </div><!-- .scroll-area -->

  <!-- Tab bar -->
  <div class="tabbar">
    <div class="tab act">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 10.4L12 3l9 7.4V21a1 1 0 01-1 1H4a1 1 0 01-1-1V10.4Z" fill="rgba(124,58,237,.2)" stroke="#a78bfa" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M9 22V14h6v8" stroke="#a78bfa" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <span class="tab-lbl">Профиль</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 4l5 5M20 4l-5 5" stroke="rgba(255,255,255,.5)" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M4 4l3 3-1.5 1.5-3-3M20 4l-3 3 1.5 1.5 3-3" fill="rgba(255,255,255,.5)"/>
        <path d="M9 9l6 6M4 20l5-5M20 20l-5-5" stroke="rgba(255,255,255,.5)" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M4 20l3-3-1.5-1.5-3 3M20 20l-3-3 1.5-1.5 3 3" fill="rgba(255,255,255,.5)"/>
      </svg>
      <span class="tab-lbl">Бой</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="7" r="3.5" stroke="rgba(255,255,255,.5)" stroke-width="1.5" fill="rgba(255,255,255,.06)"/>
        <path d="M5 21c0-3.9 3.1-7 7-7s7 3.1 7 7" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="tab-lbl">Герой</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M6 3a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V8l-5-5H6Z" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M13 3v5h5" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M8.5 13h7M8.5 16.5h5" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="tab-lbl">Задания</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M8 4h8v8a4 4 0 01-8 0V4Z" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M8 6H4a2 2 0 000 4h4M16 6h4a2 2 0 010 4h-4M12 16v3M8 21h8" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="tab-lbl">Рейтинг</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 6h16M4 12h16M4 18h10" stroke="rgba(255,255,255,.5)" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span class="tab-lbl">Меню</span>
    </div>
  </div>

</div>
</body>
</html>
