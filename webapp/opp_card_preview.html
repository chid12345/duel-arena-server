<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8">
<title>Превью карточки соперника</title>
<style>
  body{margin:0;background:#0f0d18;color:#eee;font-family:system-ui,sans-serif;padding:20px;display:flex;flex-direction:column;align-items:center;}
  h1{font-size:18px;margin:0 0 12px;}
  .ctrl{margin:12px 0;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
  button{background:#2a2840;color:#eee;border:1px solid #444;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;}
  button:hover{background:#3a3850;}
  button.act{background:#5096ff;border-color:#5096ff;}
  .stage{position:relative;width:360px;height:640px;background:linear-gradient(180deg,#0a0a18,#0f0d18);border-radius:18px;border:1px solid #1a1828;overflow:hidden;}
  .hint{font-size:11px;color:#666;text-align:center;margin-top:14px;max-width:360px;}

  /* === Карточка (точная копия логики scene_battle_ext3.js) === */
  .card{position:absolute;left:18px;width:324px;border-radius:14px;border:2px solid #444466;background:#141420;padding:0;color:#eee;font-family:system-ui,sans-serif;box-sizing:border-box;}
  .card.prem{border-color:#ffc83c;background:#1a1508;box-shadow:0 0 0 3px rgba(255,200,60,.10);}
  .card-head{font-size:11px;font-weight:700;padding:11px 14px 0;display:flex;justify-content:space-between;align-items:center;}
  .name-row{text-align:center;font-size:17px;font-weight:700;margin-top:6px;}
  .name-row.prem{color:#ffc83c;}
  .lv-row{text-align:center;font-size:11px;color:#ccccee;margin-top:6px;}
  .lv-row.prem{color:#cc9900;}
  .div{height:1px;background:#2a2850;margin:8px 12px;opacity:.5;}
  .body{display:flex;padding:6px 14px;}
  .sprite{flex:0 0 95px;height:130px;background:radial-gradient(circle at 50% 60%, rgba(80,150,255,.15), transparent 70%);display:flex;align-items:center;justify-content:center;font-size:64px;}
  .right{flex:1;}
  .hp-row{display:flex;justify-content:space-between;font-size:10px;color:#ddddff;}
  .hp-bar{height:11px;background:#0a0a18;border-radius:4px;margin-top:6px;overflow:hidden;}
  .hp-fill{height:100%;background:#3cc864;border-radius:4px;}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-top:10px;}
  .stat{display:flex;align-items:center;gap:8px;}
  .stat-i{font-size:17px;}
  .stat-l{font-size:11px;color:#ccccee;}
  .stat-v{font-size:15px;font-weight:700;}
  .gear-block{margin-top:10px;border-top:1px dashed #2a2850;padding:8px 14px 12px;}
  .gear-title{text-align:center;font-size:9px;color:#aaaacc;font-weight:700;letter-spacing:1px;margin-bottom:8px;}
  .gear-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
  .badge{background:#1a1828;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;}
  .slot-row{background:#1a1828;border:1px solid #2a2840;border-radius:5px;padding:4px 6px;display:flex;align-items:center;gap:6px;font-size:10px;}
  .slot-icon{font-size:11px;}
  .slot-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  /* Equipment grid: 3 колонки (64 / 1fr / 64), 3 ряда — компактнее */
  .equip{display:grid;grid-template-columns:64px 1fr 64px;grid-template-rows:repeat(3,64px);gap:6px;}
  .eq-sprite{grid-column:2;grid-row:1 / 4;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 55%, rgba(180,90,255,.20), transparent 70%);border-radius:10px;font-size:54px;}
  .eq-slot{background:linear-gradient(180deg,#1f1d2e,#16142a);border:1.5px solid #2a2840;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2px 2px 3px;text-align:center;}
  .eq-slot.empty{opacity:.35;border-style:dashed;}
  .eq-label{font-size:7px;color:#aaaacc;letter-spacing:.4px;font-weight:700;text-transform:uppercase;}
  .eq-img{flex:1;display:flex;align-items:center;justify-content:center;width:100%;margin:1px 0;}
  .eq-img img{max-width:30px;max-height:30px;object-fit:contain;}
  .eq-emoji{font-size:22px;}
  .eq-name{font-size:7px;font-weight:700;line-height:1.1;max-width:60px;word-wrap:break-word;padding:0 2px;}
  .empty{text-align:center;font-size:10px;color:#666688;padding:8px;}

  .persona-novice  {color:#9ad9a0;}
  .persona-farmer  {color:#9abae0;}
  .persona-major   {color:#c89aff;}
  .persona-donator {color:#ffc83c;}
</style></head><body>
<h1>Превью карточки соперника</h1>
<div class="ctrl">
  <button data-p="novice">🌱 Новичок</button>
  <button data-p="farmer">⚔️ Фармила</button>
  <button data-p="major" class="act">💎 Мажор</button>
  <button data-p="donator">👑 Босс-донатер</button>
  <button data-p="me">🧑 Своя карточка</button>
</div>
<div class="ctrl">
  <button data-lv="10">Lv10</button>
  <button data-lv="30">Lv30</button>
  <button data-lv="50" class="act">Lv50</button>
  <button data-lv="80">Lv80</button>
  <button id="reroll">🎲 Перегенерировать</button>
</div>
<div class="stage" id="stage"></div>
<p class="hint">Это точная копия карточки из боя (scene_battle_ext3.js). В реальной игре открывается тапом по нику соперника сверху. Меняй кнопки — и сразу видишь как выглядит.</p>

<script>
const PMETA = {
  novice:  {emoji:'🌱', label:'Новичок',     col:'#9ad9a0'},
  farmer:  {emoji:'⚔️', label:'Фармила',     col:'#9abae0'},
  major:   {emoji:'💎', label:'Мажор',       col:'#c89aff'},
  donator: {emoji:'👑', label:'Босс-донатер', col:'#ffc83c'},
};
const NAMES = ['Тор','Локи','Один','Сигурд','Рагнар','Кратос','Кенши','Сёгун','Бездна','Хаос','Виверн','Дрейк'];
const PREFIXES = {
  novice:  ['Странник','Юный','Забытый','Дикий','Мрачный'],
  farmer:  ['Стальной','Безмолвный','Жестокий','Чёрный','Кровавый'],
  major:   ['Беспощадный','Адский','Багровый','Палач','Свирепый'],
  donator: ['Король Бездны','Пожиратель Душ','Архидемон','Багровый Жнец','Древний'],
};
function ri(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function rng(a,b){return a+Math.random()*(b-a);}
// Каталог имён по слотам/редкости (синхрон с db_schema/equipment_catalog).
const CAT = {
  weapon: {
    common: ['Деревянный меч','Каменный топор','Дубина','Грубый клинок'],
    rare:   ['Стальной меч','Топор ополченца','Усиленная дубина','Меч паладина'],
    epic:   ['Секира','Булава','Клинок хаоса','Меч рыцаря'],
    mythic: ['Пламенный клинок','Топор хаоса','Молот колосса','Тень смерти'],
  },
  shield: {
    common: ['Щит Ополченца','Щит Стойкости','Щит Закалённого','Щит Дружинника'],
    rare:   ['Рыцарский Щит','Щит Великана','Щит Паладина','Щит Хранителя'],
    epic:   ['Щит Дракона','Щит Колосса','Щит Непоколебимого','Щит Арканы'],
    mythic: ['Щит Судьбы','Щит Бессмертного','Щит Рока','Щит Богов'],
  },
  armor: {
    common: ['Кожаная броня'], rare: ['Кольчуга'], epic: ['Броня Дракона'], mythic: ['Броня Дракона'],
  },
  belt: { // в коде belt = шлем
    common: ['Шлем Танка','Шлем Стража','Шлем Охотника','Шлем Дуэлянта'],
    rare:   ['Шлем Берсерка','Шлем Крепости','Шлем Снайпера','Шлем Паладина'],
    epic:   ['Шлем Демона','Стальная Крепость','Шлем Арканы','Шлем Разрушителя'],
    mythic: ['Шлем Дракона','Корона Воителя','Маска Смерти','Шлем Богов'],
  },
  boots: {
    common: ['Сапоги Скорохода','Сапоги Выносливого','Сапоги Тени','Кровавый след'],
    rare:   ['Сапоги Вихря','Сапоги Живучести','Сапоги Ветра','Сапоги Кровопийцы'],
    epic:   ['Сапоги Призрака','Сапоги Жизненной Силы','Сапоги Ловчего','Поступь Вампира'],
    mythic: ['Сапоги Дракона','Поступь Бессмертия','Сапоги Призрака Смерти','Сапоги Владыки Крови'],
  },
  ring1: {
    common: ['Кольцо Меткости','Кольцо Охотника','Кольцо Безмолвия','Кольцо Оков'],
    rare:   ['Кольцо Снайпера','Кольцо Преследователя','Кольцо Тишины','Кольцо Замедления'],
    epic:   ['Кольцо Ясновидца','Кольцо Неизбежности','Кольцо Молчания','Кольцо Оцепенения'],
    mythic: ['Кольцо Провидца','Кольцо Рока','Кольцо Вечного Безмолвия','Кольцо Паралича'],
  },
};
const RARITY_W = {
  novice:  [0.85, 0.15, 0.00, 0.00],
  farmer:  [0.20, 0.70, 0.10, 0.00],
  major:   [0.05, 0.30, 0.55, 0.10],
  donator: [0.00, 0.10, 0.40, 0.50],
};
const RAR_ORDER = ['common','rare','epic','mythic'];
const RAR_COL = {common:'#9aa0a6', rare:'#3cc864', epic:'#b45aff', mythic:'#ffc83c'};
const SLOT_ICON = {weapon:'🗡', shield:'🛡', armor:'👕', belt:'🪖', boots:'👢', ring1:'💍'};
const SLOTS_FOR_BOT = ['weapon','shield','armor','belt','boots','ring1'];

function pickRarity(p){
  const w = RARITY_W[p] || RARITY_W.novice;
  let r = Math.random(), a = 0;
  for (let i=0; i<RAR_ORDER.length; i++){
    a += w[i]; if (r <= a) return RAR_ORDER[i];
  }
  return 'common';
}
function pickItem(slot, p){
  let rar = pickRarity(p);
  let pool = CAT[slot] && CAT[slot][rar];
  // fallback ↓
  let idx = RAR_ORDER.indexOf(rar);
  while ((!pool || !pool.length) && idx > 0){
    idx--; rar = RAR_ORDER[idx]; pool = CAT[slot] && CAT[slot][rar];
  }
  if (!pool || !pool.length) return null;
  return {slot, rarity: rar, name: pool[ri(0, pool.length-1)], color: RAR_COL[rar]};
}
function gearItems(p, lv){
  const coverage = Math.max(.30, Math.min(1.0, lv/60 + 0.20));
  const out = [];
  for (const slot of SLOTS_FOR_BOT){
    if (Math.random() > coverage) continue;
    if (p === 'novice' && Math.random() > 0.50) continue;
    const it = pickItem(slot, p);
    if (it) out.push(it);
  }
  return out;
}
function makeOpp(p, lv){
  const pref = PREFIXES[p][ri(0,PREFIXES[p].length-1)];
  const nm = NAMES[ri(0,NAMES.length-1)];
  return {
    persona:p, level:lv,
    name: `${pref} ${nm}`,
    rating: ri(900,1500),
    hp: ri(80,100), max_hp: 100,
    str: ri(8+lv,15+lv), agi: ri(8+lv,15+lv), intu: ri(5+lv,12+lv), sta: ri(0,15),
    items: gearItems(p, lv),
    win_streak: ri(0, 12),
  };
}
function makeMe(lv){
  return {persona:null, level:lv, name:'Вы', rating:1200, hp:80, max_hp:100,
    str:ri(8+lv,15+lv), agi:ri(8+lv,15+lv), intu:ri(5+lv,12+lv), sta:ri(0,15),
    items:null, isMe:true, win_streak:0};
}

let curP = 'major', curLv = 50;
function render(){
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  const isMe = curP === 'me';
  const o = isMe ? makeMe(curLv) : makeOpp(curP, curLv);
  const meta = o.persona ? PMETA[o.persona] : null;
  const isBot = !isMe;
  const hasGear = !!(o.items && o.items.length);

  const hpPct = o.hp / o.max_hp;
  const hpCol = hpPct > 0.5 ? '#3cc864' : hpPct > 0.25 ? '#ffc83c' : '#dc3c46';

  const head = meta ? `<span style="color:${meta.col}">${meta.emoji} ${meta.label}</span>` :
               (isMe ? '<span style="color:#5096ff">🧑 Вы</span>' : '<span style="color:#ccccee">🤖 Бот</span>');

  const top = isMe ? 50 : 100;
  const cardClass = '';

  stage.innerHTML = `
    <div class="card ${cardClass}" style="top:${top}px;">
      <div class="card-head">
        <div>${head}</div>
        <div style="color:#ddddff;font-size:14px;cursor:pointer;">✕</div>
      </div>
      <div class="name-row">${o.name}</div>
      <div class="lv-row" style="color:${(!isMe && (o.win_streak||0) > 0) ? '#ff8044' : '#ccccee'}">Ур. ${o.level} · ★ ${o.rating}${(!isMe && (o.win_streak||0) > 0) ? ` · 🔥 ${o.win_streak} подряд` : ''}</div>
      <div class="div"></div>
      <div style="padding:6px 14px 0;">
        <div class="hp-row"><span>❤️ HP</span><span style="color:${hpCol}">${o.hp} / ${o.max_hp}</span></div>
        <div class="hp-bar"><div class="hp-fill" style="width:${hpPct*100}%;background:${hpCol}"></div></div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);text-align:center;margin-top:10px;">
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><span style="font-size:14px">💪</span><span style="font-size:13px;font-weight:700;color:#dc3c46">${o.str}</span><span style="font-size:9px;color:#aaaacc">Сила</span></div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><span style="font-size:14px">🤸</span><span style="font-size:13px;font-weight:700;color:#3cc8dc">${o.agi}</span><span style="font-size:9px;color:#aaaacc">Ловкость</span></div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><span style="font-size:14px">💥</span><span style="font-size:13px;font-weight:700;color:#b45aff">${o.intu}</span><span style="font-size:9px;color:#aaaacc">Интуиция</span></div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><span style="font-size:14px">🛡</span><span style="font-size:13px;font-weight:700;color:#3cc864">${o.sta}</span><span style="font-size:9px;color:#aaaacc">Выносл.</span></div>
        </div>
      </div>
      ${isMe ? `<div class="gear-block">
             <div class="gear-title">🎽 ЧТО ОДЕТО</div>
             ${renderEquip([
               {slot:'weapon', name:'Меч паладина',  rarity:'rare',  color:'#3cc864'},
               {slot:'shield', name:'Щит Великана',  rarity:'rare',  color:'#3cc864'},
               {slot:'belt',   name:'Шлем Демона',   rarity:'epic',  color:'#b45aff'},
               {slot:'armor',  name:'Кольчуга',      rarity:'rare',  color:'#3cc864'},
             ], 'me')}
           </div>` :
       (hasGear
        ? `<div class="gear-block">
             <div class="gear-title">🎽 ЧТО ОДЕТО</div>
             ${renderEquip(o.items, curP)}
           </div>`
        : `<div class="gear-block"><div class="empty">— шмота нет —</div></div>`
      )}
    </div>`;
}

// Layout: левая колонка — Шлем/Броня/Сапоги, центр — спрайт, правая — Оружие/Щит/Кольцо.
const SLOT_LAYOUT = {
  belt:   {row:1, col:1, label:'Шлем'},
  armor:  {row:2, col:1, label:'Броня'},
  boots:  {row:3, col:1, label:'Сапоги'},
  weapon: {row:1, col:3, label:'Оружие'},
  shield: {row:2, col:3, label:'Щит'},
  ring1:  {row:3, col:3, label:'Кольцо'},
};
// Маппинг item_id → PNG в webapp/ (синхрон с bot_battle_card.js:_itemImageUrl).
function previewImageUrl(it){
  const id = it.item_id || it.name || '';
  const slot = it.slot, rar = it.rarity || 'common';
  if (slot === 'shield' || slot === 'belt' || slot === 'ring1' || slot === 'boots') {
    // В превью item_id берём по образцу, иначе пытаемся по rarity
    if (/^(shield|helmet|ring|boots)_/.test(id)) return `${id}.png`;
    const base = slot === 'belt' ? 'helmet' : slot === 'ring1' ? 'ring' : slot;
    const m = {common:'free1', rare:'gold1', epic:'dia1', mythic:'mythic1'};
    return `${base}_${m[rar]||'free1'}.png`;
  }
  if (slot === 'armor') {
    const m = {common:'armor_free1', rare:'armor_gold1', epic:'armor_dia1', mythic:'armor_mythic1'};
    return `${m[rar]||'armor_free1'}.png`;
  }
  if (slot === 'weapon') {
    const parts = id.split('_');
    const wtype = parts[0] || 'sword';
    const sfx = parts[1] || '';
    const rcl = (sfx==='steel'||sfx==='gold')?'rare':(sfx==='diamond')?'epic':(sfx==='mythic')?'mythic':'free';
    const types = ['sword','axe','club','gs'];
    const t = types.includes(wtype) ? wtype : 'sword';
    return `weapon_${t}_${rcl}.png`;
  }
  return null;
}
function renderEquip(items, persona){
  const bySlot = {};
  items.forEach(it => bySlot[it.slot] = it);
  const heroEmoji = persona==='me' ? '🧙' :
                    persona==='donator' ? '👹' : persona==='major' ? '🦹' :
                    persona==='farmer' ? '🥷' : '🧟';
  const slotsHtml = ['belt','armor','boots','weapon','shield','ring1'].map(slot => {
    const it = bySlot[slot];
    const meta = SLOT_LAYOUT[slot];
    const style = `grid-row:${meta.row};grid-column:${meta.col};` + (it ? `border-color:${it.color};box-shadow:inset 0 0 8px ${it.color}33;` : '');
    const cls = it ? '' : 'empty';
    const nm = it ? (it.name.length > 13 ? it.name.slice(0,12)+'…' : it.name) : '';
    const img = it ? previewImageUrl(it) : null;
    const visual = img
      ? `<div class="eq-img"><img src="${img}" onerror="this.parentNode.innerHTML='<span class=&quot;eq-emoji&quot;>${SLOT_ICON[slot]||'•'}</span>'"></div>`
      : `<div class="eq-img"><span class="eq-emoji">${SLOT_ICON[slot]||'•'}</span></div>`;
    return `<div class="eq-slot ${cls}" style="${style}">
      <div class="eq-label">${meta.label}</div>
      ${visual}
      ${it ? `<div class="eq-name" style="color:${it.color}">${nm}</div>` : ''}
    </div>`;
  }).join('');
  return `<div class="equip"><div class="eq-sprite">${heroEmoji}</div>${slotsHtml}</div>`;
}
document.querySelectorAll('button[data-p]').forEach(b => b.addEventListener('click', () => {
  curP = b.dataset.p;
  document.querySelectorAll('button[data-p]').forEach(x => x.classList.toggle('act', x === b));
  render();
}));
document.querySelectorAll('button[data-lv]').forEach(b => b.addEventListener('click', () => {
  curLv = +b.dataset.lv;
  document.querySelectorAll('button[data-lv]').forEach(x => x.classList.toggle('act', x === b));
  render();
}));
document.getElementById('reroll').addEventListener('click', render);
render();
</script>
</body></html>
