# Blueprint для Render.com (Web Service)
services:
  - type: web
    name: zenduelarena
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    disk:
      name: duel-arena-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBAPP_PUBLIC_URL
        sync: false
      - key: ADMIN_USER_IDS
        sync: false
      - key: CRYPTOPAY_TOKEN
        sync: false
      - key: CRYPTOPAY_TESTNET
        value: "1"
      - key: DATA_DIR
        value: /app/data
